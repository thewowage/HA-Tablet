group:
  hass_update_notification:
    name: HASS Update Notification
    entities:
      - update.home_assistant_supervisor_update
      - update.home_assistant_operating_system_update
      - update.home_assistant_core_update

  all_updates:
    name: Alle Updates
    entities:
      - update.home_assistant_supervisor_update
      - update.home_assistant_operating_system_update
      - update.home_assistant_core_update
      - update.hacs_update
      - update.mariadb_update
      - update.unifi_dream_router
      - update.unifi_gateway_update
      - update.usw_flex_mini
      - update.usw_flex_mini_2
      - update.access_point_ac_lite

  all_windows:
    name: Alle Fenster
    entities:
      - binary_sensor.hue_secure_contact_sensor_1_offnung
      - binary_sensor.hue_secure_contact_sensor_2_offnung
      - binary_sensor.fenster_schlafzimmer_offnung
      - binary_sensor.fenster_kinderzimmer_offnung
      - binary_sensor.fenster_kuche_offnung
      - binary_sensor.contact_sensor_b4d0

  all_doors:
    name: Alle Türen
    entities:
      - binary_sensor.eingangstur_offnung
      - binary_sensor.esp32_storerroom_kitchen_abstellkammer_links
      - binary_sensor.esp32_storerroom_kitchen_abstellkammer_rechts

  all_devices:
    name: Alle Geräte
    icon: mdi:power-socket-eu
    entities:
      # Schlafzimmer
      - switch.gosund_sp112_bedroom
      - switch.gosund_sp112_bedroom_usb
      # Badezimmer
      - switch.gosund_sp112_nursery # Badezimmer Steckdose
      - switch.gosund_sp112_nursery_usb # Badezimmer USB
      # Kinderzimmer
      - switch.steckdosenleiste_kinderzimmer_stecker1
      - switch.steckdosenleiste_kinderzimmer_stecker2
      - switch.steckdosenleiste_kinderzimmer_stecker3
      - switch.steckdosenleiste_kinderzimmer_usb
      - switch.shellyazplug_5432046783f8_switch_0 # Multimedia Kinderzimmer
      # Wohnzimmer
      - switch.shellyazplug_5432046783f0_switch_0 # Computer Steckdose
      - switch.shellyplusplugs_e465b8b49ef4_switch_0 # Sofa Wohnzimmer
      # Keller
      - switch.shellyplugsg3_8cbfeaa147dc # Kühlschrank Keller
      - switch.socket_washing_machine
      - switch.shellyplug_s_b49a1d # 3D-Drucker Keller
      # Küche
      - switch.shellyplusplugs_e465b8451910_switch_0 # Kühlschrank Küche
      - switch.shellyazplug_543204663e38_switch_0 # Kaffeemaschine Küche

  all_lights:
    name: Alle Lichter
    icon: mdi:ceiling-light-multiple
    entities:
      - light.deckenlicht_wohnzimmer
      - light.ambiente
      - light.deckenlicht_schlafzimmer
      - light.deckenlicht_kinderzimmer
      - light.ambiente_rgb
      - light.ambiente_rgb_2
      - light.deckenlicht_kuche
      - light.spots_kuche
      - light.abstellkammer
      - light.deckenlicht_flur
      - light.spots_badezimmer
      - light.deckenlicht_dachboden
      - light.deckenlicht_nebenraum
      - light.deckenlicht_keller

  all_water:
    name: Alle Leckage Sensoren
    entities:
      - binary_sensor.wasserleckage_sensor_kuche_feuchtigkeit

  all_climate:
    name: Thermostats
    icon: mdi:thermostat
    entities:
      - climate.wohnzimmer
      - climate.kinderzimmer

  all_motion_sensors:
    name: Bewegungssensoren
    icon: mdi:motion-sensor
    entities:
      - binary_sensor.bewegungsmelder_treppenhaus_bewegung
      - binary_sensor.hue_bewegungssensor_flur_bewegung

  ## WOHNZIMMER ###########################################################
  #########################################################################
  livingroom_lights:
    name: Lichter Wohnzimmer
    entities:
      - light.deckenlicht_wohnzimmer
      - light.ambiente

  livingroom_devices:
    name: Geräte Wohnzimmer
    entities:
      - switch.shellyplusplugs_e465b860bbb8_switch_0 # Wohnwand Wohnzimmer
      - switch.shellyplusplugs_e465b8b49ef4_switch_0 # Sofa Wohnzimmer
      - switch.shellyazplug_5432046783f0_switch_0 # Computertisch Wohnzimmer

  livingroom_media:
    name: Media Wohnzimmer
    entities:
      - media_player.apple_tv_wohnzimmer
      - media_player.lg_webos_tv_oled55c17lb

  livingroom_windows:
    name: Fenster Wohnzimmer
    entities:
      - binary_sensor.hue_secure_contact_sensor_1_offnung
      - binary_sensor.hue_secure_contact_sensor_2_offnung

  ## SCHLAFZIMMER #########################################################
  #########################################################################
  bedroom_devices:
    name: Geräte Schlafzimmer
    entities:
      - switch.gosund_sp112_bedroom
      - switch.gosund_sp112_bedroom_usb

  ## KINDERZIMMER #########################################################
  #########################################################################
  nursery_lights:
    name: Lichter Kinderzimmer
    entities:
      - light.kinderzimmer
      - light.ambiente_rgb
      - light.ambiente_rgb_2

  nursery_ambiente:
    name: Ambiente Kinderzimmer
    entities:
      - light.ambiente_rgb
      - light.ambiente_rgb_2

  nursery_media:
    name: Media Kinderzimmer
    entities:
      - media_player.apple_tv_alissa

  nursery_socket_desk:
    name: Steckdosen Tisch
    entities:
      - switch.steckdosenleiste_kinderzimmer_stecker1
      - switch.steckdosenleiste_kinderzimmer_stecker2
      - switch.steckdosenleiste_kinderzimmer_stecker3

  nursery_devices:
    name: Geräte Kinderzimmer
    entities:
      - switch.steckdosenleiste_kinderzimmer_stecker1
      - switch.steckdosenleiste_kinderzimmer_stecker2
      - switch.steckdosenleiste_kinderzimmer_stecker3
      - switch.steckdosenleiste_kinderzimmer_usb
      - switch.shellyazplug_5432046783f8_switch_0 # Multimedia Kinderzimmer

  ## KÜCHE ################################################################
  #########################################################################
  kitchen_lights:
    name: Lichter Küche
    entities:
      - light.deckenlicht_kuche
      - light.spots_kuche
      - switch.light_storeroom_kitchen

  kitchen_windows:
    name: Fenster Küche
    entities:
      - binary_sensor.fenster_kuche_offnung
      - binary_sensor.contact_sensor_b4d0

  kitchen_doors:
    name: Türen Küche
    entities:
      - binary_sensor.esp32_storerroom_kitchen_abstellkammer_links
      - binary_sensor.esp32_storerroom_kitchen_abstellkammer_rechts

  kitchen_devices:
    name: Geräte Küche
    entities:
      - switch.shellyplusplugs_e465b8451910_switch_0 # Küchlschrank Küche
      - switch.shellyazplug_543204663e38_switch_0 # Kaffeemaschine Küche

  ## BADEZIMMER ###########################################################
  #########################################################################
  bath_plugs:
    name: Steckdosen Bad
    entities:
      - switch.gosund_sp112_nursery # Badezimmer Steckdose
      - switch.gosund_sp112_nursery_usb # Badezimmer USB

  ## DACHBODEN ############################################################
  #########################################################################
  attic_lights:
    name: Lichter Dachboden
    entities:
      - light.deckenlicht_dachboden
      - light.deckenlicht_nebenraum

  ## SENSOR ÜBERWACHUNG ###################################################
  #########################################################################
  sensor_monitor_targets:
    name: "Überwachte Sensoren"
    entities:
      - binary_sensor.hue_secure_contact_sensor_1_offnung
      - binary_sensor.hue_secure_contact_sensor_2_offnung
      - binary_sensor.fenster_schlafzimmer_offnung
      - binary_sensor.fenster_kinderzimmer_offnung
      - binary_sensor.fenster_kuche_offnung
      - binary_sensor.contact_sensor_b4d0
