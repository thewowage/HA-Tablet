template:
  - sensor:
      - name: "Mangobaum – Tage seit Gießen"
        unique_id: mangobaum_days_since_watered
        unit_of_measurement: "Tage"
        icon: mdi:watering-can
        state: >
          {% set d = states('date.simple_plant_last_watered_mangobaum') %}
          {% set last = as_datetime(d, none) %}
          {% if last is none %}
            unknown
          {% else %}
            {{ (now().date() - last.date()).days }}
          {% endif %}

  - sensor:
      - name: "Mangobaum"
        unique_id: mangotree
        state: >
          {% set moisture = states('sensor.plant_sensor_bcdf_feuchtigkeit') | float(0) %}
          {% set temp = states('sensor.plant_sensor_bcdf_temperatur') | float(0) %}
          {% set light = states('sensor.plant_sensor_bcdf_beleuchtungsstarke') | float(0) %}
          {% set cond = states('sensor.plant_sensor_bcdf_leitfahigkeit') | float(0) %}

          {% if moisture < 20 or moisture > 60 
                or temp < 10 or temp > 32
                or light < 500
                or cond < 200 %}
            problem
          {% else %}
            ok
          {% endif %}
        attributes:
          feuchtigkeit: "{{ states('sensor.plant_sensor_bcdf_feuchtigkeit') }}"
          temperatur: "{{ states('sensor.plant_sensor_bcdf_temperatur') }}"
          licht: "{{ states('sensor.plant_sensor_bcdf_beleuchtungsstarke') }}"
          leitfaehigkeit: "{{ states('sensor.plant_sensor_bcdf_leitfahigkeit') }}"

          problem: >
            {% if states('sensor.fake_pflanzensensor') == 'problem' %}
              ja
            {% else %}
              nein
            {% endif %}

          problem_code: >
            {% set moisture = states('sensor.plant_sensor_bcdf_feuchtigkeit') | float(0) %}
            {% set temp = states('sensor.plant_sensor_bcdf_temperatur') | float(0) %}
            {% set light = states('sensor.plant_sensor_bcdf_beleuchtungsstarke') | float(0) %}
            {% set cond = states('sensor.plant_sensor_bcdf_leitfahigkeit') | float(0) %}

            {% if moisture < 20 %} moisture_low
            {% elif moisture > 60 %} moisture_high
            {% elif temp < 10 %} temp_low
            {% elif temp > 32 %} temp_high
            {% elif light < 500 %} light_low
            {% elif cond < 200 %} conductivity_low
            {% else %} ok
            {% endif %}
