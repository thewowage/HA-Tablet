sensor:
  # +----------------------------------------------------------------------------+
  # | TIME - DATE Sensor                                                         |
  # +----------------------------------------------------------------------------+
  - platform: time_date
    display_options:
      - "time"
      - "date"
      - "date_time"
      - "date_time_utc"
      - "date_time_iso"
      - "time_date"
      - "time_utc"

template:
  # ------------------------------------------------------------------------------------------------
  # CHRISTMAS TIME SENSOR
  - binary_sensor:
      - default_entity_id: binary_sensor.christmas_time
        state:
          "{% set today = states('sensor.date').split('-') %} {% set month =
          today[1]|int %} {% set day = today[2]|int %} {{ month == 12 and day >= 5 or
          month == 1 and day <= 6 }}"
        name: christmas_time
