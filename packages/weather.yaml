template:
  - trigger:
      - trigger: state
        entity_id: weather.forecast_home
      - trigger: time_pattern
        minutes: /10
      - trigger: homeassistant
        event: start
    action:
      - action: weather.get_forecasts
        data:
          type: daily
        target:
          entity_id: weather.forecast_home
        response_variable: daily
      - variables:
          today: "{{ daily['weather.forecast_home'].forecast[0] }}"
    sensor:
      - name: "Wind Speed Sensor"
        unique_id: wind_speed_sensor
        icon: mdi:weather-windy
        unit_of_measurement: "km/h"
        state: "{{ state_attr('weather.fulda','wind_speed') | float | round(1) }}"

      - name: "Weather Pressure"
        unique_id: weather_presure_sensor
        icon: mdi:gauge
        unit_of_measurement: "hPa"
        state: "{{ state_attr('weather.fulda','pressure') | float | round(1) }}"

      - name: "Weather Air Quality"
        unique_id: weather_air_quality
        icon: mdi:air-filter
        unit_of_measurement: "aqi"
        state: "{{ states('sensor.fulda_petersberger_str_germany_luftqualitatsindex', 'state') | float | round(1) }}"

      - name: "Weather UV Index"
        unique_id: weather_uv_index
        icon: mdi:weather-sunny
        state: "{{ state_attr('weather.fulda','uv_index') | float | round(1) }}"

      - name: "Weather Precipitation"
        unique_id: weather_precipitation
        icon: mdi:weather-rainy
        unit_of_measurement: "mm"
        state: "{{ state_attr('sensor.weather_forecast_daily','precipitation') | float | round(1)  }}"

  - sensor:
      - name: "Outside Temperature Weather"
        unit_of_measurement: "°C"
        state: "{{ state_attr('weather.fulda', 'temperature') }}"
        device_class: temperature

      - name: "Outside Humidity Weather"
        unit_of_measurement: "%"
        state: "{{ state_attr('weather.fulda', 'humidity') }}"
        device_class: humidity

  # +----------------------------------------------------------------------------+
  # | WEATHER State DE                                                           |
  # +----------------------------------------------------------------------------+
  - sensor:
      - default_entity_id: sensor.current_weather
        state: "{%- set state = states('weather.weather_forecast_daily') -%}
          {% if state == 'clear-night' %} KLARE NACHT {% elif state == 'cloudy' %} WOLKIG
          {% elif state == 'exceptional' %} WARNUNG
          {% elif state == 'fog' %} NEBEL
          {% elif state == 'hail' %} HAGEL
          {% elif state == 'lightning' %} BLITZ
          {% elif state == 'lightning-rainy' %} REGEN & BLITZ
          {% elif state == 'partlycloudy' %} TEILWEISE BEWÖLKT
          {% elif state == 'pouring' %} STARKREGEN
          {% elif state == 'rainy' %} REGEN
          {% elif state == 'snowy' %} SCHNEE
          {% elif state == 'snowy-rainy' %} SCHNEEREGEN
          {% elif state == 'sunny' %} SONNIG
          {% elif state == 'windy' %} WINDIG
          {% elif state == 'windy-variant' %} WINDIG
          {% else %} Keine Wetterdaten
          {% endif %}"
        name: current_weather
