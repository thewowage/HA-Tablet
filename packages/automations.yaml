automation:

  ## FLUR #################################################################
  #########################################################################

  # -----------------------------------------------------------------------
  # DECKENLICHT FLUR MANUELLE STEUERUNG
  - id: "161308069106866"
    alias: Philips Hue Flur Motion Manual ON
    description: ""
    triggers:
      - trigger: state
        entity_id: event.lichtschalter_flur_hinten_schaltflache_4
      - trigger: state
        entity_id: event.lichtschalter_flur_vorne_schaltflache_2
    actions:
      - action: input_boolean.turn_on
        data:
          entity_id: input_boolean.flurlicht_manual_helper

  - id: "161308069106566"
    alias: Philips Hue Flur Motion Manual OFF
    description: ""
    triggers:
      - trigger: state
        entity_id: event.lichtschalter_flur_hinten_schaltflache_3
      - trigger: state
        entity_id: event.lichtschalter_flur_vorne_schaltflache_1
    actions:
      - action: input_boolean.turn_off
        data:
          entity_id: input_boolean.flurlicht_manual_helper

  # -----------------------------------------------------------------------
  # DECKENLICHT AN BEI BEWEGUNG (NACHT)
  - id: "16130806910066"
    alias: Philips Hue Flur Motion
    description: ""
    triggers:
      - trigger: state
        entity_id: binary_sensor.hue_bewegungssensor_flur_bewegung
        from: "off"
        to: "on"
      - trigger: state
        entity_id: binary_sensor.hue_bewegungssensor_flur_bewegung
        from: "on"
        to: "off"
        for: 20
      - trigger: state
        entity_id: binary_sensor.hue_bewegungssensor_flur_bewegung
        from: "on"
        to: "off"
        for: 40
    condition:
      - condition: or
        conditions:
          - condition: sun
            after: sunset
            after_offset: "+00:10:00"
          - condition: sun
            before: sunrise
            before_offset: "-00:10:00"
      - condition: state
        entity_id: input_boolean.flurlicht_manual_helper
        state: "off"
    actions:
      - choose:
          - conditions:
              - "{{ trigger.to_state.state == 'on' }}"
              - "{{ is_state('light.deckenlicht_flur', 'off') }}"
            sequence:
              - action: light.turn_on
                target:
                  entity_id: light.deckenlicht_flur
                data:
                  brightness_pct: 15
          - conditions:
              - "{{ trigger.to_state.state == 'off' }}"
              - "{{ trigger.for.seconds == 20 }}"
              - "{{ is_state('light.deckenlicht_flur', 'on') }}"
            sequence:
              - action: light.turn_on
                target:
                  entity_id: light.deckenlicht_flur
                data:
                  brightness_pct: 5
          - conditions:
              - "{{ trigger.to_state.state == 'off' }}"
              - "{{ trigger.for.seconds == 40 }}"
              - "{{ is_state('light.deckenlicht_flur', 'on') }}"
            sequence:
              - action: light.turn_off
                target:
                  entity_id: light.deckenlicht_flur
    mode: restart

