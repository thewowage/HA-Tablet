  ## DASHBOARD GRUß #######################################################
  #########################################################################
  - id: "1634458459110544235"
    alias: "Dashboard-Gruß: Aktualisieren"
    mode: restart
    trigger:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/30"
      #- trigger: state
      #  entity_id: person.wowa # <— optional: deine Präsenz-Gruppe/Person
      #  to: "home"
    actions:
      - variables:
          # Tageszeit-Label
          tod: >
            {% set h = now().hour %}
            {% if 5 <= h < 10 %}Guten Morgen
            {% elif 10 <= h < 18 %}Guten Tag
            {% elif 18 <= h < 22 %}Guten Abend
            {% else %}Gute Nacht{% endif %}
          date_str: "{{ now().strftime('%A, %d.%m.') }}"
          # Temperatur, falls vorhanden
          temp_txt: >
            {% set t = state_attr('weather.fulda','temperature') %}
            {% if t is number %}Außentemperatur {{ t | round(0) }}°C. {% else %}{% endif %}
          old_resp: "{{ states('input_text.gpt_response_greeting') }}"
          prompt_text: >-
            Schreibe eine kurze, freundliche Begrüßung für ein Smart-Home-Dashboard
            auf Deutsch. Beginne mit "{{ tod }}". Nenne das Datum "{{ date_str }}".
            {{ temp_txt }}Maximal 20 Wörter. Keine Emojis, kein Smalltalk.
      - action: pyscript.generate_response
        data:
          prompt: "{{ prompt_text }}"
      # Warten, bis pyscript die Antwort in input_text.gpt_response geschrieben hat
      - wait_template: >
          {{ states('input_text.gpt_response_greeting') != old_resp and
            (states('input_text.gpt_response_greeting') | length) > 0 }}
        timeout: "00:00:20"
        continue_on_timeout: false
      # In unseren Anzeigetext übernehmen
      - action: input_text.set_value
        target:
          entity_id: input_text.gpt_greeting
        data:
          value: "{{ states('input_text.gpt_response_greeting') }}"

  ## VIBRATIONSSENSOR #####################################################
  #########################################################################
  - id: "1345634458454235"
    alias: "Vibrationssensor – Benachrichtigung"
    description: "Sendet eine Push-Nachricht, wenn der Vibrationssensor ausgelöst wird."
    trigger:
      - trigger: state
        entity_id: binary_sensor.lumi_lumi_vibration_aq1
        from: "off"
        to: "on"
    condition: []
    action:
      - action: notify.mobile_app_wowa_iphone
        data:
          title: "Vibration erkannt"
          message: "Der Vibrationssensor wurde ausgelöst."
    mode: single

  ## FROSTWARNUNG VORABEND ################################################
  #########################################################################
  - id: "frostwarnung_vorabend"
    alias: "Frostwarnung am Vorabend"
    mode: single
    trigger:
      - platform: time
        at: "20:00:00"
    variables:
      weather_entity: weather.fulda
      tomorrow_low: >
        {% set fc = state_attr(weather_entity, 'forecast') %}
        {% if fc and fc|length > 0 %}
          {{ fc[0].temperature_low
            if fc[0].temperature_low is defined
            else (fc[0].templow if fc[0].templow is defined else none) }}
        {% else %}
          {{ none }}
        {% endif %}
    condition:
      - condition: state
        entity_id: input_boolean.notification_wowas_iphone
        state: "on"
      - condition: template
        value_template: >
          {{ tomorrow_low is not none and (tomorrow_low | float(99)) < 0 }}
    action:
      - service: notify.mobile_app_wowa_iphone
        data:
          title: "❄️ Frostwarnung"
          message: >
            Morgen früh wird es voraussichtlich frostig (Min: {{ tomorrow_low }}°C).
            Bitte Vorsicht wegen Glätte und ggf. Auto freikratzen.
