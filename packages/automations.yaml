  ## NOTIFICATION #########################################################
  #########################################################################

  # -----------------------------------------------------------------------
  # DEUTSCHER WETTERDIENST
  - id: "16130806910090654"
    alias: "Wetterwarnung"
    triggers:
      trigger: state
      entity_id: binary_sensor.meteoalarm
      from: "off"
      to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.notification_wowas_iphone
        state: "on"
    actions:
      - action: notify.mobile_app_wowa_iphone
        data:
          title: "{{state_attr('binary_sensor.meteoalarm', 'headline')}}"
          message: "{{state_attr('binary_sensor.meteoalarm', 'description')}} is effective on {{state_attr('binary_sensor.meteoalarm', 'effective')}}"

  ## HEIZUNG ##############################################################
  #########################################################################

  # -----------------------------------------------------------------------
  # HEIZUNG AUßERHALB DER HEIZSAISON AUSSCHALTEN

  - id: "16130806910090654543"
    alias: "Heizung: Alle aus, wenn keine Heizsaison"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_select.heizsaison # ← dein Master-Schalter
        from: "an"
        to: "aus"
      - trigger: homeassistant # auch beim Neustart prüfen
        event: start
    condition:
      - condition: state
        entity_id: input_select.heizsaison
        state: "aus"
    actions:
      - action: notify.mobile_app_wowa_iphone
        data:
          title: Heizsaison
          message: Heizsaison wurde deaktiviert
      - variables:
          # Nutze Gruppe, wenn vorhanden, sonst alle climate-Entitäten
          climates: >-
            {{ state_attr('group.all_climate','entity_id')
              if state_attr('group.all_climate','entity_id') is not none
              else states.climate | map(attribute='entity_id') | list }}
      - choose:
          - conditions: "{{ climates | count > 0 }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: "{{ climates }}"
                data:
                  hvac_mode: "off"
  # -----------------------------------------------------------------------
  # HEIZUNG IN DER HEIZSAISON AUSSCHALTEN

  - id: "1613080691009654543"
    alias: "Heizung: Alle an, wenn Heizsaison"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_select.heizsaison # ← dein Master-Schalter
        from: "aus"
        to: "an"
      - trigger: homeassistant # auch beim Neustart prüfen
        event: start
    condition:
      - condition: state
        entity_id: input_select.heizsaison
        state: "an"
    actions:
      - action: notify.mobile_app_wowa_iphone
        data:
          title: Heizsaison
          message: Heizsaison wurde aktiviert
      - variables:
          # Nutze Gruppe, wenn vorhanden, sonst alle climate-Entitäten
          climates: >-
            {{ state_attr('group.all_climate','entity_id')
              if state_attr('group.all_climate','entity_id') is not none
              else states.climate | map(attribute='entity_id') | list }}
      - choose:
          - conditions: "{{ climates | count > 0 }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: "{{ climates }}"
                data:
                  hvac_mode: "auto"

