sensor:
  # +----------------------------------------------------------------------------+
  # | MIN - MAX Temperature - Humidity                                           |
  # +----------------------------------------------------------------------------+
  - platform: min_max
    name: temperature_min
    type: min
    entity_ids:
      - sensor.multisensor_badezimmer_temperatur
      - sensor.multisensor_kinderzimmer_temperatur
      - sensor.multisensor_kuche_temperatur
      - sensor.multisensor_wohnzimmer_temperatur
      - sensor.multisensor_schlafzimmer_temperatur
      - sensor.hue_bewegungssensor_flur_temperature

  - platform: min_max
    name: temperature_max
    type: max
    entity_ids:
      - sensor.multisensor_badezimmer_temperatur
      - sensor.multisensor_kinderzimmer_temperatur
      - sensor.multisensor_kuche_temperatur
      - sensor.multisensor_wohnzimmer_temperatur
      - sensor.multisensor_schlafzimmer_temperatur
      - sensor.hue_bewegungssensor_flur_temperature

  # +----------------------------------------------------------------------------+
  # | MIN - MAX Humidity                                                         |
  # +----------------------------------------------------------------------------+
  - platform: min_max
    name: humidity_min
    type: min
    entity_ids:
      - sensor.multisensor_badezimmer_luftfeuchtigkeit
      - sensor.multisensor_kinderzimmer_luftfeuchtigkeit
      - sensor.multisensor_kuche_luftfeuchtigkeit
      - sensor.multisensor_wohnzimmer_luftfeuchtigkeit
      - sensor.multisensor_schlafzimmer_luftfeuchtigkeit

  - platform: min_max
    name: humidity_max
    type: max
    entity_ids:
      - sensor.multisensor_badezimmer_luftfeuchtigkeit
      - sensor.multisensor_kinderzimmer_luftfeuchtigkeit
      - sensor.multisensor_kuche_luftfeuchtigkeit
      - sensor.multisensor_wohnzimmer_luftfeuchtigkeit
      - sensor.multisensor_schlafzimmer_luftfeuchtigkeit

  # +----------------------------------------------------------------------------+
  # | Average Temperature                                                        |
  # +----------------------------------------------------------------------------+
  - platform: min_max
    name: Average Home Temperature
    type: mean
    round_digits: 1
    entity_ids:
      - sensor.multisensor_badezimmer_temperatur
      - sensor.multisensor_kinderzimmer_temperatur
      - sensor.multisensor_kuche_temperatur
      - sensor.multisensor_wohnzimmer_temperatur
      - sensor.multisensor_schlafzimmer_temperatur
      - sensor.hue_bewegungssensor_flur_temperature

  # +----------------------------------------------------------------------------+
  # | Average Humidity                                                           |
  # +----------------------------------------------------------------------------+
  - platform: min_max
    name: Average Home Humidity
    type: mean
    round_digits: 1
    entity_ids:
      - sensor.multisensor_badezimmer_luftfeuchtigkeit
      - sensor.multisensor_kinderzimmer_luftfeuchtigkeit
      - sensor.multisensor_kuche_luftfeuchtigkeit
      - sensor.multisensor_wohnzimmer_luftfeuchtigkeit
      - sensor.multisensor_schlafzimmer_luftfeuchtigkeit
