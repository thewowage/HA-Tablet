template:
  - sensor:
      - unit_of_measurement: devices
        default_entity_id: sensor.devices_with_low_battery
        icon:
          "{% if is_state('sensor.devices_with_low_battery', '0') %}\n  mdi:battery-check\n{%
          else %}\n  mdi:battery-alert\n{% endif %}"
        name: Devices with Low Battery
        state:
          "{% set ignore_entities='sensor.alissa_iphone_battery_level', 'sensor.rita_iphone_battery_level'
          %} {{ states.sensor\n  | selectattr('attributes.device_class', 'eq', 'battery')\n
          \ | rejectattr('entity_id', 'in', ignore_entities)\n  | map(attribute='state')\n
          \ | reject('in', ['unknown', 'unavailable'])\n  | map('int', -1) | select('le',
          30)\n  | select('ge', 0)\n  | list | count\n}}"

  - binary_sensor:
      - name: "Battery Low State"
        unique_id: battery_low_state
        device_class: battery
        state: >
          {% set threshold = 20 %}   {# Schwellwert in % #}
          {% set batteries = [
            states('sensor.eingangstur_batterie')|int(100),
            states('sensor.fenster_abstellkammer_batterie')|int(100),
            states('sensor.fenster_kinderzimmer_batterie')|int(100),
            states('sensor.fenster_kuche_batterie')|int(100),
            states('sensor.fenster_wohnzimmer_links_batterie')|int(100),
            states('sensor.fenster_wohnzimmer_rechts_batterie')|int(100),
            states('sensor.fenster_schlafzimmer_batterie')|int(100),
            states('sensor.multisensor_badezimmer_batterie')|int(100),
            states('sensor.multisensor_kinderzimmer_batterie')|int(100),
            states('sensor.multisensor_kuche_batterie')|int(100),
            states('sensor.multisensor_wohnzimmer_batterie')|int(100),
            states('sensor.abstellkammer_links_batterie')|int(100),
            states('sensor.abstellkammer_rechts_batterie')|int(100),
            states('sensor.hue_bewegungssensor_flur_batterie')|int(100),
            states('sensor.lichtschalter_kuche_batterie')|int(100),
            states('sensor.hue_tap_dial_switch_sz_batterie')|int(100),
            states('sensor.hue_tapfdial_switch_kz_batterie')|int(100),
            states('sensor.wohnungstur_battery')|int(100),
            states('sensor.wasserleckage_sensor_kuche_batterie')|int(100)
          ] %}
          {{ batteries | select('le', threshold) | list | count > 0 }}
