- trigger:
    - trigger: time_pattern
      hours: /1
    - trigger: event
      event_type: event_template_reloaded
  action:
    - action: weather.get_forecasts
      target:
        entity_id:
          - weather.fulda
      data:
        type: daily
      response_variable: dailyforecast
  sensor:
    # +----------------------------------------------------------------------------+
    # | HACasa Weather Sensor                                                      |
    # +----------------------------------------------------------------------------+

    - name: Weather Entity Forecast
      unique_id: weather_entity_forecast
      state: "{{ states('weather.fulda') }}"
      icon: mdi:hours-24
      attributes:
        condition: "{{ states('weather.fulda') }}"
        cloud_coverage: "{{ state_attr('weather.forecast_home','cloud_coverage') }}"
        temperature: "{{ state_attr('weather.fulda','temperature')  }}"
        wind_speed: "{{ state_attr('weather.fulda','wind_speed')  }}"
        wind_gust: "{{ state_attr('weather.fulda','wind_speed')  }}"
        dew_point: "{{ state_attr('weather.forecast_home','dew_point') }}"
        wind_bearing: "{{ state_attr('weather.forecast_home','wind_bearing') }}"

        datetime: "{{ dailyforecast['weather.fulda'].forecast[0].datetime }}"
        forecast: "{{ dailyforecast['weather.fulda'].forecast }}"

    - name: "Adress Wowa"
      unique_id: "adress_wowa"
      state: >
        {% set full_address = state_attr('sensor.wowa_iphone_geocoded_location', 'Name') %}
        {% if full_address %}
          {% set address_parts = full_address.split(' ') %}
          {% set street_address = address_parts[:2] %}
          {{ street_address | join(' ') }}
        {% else %}
          'Unknown'
        {% endif %}

    # +----------------------------------------------------------------------------+
    # | WEATHER Sensors                                                            |
    # +----------------------------------------------------------------------------+

    - unique_id: tomorrow_humidity_outside
      state: >
        {%- set state = states('weather.fulda') -%}
        {% if state == 'clear-night' %} Morgen gibt es eine Klare Nacht
        {% elif state == 'cloudy' %} Morgen wird es bewölt sein
        {% elif state == 'exceptional' %} Es gibt eine Wetterwarnung für morgen
        {% elif state == 'fog' %} Morgen wird es neblig sein
        {% elif state == 'hail' %} Morgen wird es hageln
        {% elif state == 'lightning' %} Morgen wird es Regnen
        {% elif state == 'lightning-rainy' %} Morgen wird es Regnen
        {% elif state == 'partlycloudy' %} Morgen wird es teilweise bewölkt sein
        {% elif state == 'pouring' %} Morgen wird es stark regnen
        {% elif state == 'rainy' %} Morgen regnet es
        {% elif state == 'snowy' %} Morgen schneit es
        {% elif state == 'snowy-rainy' %} Morgen fällt Schneeregen
        {% elif state == 'sunny' %} Morgen scheint die Sonne
        {% elif state == 'windy' %} Morgen wird es windig sein
        {% elif state == 'windy-variant' %} Morgen wird es windig sein
        {% else %} Keine Wetterdaten
        {% endif %}

    - unique_id: today_humidity_outside
      state: >
        {%- set state = states('weather.fulda') -%}
        {% if state == 'clear-night' %} klare Nacht
        {% elif state == 'cloudy' %} bewölkt
        {% elif state == 'exceptional' %} Wetterwarnung
        {% elif state == 'fog' %} neblig
        {% elif state == 'hail' %} Hagel
        {% elif state == 'lightning' %} regnerisch
        {% elif state == 'lightning-rainy' %} regnerisch
        {% elif state == 'partlycloudy' %} teilw. bewölkt
        {% elif state == 'pouring' %} starker Regen
        {% elif state == 'rainy' %} Regen
        {% elif state == 'snowy' %} Schnee
        {% elif state == 'snowy-rainy' %} Schneeregen
        {% elif state == 'sunny' %} sonnig
        {% elif state == 'windy' %} windig
        {% elif state == 'windy-variant' %} windig
        {% else %} Keine Wetterdaten
        {% endif %}

    - unique_id: outside_humidity_text
      state: "Luftfeuchtigkeit außen: {{ state_attr('weather.fulda','humidity') }}%"

    # +----------------------------------------------------------------------------+
    # | GREETING Sensor                                                            |
    # +----------------------------------------------------------------------------+

    - unique_id: greeting
      state: >
        {% set time = now().hour %}
        {% if time <= 1 %} Gute Nacht {{'\U0001F611'}}
        {% elif time <= 3 %} Gute Nacht {{'\U0001F62A'}}
        {% elif time <= 5 %} Gute Nacht {{'\U0001F634'}}
        {% elif time <= 7 %} Guten Morgen {{'\U0001F4A9'}}
        {% elif time <= 9 %} Guten Morgen {{'\u2615\uFE0F'}}
        {% elif time <= 10 %} Guten Morgen {{'\U0001F642'}}
        {% elif time <= 13 %} Guten Tag {{'\U0001F60A'}}
        {% elif time <= 15 %} Guten Tag {{'\U0001F60E'}}
        {% elif time <= 17 %} Guten Tag {{'\U0001F44B\U0001F3FB'}}
        {% elif time <= 19 %} Guten Abend {{'\U0001F44B\U0001F3FB'}}
        {% elif time <= 22 %} Guten Abend {{'\U0001F60C'}}
        {% elif time <= 23 %} Guten Abend {{'\U0001F974'}}
        {% else %} Guten Abend {{'\U0001F974'}}
        {% endif %}

    # +----------------------------------------------------------------------------+
    # | SYSTEM Sensor                                                              |
    # +----------------------------------------------------------------------------+

    #- name: "UniFi Dream Router Uptime Edit"
    #  state: "{{ as_timestamp(states('sensor.unifi_dream_router_uptime')) | timestamp_custom('%a %b %-d') }}"
    #  icon: "mdi:clock"

    #- name: "Home Assistant Uptime Edit"
    #  state: "{{ as_timestamp(states('sensor.system_monitor_letzter_start')) | timestamp_custom('%a %b %-d') }}"
    #  icon: "mdi:clock"

    - name: "Thermostate – Übersicht"
      unique_id: thermostats_overview
      icon: mdi:thermostat
      state: >
        {% set clims = state_attr('group.all_climate','entity_id')
                      if state_attr('group.all_climate','entity_id') is not none
                      else states.climate | map(attribute='entity_id') | list %}
        {{ clims | count }}
      attributes:
        heating_count: >
          {% set clims = state_attr('group.all_climate','entity_id')
                        if state_attr('group.all_climate','entity_id') is not none
                        else states.climate | map(attribute='entity_id') | list %}
          {% set actions = clims | map('state_attr','hvac_action') | list %}
          {{ actions | select('equalto','heating') | list | count }}
        off_count: >
          {% set clims = state_attr('group.all_climate','entity_id')
                        if state_attr('group.all_climate','entity_id') is not none
                        else states.climate | map(attribute='entity_id') | list %}
          {{ clims | map('states') | select('equalto','off') | list | count }}
        avg_current_temp: >
          {% set temps = [] %}
          {% for e in states.climate %}
            {% set v = state_attr(e.entity_id,'current_temperature') %}
            {% if v is not none %}{% set temps = temps + [ v | float(0) ] %}{% endif %}
          {% endfor %}
          {% if temps|count > 0 %}
            {% set avg = (temps | sum) / (temps | count) %}
            {{ avg | round(1) }}
          {% else %}{{ none }}{% endif %}
        avg_target_temp: >
          {% set temps = [] %}
          {% for e in states.climate %}
            {% set v = state_attr(e.entity_id,'temperature') %}
            {% if v is not none %}{% set temps = temps + [ v | float(0) ] %}{% endif %}
          {% endfor %}
          {% if temps|count > 0 %}
            {% set avg = (temps | sum) / (temps | count) %}
            {{ avg | round(1) }}
          {% else %}{{ none }}{% endif %}
        thermostats: >
          {% set clims = state_attr('group.all_climate','entity_id')
                        if state_attr('group.all_climate','entity_id') is not none
                        else states.climate | map(attribute='entity_id') | list %}
          {% set out = [] %}
          {% for eid in clims %}
            {% set obj = states[eid] %}
            {% set hvac_mode = obj.state %}
            {% set hvac_action = state_attr(eid,'hvac_action') %}
            {% set cur = state_attr(eid,'current_temperature') %}
            {% set tgt = state_attr(eid,'temperature') %}
            {% set tl = state_attr(eid,'target_temp_low') %}
            {% set th = state_attr(eid,'target_temp_high') %}
            {% set out = out + [ {
              'entity_id': eid,
              'name': obj.name,
              'hvac_mode': hvac_mode,
              'hvac_action': hvac_action | default(''),
              'current_temperature': cur,
              'target_temperature': tgt,
              'target_range': {'low': tl, 'high': th},
              'available': (obj.state != 'unavailable')
            } ] %}
          {% endfor %}
          {{ out | sort(attribute='name') }}
