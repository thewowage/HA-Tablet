title: Weather
icon: mdi:cloud
path: "weather"
cards:
  #- type: conditional
  #  conditions:
  #    - condition: and
  #      conditions:
  #        - condition: screen
  #          media_query: "(min-width: 0px) and (max-width: 767px)"
  #        - condition: or
  #          conditions:
  #            - condition: state
  #              entity: media_player.apple_tv_wohnzimmer
  #              state: playing
  #            - condition: state
  #              entity: media_player.apple_tv_wohnzimmer
  #              state: paused
  #  card:
  #    type: custom:button-card
  #    template: hc_mediaplayer_card_bottom
  #    entity: media_player.apple_tv_wohnzimmer

  - type: conditional
    conditions:
      - condition: screen
        media_query: "(min-width: 0px) and (max-width: 767px)"
    card:
      type: custom:button-card
      template: hc_navigationbar_card
      variables:
        icon_color_6: white
        background_color_6: var(--primary-color)

  - type: vertical-stack
    cards:
      #- type: custom:button-card
      #  template: hc_title_card_backbtn
      #  name: Wetter

      - type: custom:button-card
        template: hc_title_card
        name: Wetter
        variables:
          entity2: input_boolean.weather_today
          entity2_name: Heute
          entity3: input_boolean.weather_week
          entity3_name: Woche

      #- square: false
      #  type: grid
      #  columns: 2
      #  cards:
      #    - type: custom:button-card
      #      entity: input_boolean.weather_today
      #      name: Heute
      #      template: hc_switch_template_wge
      #      variables:
      #        hc_card_color: "var(--color-orange)"
      #        icon_on: mdi:sun-clock-outline
      #        icon_off: mdi:weather-sunny-off
      #    - type: custom:button-card
      #      entity: input_boolean.weather_week
      #      name: Wochenansicht
      #      template: hc_switch_template_wge
      #      variables:
      #        hc_card_color: "var(--color-purple)"
      #        icon_off: mdi:cloud-off-outline
      #        icon_on: mdi:weather-cloudy-arrow-right

      - type: conditional
        condition: or
        conditions:
          - condition: state
            entity: input_boolean.weather_week
            state: "off"
          - condition: state
            entity: input_boolean.weather_today
            state: "off"
        card:
          type: custom:button-card
          template: hc_weather_card
          entity: sensor.weather_entity_forecast
          variables:
            show_forecast: true

      #- type: custom:button-card
      #  template: hc_weather_card_wge
      #  entity: sensor.weather_forecast_daily
      #  name: '[[[ return states["sensor.fulda_petersberger_str_germany_temperatur"].state + " °C"]]]'
      #  variables:
      #    hc_enable_forecast: true
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.weather_week
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: custom:button-card
              template: hc_title_card_small
              name: Wochenansicht
            - type: custom:clock-weather-card
              entity: weather.fulda

      - type: conditional
        condition: or
        conditions:
          #- condition: state
          #  entity: input_boolean.weather_week
          #  state: "off"
          - condition: state
            entity: input_boolean.weather_today
            state: "off"
        card:
          type: grid
          columns: 1
          square: false
          cards:
            - type: custom:button-card
              template: hc_title_card_small
              name: Details
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:button-card
                  template: hc_graph_card
                  entity: sensor.wind_speed_sensor
                  name: Wind
                  variables:
                    color: "var(--color-red)"

                - type: custom:button-card
                  template: hc_graph_card
                  entity: sensor.pressure
                  name: Luchtdruck
                  variables:
                    color: "var(--color-orange)"

                - type: custom:button-card
                  template: hc_graph_card
                  entity: sensor.weather_air_quality
                  name: Luchtqualität
                  variables:
                    color: "var(--color-green)"

                - type: custom:button-card
                  template: hc_graph_card
                  entity: sensor.weather_precipitation
                  name: Niederschlag
                  variables:
                    color: "var(--color-blue)"

      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.weather_today
            state: "on"
        card:
          square: false
          type: grid
          columns: 1
          cards:
            - type: custom:button-card
              template: hc_title_card_small
              name: Heute
            - type: custom:weather-chart-card
              entity: weather.fulda
              show_main: true
              show_temperature: true
              show_current_condition: true
              show_attributes: true
              show_time: false
              show_day: false
              show_date: false
              show_humidity: true
              show_pressure: true
              show_wind_direction: true
              show_wind_speed: true
              show_sun: true
              show_feels_like: false
              use_12hour_format: false
              icons_size: 25
              animated_icons: false
              icon_style: style1
              forecast:
                precipitation_type: rainfall
                labels_font_size: "11"
                precip_bar_size: "100"
                style: style2
                show_wind_forecast: true
                condition_icons: true
                round_temp: false
                type: hourly
              units:
                pressure: ""
                speed: ""
            - type: iframe
              url: >-
                https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=m/s&zoom=10&overlay=wind&product=ecmwf&level=surface&lat=50.555894&lon=9.681372261&message=true
              aspect_ratio: 98%

  - type: "custom:button-card" # adding some space between card and navbar
    color_type: blank-card
    styles:
      card:
        - height: 150px
