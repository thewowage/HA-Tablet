title: devices
icon: mdi:devices
path: "devices"
cards:
  - type: vertical-stack
    cards:
      - type: custom:button-card
        template: hc_title_card
        name: Alle Geräte


  - type: custom:tabbed-card
    options: {}
    styles:
      "--mdc-theme-primary": null
      "--mdc-tab-text-label-color-default": grey
    tabs:
          - attributes:
              label: null
              icon: mdi:router-network
            card:
              type: custom:vertical-stack-in-card
              cards:
                - show_state: true
                  show_name: true
                  camera_view: auto
                  fit_mode: cover
                  type: picture-entity
                  entity: sensor.unifi_dream_router_state
                  name: Dream Router
                  image:
                    media_content_id: /local/images/network/udr_eu.png
                    media_content_type: image/png
                    metadata:
                      title: udr_6.png
                      thumbnail: /api/image/serve/18e7cf31d9af60ddc0bd3342e01bacce/256x256
                      media_class: image
                      navigateIds:
                        - {}
                        - media_content_type: app
                          media_content_id: media-source://image_upload
                - type: custom:button-card
                  variables:
                    internet_state: sensor.internet_monitor_status_2
                    download_state: sensor.speedtest_download
                    upload_state: sensor.speedtest_upload
                    ping_state: sensor.unifi_dream_router_cloudflare_wan_latency
                    download_good_above: 250
                    download_average_above: 200
                    download_poor_below: 150
                    upload_good_above: 50
                    upload_average_above: 30
                    upload_poor_below: 15
                    ping_offline: 1
                    ping_good_below: 25
                    ping_average_below: 40
                    ping_poor_above: 40
                  triggers_update:
                    - "[[[ return variables.internet_state ]]]"
                    - "[[[ return variables.download_state ]]]"
                    - "[[[ return variables.upload_state ]]]"
                    - "[[[ return variables.ping_state ]]]"
                  show_name: false
                  show_state: false
                  show_icon: false
                  styles:
                    card:
                      - padding: 10px
                    grid:
                      - grid-template-areas: "\"left mid right\""
                      - grid-template-columns: .8fr .1fr .8fr
                      - grid-template-rows: 100%
                    custom_fields:
                      left:
                        - filter: opacity(100%)
                        - overflow: visible
                      right:
                        - filter: opacity(100%)
                        - overflow: visible
                  custom_fields:
                    left:
                      card:
                        type: custom:mushroom-template-card
                        entity: "[[[ return variables.internet_state ]]]"
                        icon: |
                          {% if is_state(entity, "up") %}
                            mdi:web-check
                          {% elif is_state(entity, "down") %}
                            mdi:web-cancel
                          {% endif %}
                        icon_color: |
                          {% if is_state(entity, "up") %}
                            green
                          {% elif is_state(entity, "down") %}
                            red
                          {% endif %}
                        primary: |
                          {% if is_state(entity, "up") %}
                            Online
                          {% elif is_state(entity, "down") %}
                            DOWN
                          {% endif %}
                        secondary: Internet Status
                        card_mod:
                          style: |
                            ha-card {
                              padding: 0px !important;
                              padding-bottom: 3px !important;
                              text-align: left !important;
                              border: none !important;
                              box-shadow: none !important;
                            }        
                    right:
                      card:
                        type: grid
                        columns: 3
                        square: false
                        cards:
                          - type: custom:button-card
                            entity: "[[[ return variables.download_state ]]]"
                            layout: icon_state
                            show_name: false
                            show_state: true
                            show_label: true
                            icon: mdi:download-network-outline
                            label: Mbit/s
                            size: 100%
                            state_display: >-
                              [[[ return
                              Math.round(Number(states[variables.download_state].state)).toFixed(0);
                              ]]]
                            state:
                              - value: "[[[ return variables.download_good_above ]]]"
                                operator: ">"
                                styles:
                                  icon:
                                    - color: green
                              - value: "[[[ return variables.download_average_above ]]]"
                                operator: ">="
                                styles:
                                  icon:
                                    - color: darkorange
                              - value: "[[[ return variables.download_poor_below ]]]"
                                operator: <
                                styles:
                                  icon:
                                    - color: red
                            styles:
                              state:
                                - font-size: 0.7rem
                                - font-weight: bold
                              label:
                                - font-size: 0.7rem
                              card:
                                - background: rgba(var(--rgb-primary-text-color), 0.05)
                                - height: 3rem
                                - border: none
                                - box-shadow: none
                          - type: custom:button-card
                            entity: "[[[ return variables.upload_state ]]]"
                            layout: icon_state
                            show_name: false
                            show_state: true
                            show_label: true
                            icon: mdi:upload-network-outline
                            label: Mbit/s
                            size: 100%
                            state_display: >-
                              [[[ return
                              Math.round(Number(states[variables.upload_state].state)).toFixed(0);
                              ]]]
                            state:
                              - value: "[[[ return variables.upload_good_above ]]]"
                                operator: ">"
                                styles:
                                  icon:
                                    - color: green
                              - value: "[[[ return variables.upload_average_above ]]]"
                                operator: ">="
                                styles:
                                  icon:
                                    - color: darkorange
                              - value: "[[[ return variables.upload_poor_below ]]]"
                                operator: <
                                styles:
                                  icon:
                                    - color: red
                            styles:
                              state:
                                - font-size: 0.7rem
                                - font-weight: bold
                              label:
                                - font-size: 0.7rem
                              card:
                                - background: rgba(var(--rgb-primary-text-color), 0.05)
                                - height: 3rem
                                - border: none
                                - box-shadow: none
                          - type: custom:button-card
                            entity: "[[[ return variables.ping_state ]]]"
                            layout: icon_state
                            show_name: false
                            show_state: true
                            show_label: true
                            label: ms
                            size: 100%
                            state_display: >-
                              [[[ return
                              Math.round(Number(states[variables.ping_state].state)).toFixed(0);
                              ]]]
                            state:
                              - value: "[[[ return variables.ping_offline ]]]"
                                operator: <
                                styles:
                                  icon:
                                    - color: grey
                              - value: "[[[ return variables.ping_good_below ]]]"
                                operator: <
                                styles:
                                  icon:
                                    - color: green
                              - value: "[[[ return variables.ping_average_below ]]]"
                                operator: <=
                                styles:
                                  icon:
                                    - color: darkorange
                              - value: "[[[ return variables.ping_poor_above ]]]"
                                operator: ">"
                                styles:
                                  icon:
                                    - color: red
                            styles:
                              state:
                                - font-size: 0.7rem
                                - font-weight: bold
                              label:
                                - font-size: 0.7rem
                              card:
                                - background: rgba(var(--rgb-primary-text-color), 0.05)
                                - height: 3rem
                                - border: none
                                - box-shadow: none
                - type: custom:gap-card
                  height: 5
                - type: heading
