title: Home
path: "home"
icon: mdi:home
cards:
  - type: conditional
    conditions:
      - condition: and
        conditions:
          - condition: screen
            media_query: "(min-width: 0px) and (max-width: 767px)"
          - condition: or
            conditions:
              - condition: state
                entity: media_player.apple_tv_wohnzimmer
                state: playing
              - condition: state
                entity: media_player.apple_tv_wohnzimmer
                state: paused
    card:
      type: custom:button-card
      template: hc_mediaplayer_card_bottom
      entity: media_player.apple_tv_wohnzimmer
  - type: conditional
    conditions:
      - condition: screen
        media_query: "(min-width: 0px) and (max-width: 767px)"
    card:
      type: custom:button-card
      template: hc_navigationbar_card
      variables:
        icon_color_1: white
        background_color_1: var(--primary-color)

  - type: vertical-stack
    cards:
      - type: conditional
        conditions:
          - condition: user
            users:
              - 93b63ea3789847298e4689605129c943
        card:
          type: custom:button-card
          template: hc_header_card_wge
          entity: weather.fulda
          variables:
            person_entity: person.wowa
            person_action: navigate
            person_path: "#person_card_wowa"
          tap_action:
            action: navigate
            navigation_path: weather

      - type: conditional
        conditions:
          - condition: user
            users:
              - a543a3d96de74a98a1c93a31c8f44838
        card:
          type: custom:button-card
          template: hc_header_card_wge
          variables:
            person_entity: person.rita
          tap_action:
            action: navigate
            navigation_path: weather

      - type: conditional
        conditions:
          - condition: user
            users:
              - 94146b4ab1af458e9d369f93b25daa91
        card:
          type: custom:button-card
          template: hc_header_card_wge
          variables:
            person_entity: person.alissa
          tap_action:
            action: navigate
            navigation_path: weather

      - type: custom:button-card
        template: hc_glance_card_front_wge
        variables:
          entity1: sensor.average_home_temperature
          entity1_name: Temperatur
          entity1_icon: fapro:thermometer
          entity1_icon_state: 28
          entity1_icon_color_state_on: var(--color-red)
          entity1_icon_color_state_off: var(--color-green)
          entity1_action: "navigate"
          entity1_path: "#climate_card"
          entity2: sensor.energy_consumption_daily
          entity2_name: Energie
          entity2_icon: fapro:bolt
          entity2_icon_color_state_off: var(--color-yellow)
          entity2_action: "navigate"
          entity2_path: "#energy_card"
          entity3: sensor.average_home_humidity
          entity3_name: Feuchtigkeit
          entity3_icon: fapro:humidity
          entity3_icon_state: 70
          entity3_icon_color_state_on: var(--color-red)
          entity3_icon_color_state_off: var(--color-blue)
          entity3_action: "navigate"
          entity3_path: "#climate_card"

      #- type: custom:button-card
      #  template: hc_weather_card_new
      #  entity: sensor.weather_forecast_daily
      #  variables:
      #    name_entity: sensor.template_greeting
      #    label_entity: sensor.template_outside_humidity_text
      #    secondary_info: "[[[ return states['sensor.template_tomorrow_humidity_outside'].state; ]]]"
      #  tap_action:
      #    action: navigate
      #    navigation_path: "weather"

      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.default_view_rooms
            state: "off"
        card:
          type: vertical-stack
          cards:
            - type: custom:button-card
              template: hc_scene_card
              entity: input_select.scene_selector # Create this one yourself!
              variables:
                icon_1: fapro:house-fill
                name_1: Movie
                scene_1: scene.movie_scene
                icon_2: fapro:computer
                name_2: Arbeit
                scene_2: scene.flur_entspannen
                icon_3: fapro:door-open
                name_3: Weg
                scene_3: scene.flur_entspannen
                icon_4: fapro:moon-stars
                name_4: Nacht
                scene_4: scene.flur_entspannen
                icon_5: fapro:clapper-open
                name_5: Film
                scene_5: scene.flur_entspannen

      - type: conditional
        conditions:
          - condition: state
            entity: media_player.apple_tv_wohnzimmer
            state_not: "playing"
        card:
          type: vertical-stack
          cards:
            - type: custom:button-card
              template: hc_title_card
              name: Zuhause
              variables:
                entity3: input_boolean.default_view_rooms
                entity3_name: Alle Räume

      - type: conditional
        conditions:
          - condition: or
            conditions:
              - condition: state
                entity: media_player.apple_tv_wohnzimmer
                state: "playing"
        card:
          type: vertical-stack
          cards:
            - type: custom:button-card
              template: hc_title_card
              name: Zuhause
              variables:
                entity2: sensor.waste_collection_condition
                entity2_name: Müllabfuhr
                navigation_path_2: "#garbage_collection_card"
                entity3: input_boolean.default_view_rooms
                entity3_name: Alle Räume

      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.default_view_rooms
            state: "off"
        card:
          type: vertical-stack
          cards:
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:button-card
                  template: hc_navigation_card
                  name: Alle<br>Lichter
                  entity: sensor.number_of_lights_on
                  icon: fapro:lamp
                  variables:
                    hc_label_prefix: "An - " # Prefix can by anything but the state of the entity will be added after it.
                    hc_color: var(--color-orange) # color of the card when the state underneath is met (in this case, higher then 0)
                  state:
                    - value: 1 # Can also be 'on'
                      operator: ">=" # if value above is 'on', remove this line
                      styles:
                        card:
                          - background: "[[[ return variables.hc_color ]]]" # Let this be
                        name:
                          - color: white
                        label:
                          - color: white
                        icon:
                          - color: white
                    - value: 0 # Can also be 'off'
                      styles:
                        icon:
                          - color: var(--primary-color) # color of the icon when the state is met (in this case, just 0)
                  tap_action:
                    action: navigate
                    navigation_path: "#lights_card"

                - type: custom:button-card
                  template: hc_navigation_card_security
                  name: Home<br>Security
                  entity: alarm_control_panel.home_alarm
                  variables:
                    color: var(--color-blue) # color of the card when the alarm is not off
                  tap_action:
                    action: navigate
                    navigation_path: "#home_security_card"

                - type: custom:button-card
                  template: hc_navigation_card
                  name: Alle<br>Geräte
                  entity: sensor.number_of_devices_on
                  icon: fapro:devices
                  variables:
                    hc_label_prefix: "An - " # Prefix can by anything but the state of the entity will be added after it.
                    hc_color: var(--color-blue) # color of the card when the state underneath is met (in this case, higher then 0)
                  state:
                    - value: 1 # Can also be 'on'
                      operator: ">=" # if value above is 'on', remove this line
                      styles:
                        card:
                          - background: "[[[ return variables.hc_color ]]]" # Let this be
                        name:
                          - color: white
                        label:
                          - color: white
                        icon:
                          - color: white
                    - value: 0 # Can also be 'off'
                      styles:
                        icon:
                          - color: <desired icon color> # color of the icon when the state is met (in this case, just 0)
                  tap_action:
                    action: navigate
                    navigation_path: "#devices_card"

                - type: custom:button-card
                  template: hc_navigation_card
                  name: Haus<br>Klima
                  entity: group.all_climate
                  icon: fapro:house
                  variables:
                    hc_label_prefix: "Status - " # Prefix can by anything but the state of the entity will be added after it.
                    hc_color: var(--color-red) # color of the card when the state underneath is met (in this case, higher then 0)
                  state:
                    - value: heat # Can also be 'on'
                      #operator: ">" # if value above is 'on', remove this line
                      styles:
                        card:
                          - background: "[[[ return variables.hc_color ]]]" # Let this be
                        name:
                          - color: white
                        label:
                          - color: white
                        icon:
                          - color: white
                    - value: 0 # Can also be 'off'
                      styles:
                        icon:
                          - color: var(--primary-color) # color of the icon when the state is met (in this case, just 0)
                  tap_action:
                    action: navigate
                    navigation_path: "#climate_card"

      - type: conditional
        condition: or
        conditions:
          - condition: state
            entity: media_player.apple_tv_wohnzimmer
            state_not: "playing"
          - condition: state
            entity: input_boolean.default_view_rooms
            state: "off"
        card:
          type: vertical-stack
          cards:
            - type: "custom:button-card"
              template:
                - hc_garbage_card
              entity: input_boolean.toggle_button_notify_garbage
              tap_action:
                action: navigate
                navigation_path: "#garbage_collection_card"

      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.default_view_rooms
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: grid
              square: false
              columns: 2
              cards:
                - type: vertical-stack
                  cards:
                    - type: custom:button-card
                      entity: light.wohnzimmer
                      template: hc_bubble_room_card_wge
                      variables:
                        icon: mdi:sofa-outline
                        name: Wohnzimmer
                        navigation_path: "#living-room"
                        radius: 24px 24px 6px 24px
                        climate: "climate.wohnzimmer"
                        windows: binary_sensor.livingroom_windows
                        media: media_player.wohnzimmer
                        temp_config: |
                          [[[ 
                            var temp = states['sensor.multisensor_wohnzimmer_temperatur'].state;
                            var hum = states['sensor.multisensor_wohnzimmer_luftfeuchtigkeit'].state;
                            return `
                            ${parseFloat(temp).toFixed(0)}°<span style="font-size:
                          0.3em;opacity:0.7">${parseFloat(hum).toFixed(0)}%</span>
                            `
                          ]]]

                    - type: custom:button-card
                      entity: light.deckenlicht_kinderzimmer
                      template: hc_bubble_room_card_wge
                      variables:
                        name: Kinderzimmer
                        icon: mdi:bed-queen-outline
                        navigation_path: "#nursery"
                        temp_sensor: sensor.multisensor_kinderzimmer_temperatur
                        hum_sensor: sensor.multisensor_kinderzimmer_luftfeuchtigkeit
                        radius: 24px 6px 6px 24px
                        climate: "climate.kinderzimmer"
                        windows: binary_sensor.fenster_kinderzimmer_offnung
                        media: media_player.kinderzimmer
                        temp_config: |
                          [[[ 
                            var temp = states['sensor.multisensor_kinderzimmer_temperatur'].state;
                            var hum = states['sensor.multisensor_kinderzimmer_luftfeuchtigkeit'].state;
                            return `
                            ${parseFloat(temp).toFixed(0)}°<span style="font-size:
                          0.3em;opacity:0.7">${parseFloat(hum).toFixed(0)}%</span>
                            `
                          ]]]

                    - type: custom:button-card
                      entity: light.deckenlicht_flur
                      template: hc_bubble_room_card_wge
                      variables:
                        name: Flur
                        icon: mdi:door
                        navigation_path: "#corridor"
                        temp_sensor: sensor.hue_bewegungssensor_flur_temperatur
                        hum_sensor: sensor.multisensor_wohnzimmer_luftfeuchtigkeit
                        doors: binary_sensor.eingangstur_offnung
                        motion: binary_sensor.hue_bewegungssensor_flur_bewegung
                        radius: 24px 6px 6px 24px
                        temp_config: |
                          [[[ 
                            var temp = states['sensor.hue_bewegungssensor_flur_temperatur'].state;
                            return `
                            ${parseFloat(temp).toFixed(0)}°
                            `
                          ]]]

                    - type: custom:button-card
                      entity: switch.shellyplus1pm_345f451fdd88_switch_0
                      template: hc_bubble_room_card_wge
                      variables:
                        name: Keller
                        icon: hue:downstairs
                        navigation_path: "#cellar"
                        temp_sensor: sensor.hue_bewegungssensor_flur_temperatur
                        hum_sensor: sensor.multisensor_wohnzimmer_luftfeuchtigkeit
                        radius: 24px 6px 24px 24px
                        small_card: true

                - type: vertical-stack
                  cards:
                    - type: custom:button-card
                      entity: light.schlafzimmer
                      template: hc_bubble_room_card_wge
                      variables:
                        name: Schlafzimmer
                        icon: mdi:bed-king-outline
                        navigation_path: "#bedroom"
                        radius: 24px 24px 24px 6px
                        windows: binary_sensor.fenster_schlafzimmer_offnung
                        temp_config: |
                          [[[ 
                            var temp = states['sensor.multisensor_schlafzimmer_temperatur'].state;
                            var hum = states['sensor.multisensor_schlafzimmer_luftfeuchtigkeit'].state;
                            return `
                            ${parseFloat(temp).toFixed(0)}°<span style="font-size:
                          0.3em;opacity:0.7">${parseFloat(hum).toFixed(0)}%</span>
                            `
                          ]]]

                    - type: custom:button-card
                      entity: light.kuche
                      template: hc_bubble_room_card_wge
                      variables:
                        name: Küche
                        icon: mdi:fridge-outline
                        navigation_path: "#kitchen"
                        radius: 6px 24px 24px 6px
                        windows: binary_sensor.fenster_kuche
                        temp_config: |
                          [[[ 
                            var temp = states['sensor.multisensor_kuche_temperatur'].state;
                            var hum = states['sensor.multisensor_kuche_luftfeuchtigkeit'].state;
                            return `
                            ${parseFloat(temp).toFixed(0)}°<span style="font-size:
                          0.3em;opacity:0.7">${parseFloat(hum).toFixed(0)}%</span>
                            `
                          ]]]

                    - type: custom:button-card
                      entity: light.spots_badezimmer
                      template: hc_bubble_room_card_wge
                      variables:
                        name: Bad
                        navigation_path: "#bathroom"
                        icon: mdi:paper-roll-outline
                        icon_color: var(--contrast20)
                        icon_back_color: var(--contrast1)
                        dubble_tap_action: null
                        radius: 6px 24px 24px 6px
                        temp_config: |
                          [[[ 
                            var temp = states['sensor.multisensor_badezimmer_temperatur'].state;
                            var hum = states['sensor.multisensor_badezimmer_luftfeuchtigkeit'].state;
                            return `
                            ${parseFloat(temp).toFixed(0)}°<span style="font-size:
                          0.3em;opacity:0.7">${parseFloat(hum).toFixed(0)}%</span>
                            `
                          ]]]

                    - type: custom:button-card
                      entity: light.deckenlicht_dachboden
                      template: hc_bubble_room_card_wge
                      variables:
                        name: Dachboden
                        navigation_path: "#attic"
                        icon: hue:upstairs
                        icon_color: var(--contrast20)
                        icon_back_color: var(--contrast1)
                        radius: 6px 24px 24px 24px
                        dubble_tap_action: null
                        small_card: true
                      temp_config: |
                        [[[ 
                          var temp = states['sensor.attic_temperature'].state;
                          var hum = states['sensor.attic_humidity'].state;
                          return `
                          ${parseFloat(temp).toFixed(0)}°<span style="font-size:
                        0.3em;opacity:0.7">${parseFloat(hum).toFixed(0)}%</span>
                          `
                        ]]]

  - type: vertical-stack
    cards:
      - !include /config/ui_lovelace_hacasa/cards/00-card_living_room.yaml
      - !include /config/ui_lovelace_hacasa/cards/01-card_bedroom.yaml
      - !include /config/ui_lovelace_hacasa/cards/02-card_nursery.yaml
      - !include /config/ui_lovelace_hacasa/cards/03-card_kitchen.yaml
      - !include /config/ui_lovelace_hacasa/cards/04-card_hall.yaml
      - !include /config/ui_lovelace_hacasa/cards/05-card_bathroom.yaml
      - !include /config/ui_lovelace_hacasa/cards/06-card_cellar.yaml
      - !include /config/ui_lovelace_hacasa/cards/07-card_attic.yaml
      - !include /config/ui_lovelace_hacasa/cards/08-card_all_lights.yaml
      - !include /config/ui_lovelace_hacasa/cards/09-card_all_devices.yaml
      - !include /config/ui_lovelace_hacasa/cards/10-card_home_security.yaml
      - !include /config/ui_lovelace_hacasa/cards/11-card_climate.yaml
      - !include /config/ui_lovelace_hacasa/cards/12-card_garbage_collection.yaml
      - !include /config/ui_lovelace_hacasa/cards/13-card_energy.yaml
      - !include /config/ui_lovelace_hacasa/cards/14-card_system.yaml
      - !include /config/ui_lovelace_hacasa/cards/20-card_person_wowa.yaml

  - type: "custom:button-card" # adding some space between card and navbar
    color_type: blank-card
    styles:
      card:
        - height: 150px
