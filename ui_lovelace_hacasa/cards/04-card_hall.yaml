type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: Flur
    icon: mdi:door
    hash: "#corridor"
    button_type: name
    sub_button: []
  - type: custom:bubble-card
    card_type: separator
    name: Klima
    icon: mdi:thermostat
    sub_button:
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.hue_bewegungssensor_flur_temperatur
        color: var(--color-red)
        icon: fapro:thermometer
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_wohnzimmer_luftfeuchtigkeit
        color: var(--color-blue)
        icon: fapro:humidity
        tap_action:
          action: more-info

  - square: false
    type: grid
    columns: 1
    cards:
      - type: custom:button-card
        template: hc_light_card_wge
        entity: light.deckenlicht_flur
        name: Deckenlicht
        variables:
          enable_slider: True

  - type: custom:bubble-card
    card_type: separator
    name: Geräte
    icon: mdi:devices
  - square: false
    columns: 1
    type: grid
    cards:
      - type: custom:button-card
        template:
          - hc_custom_lock_card_wge
        entity: lock.wohnungstur
        name: Front Door
