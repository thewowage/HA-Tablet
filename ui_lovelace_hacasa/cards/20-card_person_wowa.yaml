type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: Wowa
    icon: mdi:account
    hash: "#person_card_wowa"
    button_type: name
  - type: vertical-stack
    cards:
      - type: grid
        columns: 1
        square: false
        cards:
          - type: markdown
            title: 👋 Willkommen
            content: |
              {{ states('input_text.gpt_greeting') }}

      - type: grid
        columns: 1
        square: false
        cards:
          - type: custom:stack-in-card
            card_mod:
              style: |
                ha-card {
                  background: url('https://maps.geoapify.com/v1/staticmap?style=osm-bright&width=600&height=230&center=lonlat:{{ state_attr('device_tracker.iphone_wg_2', 'longitude') }},{{ state_attr('device_tracker.iphone_wg_2', 'latitude') }}&zoom=14.0&marker=lonlat:{{ state_attr('device_tracker.iphone_wg_2', 'longitude') }},{{ state_attr('device_tracker.iphone_wg_2', 'latitude') }};type:material;color:%23ff3421;icontype:awesome&scaleFactor=2&apiKey=e5d436d44cf746078490fd8656a55d8e');
                  background-size: cover;
                  background-blend-mode: overlay;
                  background-color: rgba(var(--rgb-card-background-color), 0.5);
                }
            cards:
              - type: custom:mushroom-template-card
                entity: person.wowa
                primary: Wowa
                secondary: >-
                  {{ iif(states(entity) == 'not_home', 'away', states(entity)) | title }} |
                  {{ states('sensor.wowa_iphone_geocoded_location') }}
                picture: "{{ state_attr(entity, 'entity_picture') }}"
                badge_icon: >-
                  {% set zone = iif(states(entity) == 'not_home', 'away', states(entity)) %}
                  {%- if 'home' in zone.lower() -%}
                    mdi:home
                  {%- elif zone == 'home' -%}
                    mdi:office-building
                  {%- else -%}
                    mdi:home-export-outline
                  {%- endif -%}
                badge_color: >-
                  {% set zone = iif(states(entity) == 'not_home', 'away', states(entity))
                  %}  {%- if 'home' in zone.lower() -%}
                    var(--color-green)
                  {%- elif zone == 'MY_WORK' -%}
                    var(--color-blue)
                  {%- else -%}
                    var(--color-red)
                  {%- endif -%}
                fill_container: true
                multiline_secondary: false
                layout: horizontal
                tap_action:
                  action: more-info
                card_mod:
                  style: |
                    :host {
                      height: 70px;
                      --mush-icon-size: 60px;
                      --secondary-text-color: var(--primary-text-color);
                    }
              - type: custom:mushroom-chips-card
                chips:
                  - type: entity
                    entity: sensor.wowa_iphone_steps
                  - type: entity
                    entity: sensor.wowa_iphone_battery_state
                  - type: entity
                    entity: sensor.iphone_wg_batterie
                card_mod:
                  style: |
                    ha-card {
                      --chip-box-shadow: 0px 0px 0px 0px;
                      --chip-background: none;
                    }

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            template: hc_button_card_wge
            icon: mdi:cellphone-message-off
            entity: input_boolean.notification_wowas_iphone
            name: Notifikations
            show_label: true
            label: "[[[ return states[entity.entity_id].state == 'on' ? 'AN' : 'AUS'; ]]]"
            state:
              - value: "on"
                icon: mdi:cellphone-message

          - type: custom:button-card
            template: hc_button_card_wge
            icon: mdi:cellphone-message-off
            entity: input_boolean.debug_mode
            name: Debug
            show_label: true
            label: "[[[ return states[entity.entity_id].state == 'on' ? 'AN' : 'AUS'; ]]]"
            state:
              - value: "on"
                icon: mdi:cellphone-message

          - type: custom:button-card
            template: hc_button_card_wge
            icon: mdi:cellphone-message-off
            entity: input_boolean.gaestemodus
            name: Gästemodus
            show_label: true
            label: "[[[ return states[entity.entity_id].state == 'on' ? 'AN' : 'AUS'; ]]]"
            state:
              - value: "on"
                icon: mdi:cellphone-message

          - type: custom:button-card
            template: hc_button_card_wge
            icon: mdi:cellphone-message-off
            entity: input_boolean.debug_mode
            name: Debug
            show_label: true
            label: "[[[ return states[entity.entity_id].state == 'on' ? 'AN' : 'AUS'; ]]]"
            state:
              - value: "on"
                icon: mdi:cellphone-message
