type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: Kinderzimmer
    icon: mdi:bed-queen-outline
    hash: "#nursery"
    button_type: name
    sub_button: []
    alignment: center

  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: entity
        entity: binary_sensor.fenster_kinderzimmer_offnung
        icon_color: red
        icon: fapro:window-open

  - type: custom:bubble-card
    card_type: separator
    name: Klima
    icon: mdi:thermostat
    sub_button:
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_kinderzimmer_temperatur
        color: var(--color-red)
        icon: fapro:thermometer
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_kinderzimmer_luftfeuchtigkeit
        color: var(--color-blue)
        icon: fapro:humidity
        tap_action:
          action: more-info

  - type: custom:bubble-card
    card_type: climate
    entity: climate.kinderzimmer
    sub_button:
      - name: HVAC modes menu
        select_attribute: hvac_modes
        state_background: false
        show_arrow: false
    show_state: true

  - type: custom:bubble-card
    card_type: separator
    name: Lichter
    icon: mdi:lightbulb-group
  - square: false
    type: grid
    columns: 1
    cards:
      - type: heading
        icon: mdi:lightbulb-group
        heading: Lichter
        heading_style: title
      - square: false
        columns: 1
        type: grid
        cards:
          - type: custom:button-card
            template: hc_light_card_wge
            entity: light.deckenlicht_kinderzimmer
            name: Deckenlicht
            variables:
              enable_slider: True
      - square: false
        columns: 2
        type: grid
        cards:
          - type: custom:button-card
            template: hc_light_card_wge
            entity: light.ambiente_rgb
            name: Ambiente Weiß
            variables:
              enable_slider: True
          - type: custom:button-card
            template: hc_light_card_wge
            entity: light.ambiente_rgb_2
            name: Ambiente RGB
            variables:
              enable_slider: True
      - type: conditional
        conditions:
          - condition: and
            conditions:
              - condition: state
                entity: input_boolean.debug_mode
                state: "on"
              - condition: user
                users:
                  - 93b63ea3789847298e4689605129c943
        card:
          type: vertical-stack
          cards:
            - type: custom:button-card
              template: hc_device_card_wge
              icon: mdi:lightbulb-night-outline
              entity: input_boolean.night_light_nursery
              name: Nachtlicht
              show_label: true
              label: "[[[ return states[entity.entity_id].state == 'on' ? 'AN' : 'AUS'; ]]]"
              state:
                - value: "on"
                  icon: mdi:lightbulb-night
  - type: custom:bubble-card
    card_type: separator
    name: Geräte
    icon: mdi:devices
  - square: false
    columns: 3
    type: grid
    cards:
      - type: "custom:button-card"
        entity: switch.steckdosenleiste_kinderzimmer_stecker1
        template: hc_switch_card
        icon: fapro:plug
        name: Tisch 1

      - type: "custom:button-card"
        entity: switch.steckdosenleiste_kinderzimmer_stecker3
        template: hc_switch_card
        icon: fapro:plug
        name: Tisch 2

      - type: "custom:button-card"
        entity: switch.shellyplusplugs_e465b8b49ef4_switch_0
        template: hc_switch_card
        icon: fapro:plug
        name: Tisch 3

  - square: false
    columns: 2
    type: grid
    cards:
      - type: "custom:button-card"
        entity: switch.steckdosenleiste_kinderzimmer_usb
        template: hc_switch_card
        icon: fapro:plug
        name: Tisch USB

      - type: "custom:button-card"
        entity: switch.shellyazplug_5432046783f8_switch_0
        template: hc_switch_card
        icon: fapro:plug
        name: Media
        variables:
          power_entity: sensor.shellyazplug_5432046783f8_switch_0_power

  - type: custom:bubble-card
    card_type: separator
    name: Media
    icon: mdi:music
  - type: custom:button-card
    template: hc_mediaplayer_tv_card_wge
    entity: media_player.apple_tv_alissa
