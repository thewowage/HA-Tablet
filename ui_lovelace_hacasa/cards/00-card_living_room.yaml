type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: Wohnzimmer
    icon: mdi:sofa-outline
    hash: "#living-room"
    button_type: name
    card_layout: large

  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: entity
        entity: binary_sensor.fenster_wohnzimmer_rechts_offnung
        icon_color: red
        icon: fapro:window-open
      - type: entity
        entity: binary_sensor.fenster_wohnzimmer_links_offnung
        icon_color: red
        icon: fapro:window-open

  - type: custom:bubble-card
    card_type: separator
    name: Klima
    icon: mdi:thermostat
    sub_button:
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_wohnzimmer_temperatur
        color: var(--color-red)
        icon: fapro:thermometer
        tap_action:
          action: more-info

      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_wohnzimmer_luftfeuchtigkeit
        color: var(--color-blue)
        icon: fapro:humidity
        tap_action:
          action: more-info
  - type: custom:bubble-card
    card_type: climate
    entity: climate.wohnzimmer
    sub_button:
      - name: HVAC modes menu
        select_attribute: hvac_modes
        state_background: false
        show_arrow: false
    show_state: true

  - type: custom:bubble-card
    card_type: separator
    name: Lichter
    icon: mdi:lightbulb-group
  - square: false
    type: grid
    columns: 2
    cards:
      - type: custom:button-card
        template: hc_light_card_wge
        entity: light.deckenlicht_wohnzimmer
        name: Deckenlicht
        variables:
          enable_slider: True

      - type: custom:button-card
        template: hc_light_card_wge
        entity: light.ambiente
        name: Ambiente
        variables:
          enable_slider: True

  - type: custom:bubble-card
    card_type: separator
    name: Geräte
    icon: mdi:devices
  - square: false
    columns: 2
    type: grid
    cards:
      - type: custom:restriction-card
        restrictions:
          pin:
            code: 0403
        card:
          type: "custom:button-card"
          entity: switch.shellyazplug_5432046783f0_switch_0
          template: hc_switch_card
          name: Computertisch
          icon: fapro:plug
          variables:
            power_entity: sensor.shellyazplug_5432046783f0_switch_0_power

      - type: "custom:button-card"
        entity: switch.shellyplusplugs_e465b8b49ef4_switch_0
        template: hc_switch_card
        icon: fapro:plug
        name: Sofa
        variables:
          power_entity: sensor.shellyplusplugs_e465b8b49ef4_switch_0_power

  - type: custom:button-card
    template: hc_philips_air_purifier_card_wge
    entity: fan.wohnzimmer
  - type: custom:bubble-card
    card_type: separator
    name: Media
    icon: mdi:music
  - type: conditional
    conditions:
      - entity: media_player.wohnzimmer
        state_not: standby
      - entity: media_player.wohnzimmer
        state: "off"
    card:
      type: custom:button-card
      template: hc_mediaplayer_tv_card_wge
      entity: media_player.apple_tv_wohnzimmer
