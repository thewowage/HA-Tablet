                                      if (entity.state == "disconnected") return "Getrennt";
                                      else if (entity.state == "connected") return "Verbunden";
                                      else if (entity.state == "pending") return "Anstehend";
                                      else if (entity.state == "firmware_mismatch") return Firmware<br>Diskrepanz;
                                      else if (entity.state == "upgrading") return "Wird aufgerüstet";
                                      else if (entity.state == "provisioning") return "Wird<br>bereitgestellt";
                                      else if (entity.state == "heartbeat_missed") return "Heartbeat<br>verpasst";
                                      else if (entity.state == "adopting") return "Wird übernommen";
                                      else if (entity.state == "deleting") return "Wird gelöscht";
                                      else if (entity.state == "inform_error") return "Inform-Fehler";
                                      else if (entity.state == "adoption_failed") return "Übernahme<br>fehlgeschlagen";
