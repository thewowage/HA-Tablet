                          - square: false
                            columns: 1
                            type: grid
                            cards:
                              - type: custom:button-card
                                entity: sensor.unifi_dream_router_state
                                template: hc_sensor_card_big_wge
                                name: UniFi Dream Router
                                variables:
                                  icon_on: mdi:router-wireless
                                  icon_off: mdi:router-wireless-off
                                  background_color_on: var(--green)
                                  background_color_off: var(--red)
                                  color_on: var(--black)
                                  color_off: var(--black)
                                  update_state: update.unifi_dream_router
                                  state: |
                                    [[[ 
                                      if (entity.state == "disconnected") return "Getrennt";
                                      else if (entity.state == "connected") return "Verbunden";
                                      else if (entity.state == "pending") return "Anstehend";
                                      else if (entity.state == "firmware_mismatch") return Firmware<br>Diskrepanz;
                                      else if (entity.state == "upgrading") return "Wird aufgerüstet";
                                      else if (entity.state == "provisioning") return "Wird<br>bereitgestellt";
                                      else if (entity.state == "heartbeat_missed") return "Heartbeat<br>verpasst";
                                      else if (entity.state == "adopting") return "Wird übernommen";
                                      else if (entity.state == "deleting") return "Wird gelöscht";
                                      else if (entity.state == "inform_error") return "Inform-Fehler";
                                      else if (entity.state == "adoption_failed") return "Übernahme<br>fehlgeschlagen";
                                      else if (entity.state == "isolated") return "Isoliert";
                                      else return "Zustand<br>nicht bekannt";
                                    ]]]
                              - type: custom:button-card
                                entity: sensor.unifi_dream_router_storage_utilization
                                template: hc_sensor_card_small_wge
                                name: Speicherauslastung
                                variables:
                                  state_value: 95
                                  state: |
                                    [[[ 
                                      var st = states[entity.entity_id].state;
                                      var uni = ' %';
                                      return `
                                      <span style="font-size:
                                    0.9em;">${st}</span><span style="font-size:
                                    0.5em;opacity:0.7">${uni}</span>
                                      `
                                    ]]]
                              - type: custom:button-card
                                entity: sensor.unifi_dream_router_google_wan_latency
