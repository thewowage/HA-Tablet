type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: System Dashboard
    icon: mdi:server-network
    hash: "#system_card"
    button_type: name
    close_action:
      action: perform-action
      perform_action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.system_view_homeassistant
          - input_boolean.system_view_unraid
          - input_boolean.system_view_printer
          - input_boolean.system_view_usw_flex_mini_1
          - input_boolean.system_view_access_point_ac_lite
          - input_boolean.system_view_u6_mesh
          - input_boolean.system_view_naswge_diagnose
          - input_boolean.system_view_naswge_steuerelemente

  - type: vertical-stack
    cards:
      #- type: conditional
      #  conditions:
      #    - condition: screen
      #      media_query: "(min-width: 0px) and (max-width: 767px)"
      #  card:
      #    type: custom:button-card
      #    template: hc_navigationbar_card
      #    variables:
      #      icon_color_5: white
      #      background_color_5: var(--primary-color)

      ## HEADER ###############################################################
      #########################################################################
      #- type: vertical-stack
      #  cards:
          - type: custom:button-card
            template: hc_title_card_icon_wge
            name: ''
            variables:
              #entity1: input_boolean.system_view_homeassistant
              #entity1_icon: mdi:router-wireless
              entity2: input_boolean.system_view_homeassistant
              entity2_icon: mdi:home-assistant
              entity3: input_boolean.system_view_unraid
              entity3_icon: mdi:nas
              entity4: input_boolean.system_view_printer
              entity4_icon: mdi:printer

          - type: conditional
            condition: or
            conditions:
              - condition: state
                entity: input_boolean.system_view_homeassistant
                state: "off"
              - condition: state
                entity: input_boolean.system_view_unraid
                state: "off"
              - condition: state
                entity: input_boolean.system_view_printer
                state: "off"
            card:
              type: vertical-stack
              cards:
                ## HEADER UNIFI DREAM ROUTER ############################################
                #########################################################################
                - type: conditional
                  condition: or
                  conditions:
                    - condition: state
                      entity: input_boolean.system_view_usw_flex_mini_1
                      state: "off"
                    - condition: state
                      entity: input_boolean.system_view_access_point_ac_lite
                      state: "off"
                    - condition: state
                      entity: input_boolean.system_view_u6_mesh
                      state: "off"
                  card:
                    type: vertical-stack
                    cards:
                      - type: custom:button-card
                        template: hc_title_card_small
                        label: '[[[ return states["sensor.unifi_dream_router_update_version"].state]]]'
                        name: UniFi Dream Router

                ## HEADER USW FLEX MINI #################################################
                #########################################################################
                - type: conditional
                  condition: or
                  conditions:
                    - condition: state
                      entity: input_boolean.system_view_usw_flex_mini_1
                      state: "on"
                    - condition: state
                      entity: input_boolean.system_view_access_point_ac_lite
                      state: "off"
                    - condition: state
                      entity: input_boolean.system_view_u6_mesh
                      state: "off"
                  card:
                    type: vertical-stack
                    cards:
                      - type: custom:button-card
                        template: hc_title_card_small
                        name: USW-Flex-Minis
                        label: '[[[ return states["sensor.usw_flex_mini_1_update_version"].state]]]'

                ## HEADER ACCESS POINT AC LIGHT #########################################
                #########################################################################
                - type: conditional
                  condition: or
                  conditions:
                    - condition: state
                      entity: input_boolean.system_view_usw_flex_mini_1
                      state: "off"
                    - condition: state
                      entity: input_boolean.system_view_access_point_ac_lite
                      state: "on"
                    - condition: state
                      entity: input_boolean.system_view_u6_mesh
                      state: "off"
                  card:
                    type: vertical-stack
                    cards:
                      - type: custom:button-card
                        template: hc_title_card_small
                        name: Access Point AC Lite
                        label: '[[[ return states["sensor.access_point_ac_lite_update_version"].state]]]'

                ## HEADER U6 MESH #######################################################
                #########################################################################
                - type: conditional
                  condition: or
                  conditions:
                    - condition: state
                      entity: input_boolean.system_view_usw_flex_mini_1
                      state: "off"
                    - condition: state
                      entity: input_boolean.system_view_access_point_ac_lite
                      state: "off"
                    - condition: state
                      entity: input_boolean.system_view_u6_mesh
                      state: "on"
                  card:
                    type: vertical-stack
                    cards:
                      - type: custom:button-card
                        template: hc_title_card_small
                        name: U6 Mesh
                        label: '[[[ return states["sensor.u6_mesh_update_version"].state]]]'

                ## NETWORK INPUT BOOLEAN MENU ###########################################
                #########################################################################
                - type: grid
                  columns: 3
                  square: false
                  cards:
                    - type: custom:button-card
                      template: hc_button_sensor_card_wge
                      icon: mdi:lan
                      entity: input_boolean.system_view_usw_flex_mini_1
                      name: USW-Flex-Mini
                      variables:
                        tap_action: input_boolean.system_view_usw_flex_mini_1
                        state: '[[[ return states["sensor.usw_flex_mini_1_update"].state ]]]'
                        update_state: update.usw_flex_mini

                    - type: custom:button-card
                      template: hc_button_sensor_card_wge
                      icon: mdi:lan
                      entity: input_boolean.system_view_access_point_ac_lite
                      name: Access Point
                      variables:
                        tap_action: input_boolean.system_view_access_point_ac_lite
                        state: '[[[ return states["sensor.access_point_ac_lite_update"].state ]]]'
                        update_state: update.access_point_ac_lite

                    - type: custom:button-card
                      template: hc_button_sensor_card_wge
                      icon: mdi:lan
                      entity: input_boolean.system_view_u6_mesh
                      name: U6 Mesh
                      variables:
                        tap_action: input_boolean.system_view_u6_mesh
                        state: '[[[ return states["sensor.u6_mesh_update"].state ]]]'
                        update_state: update.u6_mesh

                ## UNIFI DREAM ROUTER CARD ##############################################
                #########################################################################
