          #########################################################################
          - type: conditional
            condition: or
            conditions:
              - condition: state
                entity: input_boolean.system_view_homeassistant
                state: "off"
              - condition: state
                entity: input_boolean.system_view_unraid
                state: "off"
              - condition: state
                entity: input_boolean.system_view_printer
                state: "on"
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  template: hc_title_card_small
                  name: HP Smart Tank 7300e-Serie
                  label: '[[[ return "Status: " + states["sensor.hp_7300_state"].state]]]'
                - type: grid
                  square: false
                  columns: 2
                  cards:
                    - square: false
                      columns: 1
                      type: grid
                      cards:
                        - type: custom:button-card
                          entity: binary_sensor.smart_tank_7300_series_10_75_99_29_eprint_status
                          template: hc_sensor_card_big_wge
                          name: HP Smart Tank 7300e-Serie
                          icon: mdi:printer
                          variables:
                            state: |
                              [[[
                                if (states[entity.entity_id].state == "on") return "Status: verfügbar";
                                else return "nicht";
                              ]]]

                        - type: custom:button-card
                          entity: binary_sensor.smart_tank_7300_series_10_75_99_29_eprint_status
                          template: hc_sensor_card_small_wge
                          name: ePrint Status
                          variables:
                            state_value_on_off: "on"
                            state: |
                              [[[ 
                                var st = states[entity.entity_id].state;
                                return `<span style="font-size:0.9em;">${st}</span></span>`
                              ]]]

                        - type: custom:button-card
                          entity: sensor.smart_tank_7300_series_10_75_99_29_cyanmagentayellow_inkcartridge_level
                          template: hc_sensor_card_small_wge
                          name: Tinte Level
                          icon: mdi:water
                          variables:
                            state: |
                              [[[ 
                                var st = states[entity.entity_id].state;
                                var uni = ' %';
                                return `
                                <span style="font-size:
                              0.9em;">${st}</span><span style="font-size:
                              0.5em;opacity:0.7">${uni}</span>
                                `
                              ]]]

                    - square: false
                      columns: 1
                      type: grid
                      cards:

                        - type: custom:button-card
                          entity: sensor.smart_tank_7300_series_10_75_99_29_copy_gesamtseiten
                          template: hc_sensor_card_small_wge
                          name: Seiten kopiert
                          variables:
                            state_value_on_off: "on"
                            state: |
                              [[[ 
                                var st = states[entity.entity_id].state;
                                var uni = ' Seiten';
                                return `
                                <span style="font-size:
                              0.9em;">${st}</span><span style="font-size:
                              0.5em;opacity:0.7">${uni}</span>
                                `
                              ]]]

                        - type: custom:button-card
                          entity: sensor.smart_tank_7300_series_10_75_99_29_printer_gesamtseiten
                          template: hc_sensor_card_small_wge
                          name: Seiten gedruckt
                          variables:
                            state_value_on_off: "on"
                            state: |
                              [[[ 
                                var st = states[entity.entity_id].state;
                                var uni = ' Seiten';
                                return `
                                <span style="font-size:
                              0.9em;">${st}</span><span style="font-size:
                              0.5em;opacity:0.7">${uni}</span>
                                `
                              ]]]

                        - type: custom:button-card
                          entity: sensor.smart_tank_7300_series_10_75_99_29_scanner_gesamtseiten
                          template: hc_sensor_card_small_wge
                          name: Seiten gescant
                          variables:
                            state_value_on_off: "on"
                            state: |
                              [[[ 
                                var st = states[entity.entity_id].state;
                                var uni = ' Seiten';
                                return `
                                <span style="font-size:
                              0.9em;">${st}</span><span style="font-size:
                              0.5em;opacity:0.7">${uni}</span>
                                `
                              ]]]

                        - type: custom:button-card
                          entity: sensor.smart_tank_7300_series_10_75_99_29_printer_gesamt_papierstaus
                          template: hc_sensor_card_small_wge
                          name: Papierstaus
                          variables:
                            state_value_on_off: "on"
                            state: |
                              [[[ 
                                var st = states[entity.entity_id].state;
                                var uni = ' Seiten';
                                return `
                                <span style="font-size:
                              0.9em;">${st}</span><span style="font-size:
                              0.5em;opacity:0.7">${uni}</span>
                                `
                              ]]]