type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: Müllabfuhr
    icon: mdi:delete
    hash: "#garbage_collection_card"
    button_type: name

  - type: vertical-stack
    cards:
      - type: "custom:button-card"
        template: hc_garbage_card
        entity: input_boolean.toggle_button_notify_garbage

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            template: hc_sensor_card_garbage
            entity: sensor.waste_collection_waste
            name: Schwarze <br> Tonne
            tap_action:
              action: none
            hold_action:
              action: none

          - type: custom:button-card
            template: hc_sensor_card_garbage
            entity: sensor.waste_collection_bio
            name: Bio <br> Tonne
            tap_action:
              action: none
            hold_action:
              action: none

          - type: custom:button-card
            template: hc_sensor_card_garbage
            entity: sensor.waste_collection_plastic
            name: Gelbe <br> Tonne
            tap_action:
              action: none
            hold_action:
              action: none

          - type: custom:button-card
            template: hc_sensor_card_garbage
            entity: sensor.waste_collection_paper
            name: Papier <br> Tonne
            tap_action:
              action: none
            hold_action:
              action: none

      - type: grid
        columns: 1
        square: false
        cards:
          - type: custom:button-card
            template: hc_sensor_card_garbage
            entity: sensor.waste_collection_bulky_waste
            name: Sperrmüll
            tap_action:
              action: none
            hold_action:
              action: none
