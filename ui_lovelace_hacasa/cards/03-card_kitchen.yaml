type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: Küche
    icon: mdi:silverware-variant
    hash: "#kitchen"
    button_type: name
    sub_button: []

  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: entity
        entity: binary_sensor.fenster_kuche_offnung
        icon_color: red
        icon: fapro:window-open

      - type: entity
        entity: binary_sensor.fenster_abstellkammer_offnung
        icon_color: red
        icon: fapro:window-open

      - type: entity
        entity: group.kitchen_doors
        icon_color: red
        icon: fapro:window-open

  - type: custom:bubble-card
    card_type: separator
    name: Klima
    icon: mdi:thermostat
    sub_button:
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_kuche_temperatur
        color: var(--color-red)
        icon: fapro:thermometer
        tap_action:
          action: more-info

      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_kuche_luftfeuchtigkeit
        color: var(--color-blue)
        icon: fapro:humidity
        tap_action:
          action: more-info

  - square: false
    type: grid
    columns: 2
    cards:
      - type: custom:button-card
        template: hc_light_card_wge
        entity: light.deckenlicht_kuche
        name: Deckenlicht
        variables:
          enable_slider: True

      - type: custom:button-card
        template: hc_light_card_wge
        entity: switch.spots_kitchen
        name: Spots

  - type: custom:bubble-card
    card_type: separator
    name: Geräte
    icon: mdi:devices
  - square: false
    columns: 2
    type: grid
    cards:
      - type: custom:restriction-card
        restrictions:
          pin:
            code: 0403
        card:
          type: "custom:button-card"
          entity: switch.shellyplusplugs_e465b8451910_switch_0
          template: hc_switch_card
          name: Kühlschrank
          icon: fapro:plug
          variables:
            power_entity: sensor.shellyplusplugs_e465b8451910_switch_0_power

      - type: "custom:button-card"
        entity: switch.shellyazplug_543204663e38_switch_0
        template: hc_switch_card
        icon: fapro:plug
        name: Kaffeemaschine
        variables:
          power_entity: sensor.shellyazplug_543204663e38_switch_0_power

  - square: false
    columns: 1
    type: grid
    cards:
      - type: custom:button-card
        entity: input_select.washing_machine_state
        name: |
          [[[
            if (states['input_select.washing_machine_state'].state == 'aus') {
              return 'Dishwasher';
            } else {
              return 'Dishwasher' + " (" + states['sensor.socket_washing_machine_stromstarke'].state + " kWH)";
            }
          ]]]
        icon: |
          [[[
            if (states['input_select.washing_machine_state'].state == 'arbeitet') {
              return 'mdi:circle-half-full';
            } else if (states['input_select.washing_machine_state'].state == 'fertig') {
              return 'mdi:dishwasher';
            } else if (states['input_select.washing_machine_state'].state == 'aus') {
              return 'mdi:dishwasher-off';
            }
          ]]]
        show_name: true
        show_icon: true
        show_label: true
        show_state: false
        tap_action:
          action: more-info
        hold_action:
          action: more-info
        double_tap_action:
          action: call-service
          service: input_boolean.turn_off
          service_data:
            entity_id: input_boolean.chores_dishwasher
        label: |
          [[[
            if (states['input_select.washing_machine_state'].state == 'Running') {
              return 'arbeitet';
            } else if (states['input_select.washing_machine_state'].state == 'Clean') {
              return 'fertig';
            } else if (states['input_select.washing_machine_state'].state == 'Off') {
              return 'aus';
            }
          ]]]
        custom_fields:
          bar: |
            [[[
              var color = "var(--green)";
              var state = 100 - states['sensor.waschmaschine_timer'].attributes.remaining_perc;
              if (state < 10) color = "var(--red)";
              else if (state < 50) color = "var(--yellow)";
              else if (state < 90) color = "var(--orange)";
              return `
              <div>
              <div style="background:${color}; height: 12px; width:${state}%">
              </div>
              </div>`
            ]]]
          rem:
            card:
              type: conditional
              conditions:
                - condition: state
                  entity: input_select.washing_machine_state
                  state: arbeitet
              card:
                type: custom:button-card
                entity: sensor.waschmaschine_timer
                name: |
                  [[[
                  var remainingTime = states['sensor.waschmaschine_timer'].attributes.remaining;
                  return `${remainingTime}`;
                  ]]]
                show_icon: false
                styles:
                  card:
                    - width: min
                    - background: none
                    - overflow: visible
                    - box-shadow: none
                  name:
                    - font-size: 12px
                    - color: var(--black)
                    - font-weight: 500
          start:
            card:
              type: conditional
              conditions:
                - condition: state
                  entity: input_select.washing_machine_state
                  state: arbeitet
              card:
                type: custom:button-card
                entity: sensor.waschmaschine_timer
                name: |
                  [[[
                  var endTime = states['sensor.waschmaschine_timer'].attributes.triggered;
                  // Extract time from the end time
                  var time = new Date(endTime).toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', hour12: false});
                  return `${time} Uhr`;
                  ]]]
                show_icon: false
                styles:
                  card:
                    - width: min
                    - padding: 5px
                    - background: none
                    - box-shadow: none
                  name:
                    - font-size: 12px
                    - color: var(--black)
          end:
            card:
              type: conditional
              conditions:
                - condition: state
                  entity: input_select.washing_machine_state
                  state: arbeitet
              card:
                type: custom:button-card
                entity: sensor.waschmaschine_timer
                name: |
                  [[[
                  var endTime = states['sensor.waschmaschine_timer'].attributes.end_time;
                  // Extract time from the end time
                  var time = new Date(endTime).toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', hour12: false});
                  return `${time} Uhr`;
                  ]]]
                show_icon: false
                styles:
                  card:
                    - width: min
                    - padding: 5px
                    - background: none
                    - box-shadow: none
                  name:
                    - font-size: 12px
                    - color: var(--black)
          icon1:
            card:
              type: custom:button-card
              icon: mdi:dishwasher
              styles:
                card:
                  - background-color: var(--contrast1)
                  - width: 30px
                  - height: 30px
                icon:
                  - width: 18px
                  - color: var(--contrast20)
          icon2: |
            [[[
              if (states['switch.socket_washing_machine'].state == "off"){
                return '<ha-icon icon="mdi:toggle-switch-off-outline"></ha-icon>';
              } else {
                return '<ha-icon icon="mdi:toggle-switch-outline"></ha-icon>';
              }
            ]]]
        styles:
          grid:
            - grid-template-areas: '". icon1" "l l" "n icon2" "rem icon2" "bar bar" "start end"'
            - grid-template-rows: 24px 1fr 24px min-content min-content min-content
            - grid-template-columns: 60% 40%
          card:
            - height: 100%
            - padding: 1rem
            - background: |
                [[[
                  if (entity.state == 'fertig') {
                    return 'var(--green)';
                  } else if (entity.state == 'arbeitet') {
                    return 'var(--blue)';
                  } else if (entity.state == 'aus') {
                    return 'var(--contrast2)';
                  } else {
                    return 'var(--primary-text-color)';
                  }
                ]]]
          img_cell:
            - position: absolute
            - top: 20%
            - left: 40%
            - overflow: visible
          icon:
            - position: absolute
            - width: 20em
            - opacity: 20%
            - color: |
                [[[
                  if (entity.state == 'fertig') {
                    return 'var(--black)';
                  } else if (entity.state == 'arbeitet') {
                    return 'var(--black)';
                  } else if (entity.state == 'aus') {
                    return 'var(--contrast20)';
                  } else {
                    return 'var(--primary-background-color)';
                  }
                ]]]
            - transform: rotate(-20deg)
            - animation: |
                [[[
                  if (states['input_select.washing_machine_state'].state == 'fertig') {
                    return 'null';
                  } else if (states['input_select.washing_machine_state'].state == 'arbeitet') {
                    return 'rotating 2s linear infinite';
                  }
                ]]]
          label:
            - text-align: left
            - font-size: 18px
            - font-weight: 500
            - justify-self: start
            - align-self: end
            - overflow: visible
            - color: |
                [[[
                  if (entity.state == 'fertig') {
                    return 'var(--black)';
                  } else if (entity.state == 'arbeitet') {
                    return 'var(--black)';
                  } else if (entity.state == 'aus') {
                    return 'var(--contrast20)';
                  } else {
                    return 'var(--primary-background-color)';
                  }
                ]]]
          name:
            - text-align: left
            - font-size: 12px
            - opacity: 0.7
            - justify-self: start
            - align-self: center
            - overflow: visible
            - color: |
                [[[
                  if (entity.state == 'fertig') {
                    return 'var(--black)';
                  } else if (entity.state == 'arbeitet') {
                    return 'var(--black)';
                  } else if (entity.state == 'aus') {
                    return 'var(--contrast20)';
                  } else {
                    return 'var(--primary-background-color)';
                  }
                ]]]
          custom_fields:
            bar:
              - justify-self: start
              - width: 100%
              - height: |
                  [[[
                    if (entity.state == 'arbeitet') {
                      return '12px';
                    } else {
                      return '0px';
                    }
                  ]]]
              - background: var(--contrast1)
              - border-radius: 24px
            end:
              - justify-self: end
            start:
              - justify-self: start
            rem:
              - justify-self: start
              - align-self: end
              - height: |
                  [[[
                    if (entity.state == 'arbeitet') {
                      return '27px';
                    } else {
                      return '0px';
                    }
                  ]]]
            icon1:
              - justify-self: end
              - width: 24px
              - color: |
                  [[[
                    if (entity.state == 'fertig') {
                      return 'var(--black)';
                    } else if (entity.state == 'arbeitet') {
                      return 'var(--black)';
                    } else if (entity.state == 'aus') {
                      return 'var(--contrast20)';
                    } else {
                    return 'var(--primary-background-color)';
                  }
                  ]]]
            icon2:
              - justify-self: end
              - align-self: end
              - width: 24px
              - color: |
                  [[[
                    if (entity.state == 'fertig') {
                      return 'var(--black)';
                    } else if (entity.state == 'arbeitet') {
                      return 'var(--black)';
                    } else if (entity.state == 'aus') {
                      return 'var(--contrast20)';
                  } else {
                    return 'var(--primary-background-color)';
                  }
                  ]]]
          hold_action:
            action: more-info
