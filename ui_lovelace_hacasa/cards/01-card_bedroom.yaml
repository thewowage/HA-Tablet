type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: Schlafzimmer
    icon: mdi:bed-king-outline
    hash: "#bedroom"
    button_type: name
    sub_button: []
  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: entity
        entity: binary_sensor.fenster_schlafzimmer_offnung
        icon_color: red
        icon: fapro:window-open

  - type: custom:bubble-card
    card_type: separator
    name: Klima
    icon: mdi:thermostat
    sub_button:
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_wohnzimmer_temperatur
        color: var(--color-red)
        icon: fapro:thermometer
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.multisensor_wohnzimmer_luftfeuchtigkeit
        color: var(--color-blue)
        icon: fapro:humidity
        tap_action:
          action: more-info
  - type: custom:bubble-card
    card_type: separator
    name: Lichter
    icon: mdi:lightbulb-group
  - square: false
    type: grid
    columns: 1
    cards:
      - type: custom:button-card
        template: hc_light_card_wge
        entity: light.deckenlicht_schlafzimmer
        name: Deckenlicht
        variables:
          enable_slider: True
  - type: custom:bubble-card
    card_type: separator
    name: Geräte
    icon: mdi:devices
  - square: false
    columns: 2
    type: grid
    cards:
      - type: "custom:button-card"
        entity: switch.gosund_sp112_bedroom
        template: hc_switch_card
        icon: fapro:plug
        name: Steckdose Bett
        variables:
          power_entity: sensor.gosund_sp112_bedroom_energy_current
      - type: "custom:button-card"
        entity: switch.gosund_sp112_bedroom_usb
        template: hc_switch_card
        icon: fapro:plug
        name: Steckdose USB
        variables:
          power_entity: sensor.gosund_sp112_bedroom_energy_current

  - type: custom:button-card
    template: hc_air_cleaner_card_wge
    entity: fan.luftreiniger_wohnzimmer
    name: Schlafzimmer
