  chips_big_active:
    variables:
      name: null
      entity: null
      icon: null
    entity: '[[[ return variables.entity ]]]'
    icon: '[[[ return variables.icon ]]]'
    name: '[[[ return variables.name ]]]'
    styles:
      card:
        - padding: 4px
        - background: var(--active-big)
      grid:
        - grid-template-areas: |
            "i n"        
      img_cell:
        - width: 22px
        - height: 22px
        - padding: 9px
        - background: var(--white)
        - border-radius: 100%
      icon:
        - width: 22px
        - height: 22px
        - color: var(--black)
      name:
        - padding: 0 10px
        - font-size: 14px
        - color: var(--black)
        
  chips_big:
    variables:
      name: null
      entity: null
      icon: null
    entity: '[[[ return variables.entity ]]]'
    icon: '[[[ return variables.icon ]]]'
    name: '[[[ return variables.name ]]]'
    styles:
      card:
        - padding: 4px
        - background: var(--gray800)
      grid:
        - grid-template-areas: |
            "i n"        
        - grid-template-columns: min-content 1fr
      img_cell:
        - justify-self: start
        - width: 22px
        - height: 22px
        - padding: 9px
        - background: var(--gray000)
        - border-radius: 100%
      icon:
        - width: 22px
        - height: 22px
        - color: var(--gray800)
      name:
        - justify-self: start
        - padding: 0 10px
        - font-size: 14px
        - color: var(--ha-card-background)

  chips_medium:
    variables:
      name: null
      icon: null
    icon: '[[[ return variables.icon ]]]'
    name: '[[[ return variables.name ]]]'
    styles:
      card:
        - padding: 10px 16px 10px 12px
        - background: var(--gray800)
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: min-content 1fr
      img_cell:
        - justify-self: start
        - align-self: center
        - width: 20px
        - height: 20px
        - background: none
      icon:
        - width: 20px
        - height: 20px
        - margin-top: '-1px'
        - color: var(--icon-color)
      name:
        - justify-self: start
        - font-size: 14px
        - padding-left: 4px
        - color: var(--icon-color)

  chips_medium_active:
    variables:
      name: null
      icon: null
    icon: '[[[ return variables.icon ]]]'
    name: '[[[ return variables.name ]]]'
    styles:
      card:
        - padding: 10px 16px 10px 12px
        - background: var(--active-small)
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: min-content 1fr
      img_cell:
        - justify-self: start
        - align-self: center
        - width: 20px
        - height: 20px
        - background: none
      icon:
        - width: 20px
        - height: 20px
        - margin-top: '-1px'
        - color: var(--color-green)
      name:
        - justify-self: start
        - font-size: 14px
        - padding-left: 4px
        - color: var(--ha-card-background)

  chips_small:
    variables:
      icon: null
    icon: '[[[ return variables.icon ]]]'
    show_name: false
    styles:
      card:
        - padding: 13px
        - border-radius: 50%
        - background: var(--primary-background-color)
      img_cell:
        - width: 22px
        - height: 22px
      icon:
        - width: 22px
        - height: 22px
        - color: var(--icon-color)

  chips_small_active:
    variables:
      icon: null
    icon: '[[[ return variables.icon ]]]'
    show_name: false
    styles:
      card:
        - padding: 13px
        - border-radius: 40%
        - background: var(--primary-color)
      img_cell:
        - width: 22px
        - height: 22px
      icon:
        - width: 25px
        - color: var(--ha-card-background)