---
hc_garbage_card:
  variables:
    counter: "[[[ return states['sensor.waste_collection_notify'].state ]]]"
  #label: "[[[ return variables.label ]]]"
  label: |
    [[[
      var state_day = "Tag bis Abholung " + states['sensor.waste_collection_type'].state
      var state_days = "Tage bis Abholung " + states['sensor.waste_collection_type'].state
      
      if (variables.counter === '1' ) {
        return state_day
      }
      return state_days
    ]]]
  show_name: false
  show_icon: false
  show_label: true
  show_state: false
  tap_action: none
  styles:
    grid:
      - grid-template-areas: '"item1 l" "item1 item2"'
      - grid-template-rows: 2fr 2fr
      - grid-template-columns: 30% 65%
      - column-gap: 5%
      - row-gap: 8px
    card:
      - height: auto
      - padding: 1rem
      - overflow: visible
      - justify-items: center
      - justify-content: center
      - background: |
          [[[
            if (variables.counter <= '1') {
                return 'var(--primary-color)';
            }
            else {
              return '' 
            }
          ]]]
    label:
      - text-align: left
      - font-size: 0.9rem
      - font-family: "Montserrat"
      - font-weight: 600
      - justify-self: start
      - align-self: end
    custom_fields:
      item1:
        - text-align: center
        - font-size: 3rem
        - font-family: Montserrat
        - font-weight: 700
        - justify-self: center
        - align-self: center
        - overflow: visible
        - z-index: 1
      item2:
        - align-self: start
        - align-content: start
        - align-items: start
        - background: none
  custom_fields:
    item1: >
      [[[ return variables.counter ]]]
    item2:
      card:
        type: "custom:button-card"
        entity: "[[[ return entity.entity_id ]]]"
        show_name: false
        show_icon: true
        show_label: true
        show_state: false
        tap_action:
          action: toggle
        styles:
          grid:
            - grid-template-areas: '"i l"'
            - grid-template-rows: 1fr
            - grid-template-columns: min-content 1fr
            - column-gap: 8px
          card:
            - background: none
            - overflow: visible
            - padding: 0
            - box-shadow: none
          label:
            - text-align: left
            - font-size: 12px
            - font-family: "Montserrat"
            - font-weight: 500
            - text-align: left
            - justify-self: start
            - color: var(--color-dark-gray)
          img_cell:
            - justify-self: center
          icon:
            - width: "var(--button-small)"
            - color: var(--color-dark-gray)
            - padding: 0
            - margin: 0
            - width: 20px
        state:
          - value: "off"
            label: Benachrichtigung aus
            icon: mdi:toggle-switch-off-outline
          - value: "on"
            label: Benachrichtigung an
            icon: mdi:toggle-switch
