hc_sensor_card_long_wge:
  show_state: true
  show_label: true
  styles:
    card:
      - padding: 10px
    grid:
      - grid-template-areas: "'i n s' 'i l s'"
      - grid-template-columns: min-content
      - grid-template-rows: min-content min-content
      - column-gap: 15px
    icon:
      - width: 65%
    img_cell:
      - background: var(--background-icon-color-default)
      - padding: 6px
      - border-radius: 50%
      - width: 25px
      - height: 25px
      - align-self: start
      - justify-self: end
    state:
      - text-align: right
      - font-size: 0.8rem
      - font-family: Montserrat
      - font-weight: 500
      - justify-self: end
      - align-self: center
      - opacity: 0.7
    name:
      - text-align: left
      - font-family: Montserrat
      - font-weight: 700
      - justify-self: start
      - align-self: star
      - font-size: 1rem
    label:
      - text-align: left
      - font-size: 0.8rem
      - font-family: Montserrat
      - font-weight: 500
      - justify-self: start
      - align-self: start
      - opacity: 0.7
