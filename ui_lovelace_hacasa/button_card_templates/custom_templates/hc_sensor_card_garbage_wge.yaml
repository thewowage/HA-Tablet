hc_sensor_card_garbage_wge:
  variables:
    img_cell_bg: var(--background-icon-color-default)
    icon_color: white
    item_icon_color: white
    counter: "[[[ return states[entity.entity_id].state ]]]"
    item1_name: |
      [[[
        var state_day = "Tag"
        var state_days = "Tage"
        
        if (variables.counter === '1' ) {
          return state_day
        }
        return state_days
      ]]]
  show_state: true
  show_label: true
  styles:
    card:
      - padding: 10px 10px 10px 10px
    grid:
      - grid-template-areas: |
          'i n s custom'
      - grid-template-columns: min-content 35% 25% 15%
      - grid-template-rows: min-content min-content
      - column-gap: 15px
    icon:
      - width: 65%
      - color: "[[[ return variables.icon_color ]]]"
    img_cell:
      - background: "[[[ return variables.img_cell_bg ]]]"
      - padding: 6px
      - border-radius: 50%
      - width: 25px
      - height: 25px
      - justify-self: center
      - align-self: center
      - justify-self: end
    state:
      - text-align: right
      - font-size: 2rem
      - font-family: Montserrat
      - font-weight: 500
      - justify-self: end
      - align-self: end
      - overflow: visible
      - z-index: 1
    name:
      - text-align: left
      - font-family: Montserrat
      - font-weight: 500
      - justify-self: start
      - align-self: star
      - font-size: 1rem
  custom_fields:
    custom:
      card:
        type: custom:button-card
        show_state: false
        show_label: false
        show_icon: false
        styles:
          card:
            - padding: 0px 0px 0px 0px
          custom_fields:
            item1:
              - justify-self: start
        custom_fields:
          item1:
            card:
              type: custom:button-card
              name: "[[[ return variables.item1_name ]]]"
              show_label: true
              styles:
                card:
                  - border-radius: 0px
                  - box-shadow: none
                  - padding-right: 5px
                name:
                  - justify-self: end
                  - font-size: 1rem
                  - font-family: montserrat
                  - font-weight: 500
                  - color: var(--color-dark-gray)
              tap_action:
                action: none
              hold_action:
                action: none

hc_garbage_sensor_card:
  show_name: true
  show_icon: true
  show_state: false
  show_label: true
  variables:
    item1_name: |
      [[[
        var state_day = "Tag"
        var state_days = "Tage"
        
        if (variables.counter === '1' ) {
          return states[entity.entity_id].state + state_day
        }
        return state_days
      ]]]
    label_prefix: ""
    icon_color: ""
    hc_color: ""
    state_value: ""
  label: |
    [[[ return states[entity.entity_id].state + " " + variables.item1_name]]]
  styles:
    grid:
      - grid-template-areas: |
          "n n" 
          "l item1"
      - grid-template-rows: 1fr 1fr
    card:
      - padding: 20px
      - height: 110px
    name:
      - text-align: left
      - font-size: 1rem
      - font-family: Montserrat
      - font-weight: 800
      - justify-self: start
      - align-self: start
    label:
      - opacity: 0.6
      - justify-self: start
      - align-self: end
      - font-family: Montserrat
      - font-size: 1.2rem
      - font-weight: 500
    img_cell:
      - position: absolute
      - top: 10%
      - left: 30%
      - overflow: visible
    icon:
      - position: absolute
      - width: 4em
      - opacity: 30%
      - color: "[[[ return variables.icon_color ]]]"
