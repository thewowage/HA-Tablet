hc_button_card_wge:
  state:
    - value: "on"
      styles:
        icon:
          - color: white
        img_cell:
          - background: var(--primary-color)
    - value: "off"
      styles:
        icon:
          - background: var(--color-light-gray-card)
  styles:
    card:
      - padding: 10px 25px 10px 10px
    grid:
      - grid-template-areas: "'i n' 'i l'"
      - grid-template-columns: min-content
      - grid-template-rows: min-content min-content
      - column-gap: 15px
    icon:
      - width: 60%
      - color: white
    img_cell:
      - background: var(--opacity-contrast-100)
      - padding: 6px
      - border-radius: 50%
      - width: 25px
      - height: 25px
      - align-self: start
    name:
      - text-align: left
      - font-size: 12px
      - font-family: Montserrat
      - font-weight: 600
      - justify-self: start
      - align-self: end
    state:
      - text-align: left
      - font-size: 0.8rem
      - font-family: Montserrat
      - font-weight: 500
      - justify-self: start
      - align-self: center
      - opacity: 0.7
    label:
      - justify-self: start
      - align-self: start
      - font-family: montserrat
      - font-weight: 600
      - font-size: 10px
      - color: var(--color-dark-gray)
    custom_fields:
      indicator:
        - justify-self: end
