hc_sensor_card_garbage:
  template: hc_base_card
  show_name: true
  show_icon: true
  show_state: false
  show_last_changed: false
  variables:
    item1_name: |
      [[[
        var state_day = "Tag"
        var state_days = "Tage"
        
        if (variables.counter === '1' ) {
          return states[entity.entity_id].state + state_day
        }
        return state_days
      ]]]
    hc_card_color: var(--primary-color)
  label: |
    [[[ return states[entity.entity_id].state + " " + variables.item1_name]]]
  state:
    - value: "1"
      operator: "<="
      icon: "[[[ return variables.on_icon ]]]"
      styles:
        card:
          - background: "[[[ return variables.hc_card_color ]]]"
        name:
          - color: white
        state:
          - color: white
        icon:
          - color: white
        img_cell:
          - background: var(--opacity-contrast-100)
        label:
          - color: white
    - value: "off"
      icon: "[[[ return variables.off_icon ]]]"
  styles:
    grid:
      - grid-template-areas: |
          'n i'
          'l l'
      - grid-template-rows: min-content 1fr min-content
      - grid-template-columns: 1fr 1fr
    card:
      - padding: 12px
    state:
      - justify-self: start
      - font-size: 20px
      - font-weight: 800
      - padding-bottom: 10px
    name:
      - text-align: left
      - font-size: 15px
      - font-weight: 500
      - justify-self: start
      #- align-self: end
      - overflow: visible
      - padding-bottom: 10px
    label:
      - justify-self: start
      - align-self: end
      - font-size: 20px
      - font-weight: 600
