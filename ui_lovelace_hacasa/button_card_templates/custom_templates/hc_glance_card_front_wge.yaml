hc_glance_card_front_wge:
  variables:
    entity1:
    entity1_icon:
    entity1_name:
    entity1_icon_state:
    entity1_icon_color_state_on:
    entity1_icon_color_state_off:
    entity1_action:
    entity1_path:
    entity2:
    entity2_icon:
    entity2_name:
    entity2_icon_state:
    entity2_icon_color_state_on:
    entity2_icon_color_state_off:
    entity2_action:
    entity2_path:
    entity3:
    entity3_name:
    entity3_icon:
    entity3_icon_state:
    entity3_icon_color_state_on:
    entity3_icon_color_state_off:
    entity3_action:
    entity3_path:
  styles:
    grid:
      - grid-template-areas: |
          [[[
            if (variables.entity1 && variables.entity2 && variables.entity3) {
                return '"item1 item2 item3"';
            }
            else if (variables.entity1 && variables.entity2) {
              return '"item1 item3 item2"';
            }
            else {
              return '"item2 item1 item3"';
            }
          ]]]
      - grid-template-columns: 1fr 1fr 1fr
    card:
      - padding: 18px
    custom_fields:
      item1:
        - justify-self: |
            [[[
              if (variables.entity1 && variables.entity2 && variables.entity3) {
                  return 'start';
              }
              else if (variables.entity1 && variables.entity2){
                return 'start';
              }
              else {
                return 'center' 
              }
            ]]]
      item2:
        - justify-self: |
            [[[
              if (variables.entity1 && variables.entity2 && variables.entity3) {
                  return 'center';
              }
              else if (variables.entity1 && variables.entity2){
                return 'end';
              }
              else {
                return 'start' 
              }
            ]]]
      item3:
        - justify-self: |
            [[[
              if (variables.entity1 && variables.entity2 && variables.entity3) {
                  return 'end';
              }
              else if (variables.entity1 && variables.entity2){
                return 'center';
              }
              else {
                return 'end' 
              }
            ]]]
  custom_fields:
    item1:
      card:
        type: custom:button-card
        show_state: true
        name: "[[[ return variables.entity1_name]]]"
        icon: "[[[ return variables.entity1_icon]]]"
        entity: "[[[ return variables.entity1 ]]]"
        styles: &styles
          card:
            - border-radius: 0px
            - box-shadow: none
            - padding-right: 5px
            - background: none
          grid:
            - grid-template-areas: '"i n" "i s"'
            - grid-template-columns: min-content
            - column-gap: 10px
          icon:
            - width: 20px
            - color: |
                [[[
                  if (variables.entity1_icon_state && variables.entity1_icon_color_state_on && states[variables.entity1].state > variables.entity1_icon_state) return variables.entity1_icon_color_state_on;
                  else return variables.entity1_icon_color_state_off;
                ]]]
            - width: 20px
          img_cell:
            - width: 20px
          name:
            - justify-self: start
            - font-size: 10px
            - font-weight: 500
            - color: var(--subtext-color)
          state:
            - justify-self: start
            - font-size: 15px
            - font-weight: 700
        tap_action:
          action: "[[[ return variables.entity1_action]]]"
          navigation_path: "[[[ return variables.entity1_path]]]"

    item2:
      card:
        type: custom:button-card
        icon: "[[[ return variables.entity2_icon]]]"
        name: "[[[ return variables.entity2_name]]]"
        entity: "[[[ return variables.entity2 ]]]"
        show_state: true
        styles:
          <<: *styles
          icon:
            - color: |
                [[[
                  if (variables.entity2_icon_state && variables.entity2_icon_color_state_on && states[variables.entity2].state > variables.entity2_icon_state) return variables.entity2_icon_color_state_on;
                  else return variables.entity2_icon_color_state_off;
                ]]]
            - width: 20px
        tap_action:
          action: "[[[ return variables.entity2_action]]]"
          navigation_path: "[[[ return variables.entity2_path]]]"

    item3:
      card:
        type: custom:button-card
        entity: "[[[ return variables.entity3 ]]]"
        name: "[[[ return variables.entity3_name]]]"
        icon: "[[[ return variables.entity3_icon]]]"
        show_state: true
        styles:
          <<: *styles
          icon:
            - color: |
                [[[
                  if (variables.entity3_icon_state && variables.entity3_icon_color_state_on && states[variables.entity3].state > variables.entity3_icon_state) return variables.entity3_icon_color_state_on;
                  else return variables.entity3_icon_color_state_off;
                ]]]
            - width: 20px
        tap_action:
          action: "[[[ return variables.entity3_action]]]"
          navigation_path: "[[[ return variables.entity3_path]]]"
