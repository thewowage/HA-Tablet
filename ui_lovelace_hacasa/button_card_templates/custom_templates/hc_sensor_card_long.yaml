hc_sensor_card_long:
  show_state: true
  show_label: true
  styles:
    card:
      - padding: 8px 25px 0px 10px
    grid:
      - grid-template-areas: |
          'i n s' 
          'i l s'
      - grid-template-columns: min-content
      - grid-template-rows: min-content min-content
      - column-gap: 15px
    icon:
      - width: 50%
    img_cell:
      - background: var(--background-icon-color-default)
      - padding: 6px
      - border-radius: 50%
      - width: 25px
      - height: 25px
      - align-self: start
      - margin-bottom: 10px
      - justify-self: end
    name:
      - text-align: left
      - font-size: 1rem
      - font-family: Montserrat
      - font-weight: 500
      - justify-self: start
      - align-self: center
      - overflow: visible
      - font-size: 0.9rem
      - margin-top: -4%
    state:
      - justify-self: end
      - font-size: 1rem
      - font-weight: 700
      - padding-bottom: 10px
      - font-family: montserrat
    label:
      - text-align: left
      - font-size: 0.7rem
      - margin-top: -2%
      - font-family: Montserrat
      - font-weight: 500
      - justify-self: start
      - align-self: start
      - opacity: 0.5
      - overflow: visible