hc_systeme_card_wge:
  variables:
    show_window_state: false
    window_open_boolean: null
    show_mode_state: false
    show_graph: true
    graph_entity:
    graph_color: var(--color-red)
  show_label: true
  show_state: true
  state_display: |
    [[[
      var state = "Momentan " + states[entity.entity_id].attributes.current_temperature +'<p style="font-size:10px;display:inline;vertical-align:text-top">°</p>'
      
      if (variables.show_mode_state == true & states[entity.entity_id].state === "heat") {
        state = state + ' - ' + "<ha-icon icon='mdi:fire' style='color: red; width: 14px; height: 14px'></ha-icon>"
      } else if (variables.show_mode_state == true & states[entity.entity_id].state === "auto") {
          state = state + ' - ' + "<ha-icon icon='mdi:refresh-auto' style='width: 14px; height: 14px'></ha-icon>"
      } else if (variables.show_mode_state == true & states[entity.entity_id].state === "off") {
          state = state + ' - ' + "<ha-icon icon='mdi:power-off' style='width: 14px; height: 14px'></ha-icon>"
      }
      if (variables.show_window_state == true & variables.window_open_boolean == "true") {
        state = state + ' - ' + "<ha-icon icon='mdi:window-open-variant' style='width: 14px; height: 14px'></ha-icon>"             
      } else if (variables.show_window_state == true & variables.window_open_boolean == false){
          state = state + ' - ' + "<ha-icon icon='mdi:window-closed-variant' style='width: 14px; height: 14px'></ha-icon>"
      }
      return state     
    ]]]
  label: |
    [[[
      return states[entity.entity_id].attributes.temperature + '<sup style="font-size: 40px;">°</sup>'
    ]]]
  show_icon: false
  styles:
    grid:
      - grid-template-areas: |
          'l mode_buttons buttons'
          'n mode_buttons buttons'
          's mode_buttons buttons'
          'graph graph graph'
      - grid-template-columns: 1fr auto auto
      - grid-template-rows: min-content min-content min-content min-content
    card:
      - padding: 20px
      - pointer-events: none
    name:
      - justify-self: start
      - align-self: end
      - font-family: montserrat
      - font-weight: 500
      - z-index: 2
    label:
      - font-size: 5em
      - justify-self: start
      - align-self: start
      - font-weight: 700
      - font-family: montserrat
      - z-index: 2
    state:
      - justify-self: start
      - opacity: 0.8
      - font-size: 12px
      - font-family: montserrat
      - z-index: 2
    custom_fields:
      graph:
        - display: |
            [[[
              if (variables.show_graph) {
                return 'block';
              }
              else {
                return 'none';
              }
            ]]]
        - position: absolute
        - left: 0
        - bottom: 0
        - width: 100%
        - z-index: 1
  tap_action: none
  custom_fields:
    mode_buttons:
      card:
        type: custom:button-card
        styles:
          grid:
            - grid-template-areas: |
                'button_auto'
                'button_heat'
                'button_off'
            - row-gap: 0.3rem
          card:
            - padding: 10px
            - border-radius: 45px
            - background-color: var(--background)
            - z-index: 3
            #- height: 165px
            - width: 120px
            - position: absolute
            - right: -65px
            - bottom: -82px
        custom_fields:
          button_auto:
            card:
              type: custom:button-card
              icon: mdi:cpu-64-bit
              styles: &mode_icon_style
                icon:
                  - width: 25px
                  - color: |
                      [[[ return states[entity.entity_id].state === "auto" ? 'var(--color-blue)' : 'gray'; ]]]
                  - position: relative
                  - right: 30px
                card:
                  - padding: 10px
                  - border-radius: 500px
                  - background: none
                  - box-shadow: none
                  - pointer-events: auto
              tap_action:
                action: call-service
                service: climate.set_hvac_mode
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
                data:
                  hvac_mode: auto

          button_heat:
            card:
              type: custom:button-card
              icon: mdi:memory
              styles:
                icon:
                  - width: 25px
                  - color: |
                      [[[ return states[entity.entity_id].state === "heat" ? 'var(--color-red)' : 'gray'; ]]]
                  - position: relative
                  - right: 30px
                card:
                  - padding: 10px
                  - border-radius: 500px
                  - background: none
                  - box-shadow: none
                  - pointer-events: auto
              tap_action:
                action: call-service
                service: climate.set_hvac_mode
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
                data:
                  hvac_mode: heat

          button_off:
            card:
              type: custom:button-card
              icon: mdi:cpu-64-bit
              styles:
                icon:
                  - width: 25px
                  - color: |
                      [[[ return states[entity.entity_id].state === 'off' ? 'var(--color-green)' : 'gray'; ]]]
                  - position: relative
                  - right: 30px
                card:
                  - padding: 10px
                  - border-radius: 500px
                  - background: none
                  - box-shadow: none
                  - pointer-events: auto
              tap_action:
                action: call-service
                service: climate.turn_off
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
    buttons:
      card:
        type: custom:button-card
        styles:
          grid:
            - grid-template-areas: |
                'item_1'
                'item_2'
                'item_3'
            - row-gap: 0.3rem
          card:
            - padding: 10px
            - width: 100px
            - border-radius: 50px
            - background-color: var(--contrast-10)
            - z-index: 3
        custom_fields:
          item_1:
            card:
              type: custom:button-card
              show_label: true
              label: |
                [[[ return states["sensor.unifi_dream_router_cpu_utilization"].state + " %" ]]]
              styles: &icon_style
                icon:
                  - width: 25px
                card:
                  - padding: 10px
                  - border-radius: 500px
                  - box-shadow: none
                  - pointer-events: auto
                  - background: none
              tap_action:
                action: call-service
                service: climate.set_temperature
                data:
                  temperature: |
                    [[[
                      return states[entity.entity_id].attributes.temperature + 0.5;
                    ]]]
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
              hold_action:
                action: call-service
                service: climate.turn_on
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
          item_2:
            card:
              type: custom:button-card
              show_label: true
              label: |
                [[[ return states["sensor.unifi_dream_router_cpu_utilization"].state + " %" ]]]
              styles: *icon_style
              tap_action:
                action: call-service
                service: climate.set_temperature
                data:
                  temperature: |
                    [[[
                      return states[entity.entity_id].attributes.temperature - 0.5;
                    ]]]
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
              hold_action:
                action: call-service
                service: climate.turn_off
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
          item_3:
            card:
              type: custom:button-card
              show_label: true
              label: |
                [[[ return states["sensor.unifi_dream_router_cpu_utilization"].state + " %" ]]]
              styles: *icon_style
              tap_action:
                action: call-service
                service: climate.set_temperature
                data:
                  temperature: |
                    [[[
                      return states[entity.entity_id].attributes.temperature - 0.5;
                    ]]]
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
              hold_action:
                action: call-service
                service: climate.turn_off
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"
    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.graph_entity ]]]"
            show_fill: true
            show_line: false
        show:
          name: false
          icon: false
          state: false
        line_width: 2
        line_color: "[[[ return variables.graph_color ]]]"
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              --ha-card-border-width: 0;
              z-index: 1
            }
