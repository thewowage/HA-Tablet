hc_mediaplayer_card_bottom:
  show_label: true
  name: "[[[ return states[ entity.entity_id ].attributes.media_artist ]]]"
  label: "[[[ return states[ entity.entity_id ].attributes.media_title ]]]"
  #icon: fapro:youtube
  icon: |
      [[[
        if (entity.attributes.entity_picture == undefined && states[entity.entity_id].attributes.app_id == 'com.google.ios.youtube'){
          return 'phu:youtube';
        } else if (entity.attributes.entity_picture == undefined && states[entity.entity_id].attributes.app_id == 'com.netflix.Netflix') {
          return 'phu:netflix-alt'
        } else if (entity.attributes.entity_picture == undefined && states[entity.entity_id].attributes.app_id == 'com.apple.TVMusic') {
          return 'fapro:music-alt'
        } else if (entity.attributes.entity_picture == undefined && states[entity.entity_id].attributes.app_id == 'com.apple.TVWatchList') {
          return 'mdi:apple'
        } else if (entity.attributes.entity_picture == undefined && states[entity.entity_id].attributes.app_id == 'com.disney.disneyplus') {
          return 'phu:disney-plus-alt'
        } else if (entity.attributes.entity_picture == undefined && states[entity.entity_id].attributes.app_id == 'com.amazon.aiv.AIVApp') {
          return 'phu:prime-video-alt'
        } else if (entity.attributes.entity_picture == undefined && states[entity.entity_id].attributes.app_name == 'RTL+') {
          return 'phu:rtl'
        } else {
          return 'center / cover no-repeat url("' + states[entity.entity_id].attributes.entity_picture + '")';
        }
      ]]]
  show_state: false
  show_entity_picture: true
  styles:
    grid:
      - grid-template-areas: |
          "i play_state button"
          "i l button"
          "i n button"
          "bar bar bar"
      - grid-template-columns: min-content
      - grid-template-rows: min-content min-content min-content
      - column-gap: 15px
    icon:
      - width: 60px
    card:
      - padding: 20px
      - height: 180px
      - width: 100vw
      - overflow: hidden
      - position: fixed
      - margin: 0
      - bottom: 0
      - left: 0
      - z-index: 4
      - border-radius: 20px 20px 0px 0px
      - box-shadow: rgba(14, 30, 37, 0.12) 0px 2px 4px 0px, rgba(14, 30, 37, 0.32) 0px 2px 16px 0px;
    img_cell:
      - background: var(--color-light-gray-nav)
      - border-radius: 10px
      - width: 60px
      - height: 60px
      - justify-self: start
      - align-self: start
      - left: 20px
    state:
      - font-size: 10px
      - justify-self: start
      - align-self: start
      - color: var(--color-dark-gray)
      - padding-left: 25px
      - font-family: montserrat
    name:
      - font-size: 11px
      - justify-self: start
      - align-self: start
      - padding-left: 20px
      - font-family: montserrat
      - animation: my-animation 15s linear infinite
    label:
      - justify-self: start
      - align-self: end
      - font-weight: 700
      - padding-left: 20px
      - font-family: montserrat
      - font-size: 13px
    custom_fields:
      button:
        - justify-self: end
        - align-self: center
        - padding-right: 20px
        - padding-top: 7px
      play_state:
        - font-size: 10px
        - justify-self: start
        - align-self: start
        - color: var(--color-dark-gray)
        - padding-left: 21px
        - font-family: montserrat
      bar:
        - justify-self: start
        - align-self: start
        - width: 86%
        - height: 2px
        - background: "#cccccc"
        - margin-left: 25px
        - margin-top: 10px
  custom_fields:
    button:
      card:
        type: custom:button-card
        icon: fapro:play
        entity: "[[[ return entity.entity_id ]]]"
        show_name: false
        tap_action:
          action: call-service
          service: media_player.media_play_pause
          target:
            entity_id: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - overflow: visible
            - background: var(--color-darker-gray)
            - border-radius: 10px
          icon:
            - width: 17px
            - color: white
          img_cell:
            - padding: 10px
            - width: 20px
        state:
          - value: playing
            icon: fapro:pause
    play_state: >
      [[[
        if (states[entity.entity_id].attributes.app_id == 'de.telekom.entertaintv-iphone') {
          return 'Magenta TV'
        } else if (states[entity.entity_id].attributes.app_id == 'com.google.ios.youtube') {
          return 'YouTube'
        } else if (states[entity.entity_id].attributes.app_id == 'com.netflix.Netflix') {
          return 'Netflix'
        } else if (states[entity.entity_id].attributes.app_id == 'com.apple.TVMusic') {
          return 'Musik'
        } else if (states[entity.entity_id].attributes.app_id == 'com.apple.TVWatchList') {
          return 'Apple TV'
        } else if (states[entity.entity_id].attributes.app_id == 'com.disney.disneyplus') {
          return 'Disney+'
        } else if (states[entity.entity_id].attributes.app_id == 'com.amazon.aiv.AIVApp') {
          return 'Prime Video'
        } else if (states[entity.entity_id].attributes.app_name == 'RTL+') {
          return 'RTL+'
        } else if (states[entity.entity_id].state == 'off') {
          return 'Aus'
        } else {
          return 'Unbekannt'
        }
      ]]]
    #play_state: >
    #  [[[ return states[entity.entity_id].state ]]]
    bar: >
      [[[
        var num = states[entity.entity_id].attributes.media_position;
        var den = states[entity.entity_id].attributes.media_duration;
        var state = (num / den * 100).toFixed(2)

        return `
        <div>
        <div style="background:var(--color-gold); height: 12px; width:${state}%"
        </div>
        </div
        `
      ]]]