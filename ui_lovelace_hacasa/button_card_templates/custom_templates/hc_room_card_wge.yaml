hc_room_card_wge:
  variables:
    hc_entity_1:
    hc_entity_2:
    hc_entity_3:
    hc_entity_1_color: var(--background-icon-color-default)
    hc_entity_2_color: var(--background-icon-color-default)
    hc_entity_3_color: var(--background-icon-color-default)
  show_state: true
  styles:
    grid:
      - grid-template-areas: |
          'i s i1'
          'l . i2'
          'n n i3'
      - grid-template-rows: 1fr 1fr 1fr
      - grid-template-columns: min-content 1fr min-content
      - justify-items: center
    icon:
      - width: 15px
      - padding-right: 2px
      - margin-top: -1px
    img_cell:
      - justify-self: start
      - width: auto
      - padding: 0
      - margin: 0
    name:
      - justify-self: start
      - font-size: 1rem
      - font-weight: 600
      - font-family: montserrat
    state:
      - justify-self: start
      - font-size: 12px
      - font-family: montserrat
      - font-weight: 500
    card:
      - padding: 15px
  custom_fields:
    i1:
      card:
        type: custom:button-card
        entity: "[[[ return variables.hc_entity_1]]]"
        icon: "[[[ return variables.hc_icon_1]]]"
        show_name: false
        show_icon: true
        styles: &item_style
          grid:
            - grid-template-areas: '"i"'
            - row-gap: 1px
          card:
            - box-shadow: none
            - border-radius: 0
          icon:
            - width: 17px
            - margin-top: "-6px"
            - color: var(--background-icon-color-default)
          img_cell:
            - width: 12px
            - height: 12px
            - padding: 7px
            - overflow: visible
            - border-radius: 50%
            - background: "var(--opacity-contrast-100)"
        state:
          - value: "on"
            styles:
              icon:
                - color: var(--icon-color-default)
              img_cell:
                - background: "[[[ return variables.hc_entity_1_color]]]"
    i2:
      card:
        type: custom:button-card
        entity: "[[[ return variables.hc_entity_2]]]"
        icon: "[[[ return variables.hc_icon_2]]]"
        show_name: false
        styles: *item_style
        state:
          - value: "on"
            styles:
              icon:
                - color: var(--icon-color-default)
              img_cell:
                - background: "[[[ return variables.hc_entity_2_color]]]"

    i3:
      card:
        type: custom:button-card
        entity: "[[[ return variables.hc_entity_3]]]"
        icon: "[[[ return variables.hc_icon_3]]]"
        show_name: false
        styles: *item_style
        state:
          - value: "on"
            styles:
              icon:
                - color: var(--icon-color-default)
              img_cell:
                - background: "[[[ return variables.hc_entity_3_color]]]"
