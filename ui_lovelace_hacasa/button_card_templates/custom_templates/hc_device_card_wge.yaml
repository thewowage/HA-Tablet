hc_device_card_wge:
  styles:
    card:
      - padding: 10px 25px 10px 10px
    grid:
      - grid-template-areas: "'i n indicator' 'i l indicator'"
      - grid-template-columns: min-content
      - grid-template-rows: min-content min-content
      - column-gap: 15px
    icon:
      - width: 60%
      - color: white
    img_cell:
      - background: var(--opacity-contrast-100)
      - padding: 6px
      - border-radius: 50%
      - width: 25px
      - height: 25px
      - align-self: start
    name:
      - text-align: left
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
      - font-family: Montserrat
      - justify-self: start
      - align-self: end
    state:
      - text-align: left
      - font-size: var(--font-size-secondary)
      - font-weight: var(--font-weight-secondary)
      - font-family: Montserrat
      - justify-self: start
      - align-self: center
      - color: var(--subtext-color)
    label:
      - justify-self: start
      - align-self: start
      - font-family: montserrat
      - font-size: var(--font-size-secondary)
      - font-weight: var(--font-weight-secondary)
      - color: var(--subtext-color)
    custom_fields:
      indicator:
        - justify-self: end
  custom_fields:
    indicator:
      card:
        type: custom:button-card
        entity: "[[[ return entity.entity_id ]]]"
        show_icon: false
        show_name: false
        styles:
          card:
            - height: 20px
            - width: 20px
            - border-radius: 500px
        state:
          - value: "on"
            styles:
              card:
                - background: var(--color-blue)
          - value: "off"
            styles:
              card:
                - background: var(--color-light-gray-card)
