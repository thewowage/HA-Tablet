  hc_sensor_card_small_wge:
    variables:
      state_value:
      state_value_on_off:
      icon_color:
      state: |
        [[[ 
          var st = states[entity.entity_id].state;
          var uni = ' %';
          return `
          ${parseFloat(st).toFixed(0)}<span style="font-size:
        0.5em;opacity:0.7">${uni}</span>
          `
        ]]]
    show_label: true
    show_icon: true
    label: "[[[ return variables.state ]]]"
    styles:
      grid:
        - grid-template-columns: 1fr min-content
        - grid-template-areas: '"l i" "n i"'
        - grid-template-columns: 1fr min-content
      label:
        - justify-self: start
        - font-size: 20px
        - padding-top: 4px
        - font-weight: 500
        - color: var(--contrast20)
      card:
        - height: 66px
        - border-radius: 24px
        - padding: 12px 10px 10px 14px
        - background: var(--ha-card-background)
      name:
        - justify-self: start
        - font-size: var(--font-size-secondary)
        - color: var(--primary-text-color)
        - opacity: 0.7
        - padding-bottom: 3px
      icon:
        - width: 50%
        - color: |
            [[[
              if (variables.state_value && states[entity.entity_id].state >= variables.state_value) return "var(--color-red)";
              else if (variables.state_value && states[entity.entity_id].state <= variables.state_value) return "var(--color-green)";
              else if (variables.state_value_on_off && states[entity.entity_id].state != variables.state_value_on_off) return "var(--color-red)";
              else if (variables.state_value_on_off && states[entity.entity_id].state == variables.state_value_on_off) return "var(--color-green)";
              else return variables.icon_color;
            ]]]
      img_cell:
        - background: var(--opacity-contrast-100)
        - border-radius: 50%
        - width: 35px
        - height: 35px
        - align-self: end
        - margin-bottom: 6px
