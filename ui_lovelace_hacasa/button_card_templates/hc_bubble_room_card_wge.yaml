  hc_bubble_room_card_wge:
    variables:
      name:
      radius:
      navigation_path:
      icon:
      icon_color: var(--contrast20)
      icon_back_color: var(--contrast1)
      windows:
      doors:
      climate:
      media:
      motion:
      temp_sensor:
      hum_sensor:
      temp_config:
      dubble_tap_action:
      small_card:
    icon: |
      [[[
        if (variables.windows && states[variables.windows].state == "on") return "mdi:window-open-variant";
        else if (variables.doors && states[variables.doors].state == "on") return "mdi:door-open";
        else if (variables.climate && states[variables.climate].state == "heat") return "mdi:fire-circle";
        else if (variables.media && states[variables.media].state == "playing") return "mdi:music";
        else if (variables.motion && states[variables.motion].state == "on") return "mdi:motion-sensor";
        else return variables.icon;
      ]]]
    name: "[[[ return variables.name ]]]"
    tap_action:
      action: navigate
      navigation_path: "[[[ return variables.navigation_path ]]]"
      haptic: medium
    hold_action:
      action: toggle
      haptic: medium
    double_tap_action:
      action: call-service
      service: "[[[ return variables.dubble_tap_action ]]]"
      haptic: success
    custom_fields:
      temp: |
        [[[
          if (variables.temp_config) return variables.temp_config;
          else return "";
        ]]]
    state:
      - value: "on"
        styles:
          grid:
            - grid-template-areas: |
                      [[[
                        if (variables.small_card) {
                            return '"n i"';
                        }
                          return '"temp i" "n n"';
                      ]]]
            - grid-template-rows: 1fr min-content
            - grid-template-columns: 1fr min-content
          custom_fields:
            temp:
              - margin-bottom: 0px
    styles:
      card:
        - padding: 8px
        - height: |
            [[[
              if (variables.small_card) {
                  return "65px";
              }
                return "100px";
            ]]]
        - border-radius: "[[[ return variables.radius ]]]"
        - background: |
            [[[
              if (entity.state == "on") return "var(--color-yellow)";
              else return "var(--ha-card-background)";
            ]]]
      grid:
        - grid-template-areas: |
            [[[
              if (variables.small_card) {
                  return '"n i"';
              }
                return '"temp i" "n n"';
            ]]]
        - grid-template-rows: 1fr min-content
        - grid-template-columns: 1fr min-content
      icon:
        - width: 50%
        - color: |
            [[[
              if (variables.windows && states[variables.windows].state == "on") return "var(--primary-background-color)";
              else if (variables.climate && states[variables.climate].state == "heat") return "var(--primary-background-color)";
              else if (entity.state == "on") return "var(--contrast20)";
              else return "var(--contrast20)";
            ]]]
      img_cell:
        - justify-self: end
        - background: |
            [[[
              if (variables.windows && states[variables.windows].state == "on") return "var(--primary-color)";
              else if (variables.climate && states[variables.climate].state == "heat") return "var(--primary-color)";
              else if (entity.state == "on") return "var(--primary-background-color)";
              else return "var(--primary-background-color)";
            ]]]
        - border-radius: 100%
        - align-self: start
        - width: 2.8em
        - height: 2.8em
      name:
        - justify-self: start
        - align-self: start
        - text-align: left
        - font-size: 1em
        - font-weight: 500
        - color: |
            [[[
              if (entity.state == "on") return "var(--primary-background-color)";
              else return "var(--primary-text-color)";
            ]]]
        - padding: |
              [[[
                if (variables.small_card) {
                    return "12px 0 0 14px";
                }
                  return "8px 0 0 14px";
              ]]]
        - margin-bottom: 35px
      custom_fields:
        temp:
          - justify-self: start
          - font-size: 2em
          - line-height: em
          - font-weight: 400
          - color: |
              [[[
                if (entity.state == "on") return "var(--primary-background-color)";
                else return "var(--primary-text-color)";
              ]]]
          - padding: |
              [[[
                if (variables.small_card) {
                    return "0 0 0 0";
                }
                  return "0 0 6px 14px";
              ]]]