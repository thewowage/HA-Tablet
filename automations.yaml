- id: '1738149564542'
  alias: Batterie-Warnung mit Ausschlüssen
  description: Prüft täglich alle Batterie-Sensoren außer bestimmte ausgeschlossene
  trigger:
  - platform: time
    at: '20:00:00'
  condition: []
  action:
  - variables:
      excluded_entities:
      - sensor.alissa_iphone_battery_level
      - sensor.rita_iphone_battery_level
      - sensor.rita_iphone_watch_battery_level
      - sensor.wowa_iphone_battery_level
      - sensor.wowa_iphone_watch_battery
      - binary_sensor.va1406739968_batterie
      - binary_sensor.va2883396096_batterie
      - sensor.battery_min
      - sensor.devices_with_low_battery
      threshold: 15
      low_batteries: "{% set low = namespace(devices=[]) %} {% for entity in states.sensor
        %}\n  {% if 'battery' in entity.entity_id and entity.entity_id not in excluded_entities
        %}\n    {% if entity.state not in ['unknown', 'unavailable'] %}\n      {%
        if entity.state | int(default=100) < threshold %}\n        {% set name = entity.name
        %}\n        {% set level = entity.state %}\n        {% set dev = name ~ \"
        (\" ~ level ~ \"%)\" %}\n        {% set low.devices = low.devices + [dev]
        %}\n      {% endif %}\n    {% endif %}\n  {% endif %}\n{% endfor %} {{ low.devices
        }}"
  - choose:
    - conditions: '{{ low_batteries | length > 0 }}'
      sequence:
      - service: notify.mobile_app_wowa_iphone
        data:
          title: Batterie-Warnung
          message: 'Folgende Geräte haben einen niedrigen Batteriestand: {{ low_batteries
            | join(", ") }}'
  mode: single
- id: '1777541886385'
  alias: Weihnachtenzeit Aktivierung
  description: ''
  triggers:
  - trigger: state
    entity_id: binary_sensor.christmas_time
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.christmas_time
        state: 'on'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.christmas_automation
      - action: automation.turn_on
        target:
          entity_id: automation.weihnachtsbeleuchtung
    - conditions:
      - condition: state
        entity_id: binary_sensor.christmas_time
        state: 'off'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.christmas_automation
      - action: automation.turn_off
        target:
          entity_id: automation.weihnachtsbeleuchtung
  mode: single
- id: '1777541933138'
  alias: Weihnachtsbeleuchtung Steuerung (AN & AUS & Sofort AUS)
  description: Kombinierte Automation für Weihnachtsbeleuchtung
  triggers:
  - trigger: time
    at: 06:30:00
    id: on_time_morning
  - trigger: time
    at: 08:00:00
    id: off_time_morning
  - trigger: time
    at: '16:30:00'
    id: on_time_afternoon
  - trigger: time
    at: '23:00:00'
    id: off_time_afternoon
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: on_time_morning
      - condition: state
        entity_id: input_boolean.christmas_automation
        state: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.little_xmas_tree
    - conditions:
      - condition: trigger
        id: off_time_morning
      - condition: state
        entity_id: input_boolean.christmas_automation
        state: 'on'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.little_xmas_tree
    - conditions:
      - condition: trigger
        id: on_time_afternoon
      - condition: state
        entity_id: input_boolean.christmas_automation
        state: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.little_xmas_tree
    - conditions:
      - condition: trigger
        id: off_time_afternoon
      - condition: state
        entity_id: input_boolean.christmas_automation
        state: 'on'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.little_xmas_tree
  mode: single
- id: '1778409652157'
