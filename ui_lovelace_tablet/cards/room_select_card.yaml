type: horizontal-stack
view_layout:
  grid-area: h_select
cards:
  - type: custom:button-card
    template: room_input_card_modern_wge
    name: Wohnzimmer
    variables:
      option: wohnzimmer
      room_color: "120,180,255"
      entities:
        - light.ambiente
        - light.deckenlicht_wohnzimmer
        - switch.shellyplusplugs_e465b8b49ef4_switch_0
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.dashboard_auswahl
        option: wohnzimmer

  - type: custom:button-card
    template: room_input_card_modern_wge
    name: Schlafzimmer
    variables:
      option: schlafzimmer
      room_color: "201,0,118"
      entities:
        - light.deckenlicht_schlafzimmer
        - switch.gosund_sp112_bedroom
        - switch.gosund_sp112_bedroom_usb
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.dashboard_auswahl
        option: schlafzimmer

  - type: custom:button-card
    template: room_input_card_modern_wge
    name: Kinderzimmer
    variables:
      option: kinderzimmer
      room_color: "120,180,255"
      entities:
        - light.deckenlicht_kinderzimmer
        - light.ambiente_rgb
        - light.ambiente_rgb_2
        - switch.shellyazplug_5432046783f8_switch_0
        - media_player.apple_tv_alissa
        - switch.steckdosenleiste_kinderzimmer_stecker1
        - switch.steckdosenleiste_kinderzimmer_stecker2
        - switch.steckdosenleiste_kinderzimmer_stecker3
        - switch.steckdosenleiste_kinderzimmer_usb
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.dashboard_auswahl
        option: kinderzimmer

  - type: custom:button-card
    template: room_input_card_modern_wge
    name: Küche
    variables:
      option: kueche
      room_color: "120,180,255"
      entities:
        - light.deckenlicht_kuche
        - light.spots_kuche
        - switch.shellyazplug_543204663e38_switch_0
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.dashboard_auswahl
        option: kueche

  - type: custom:button-card
    template: room_input_card_modern_wge
    name: Fur / Bad
    variables:
      option: flur_bad
      room_color: "120,180,255"
      entities:
        - light.deckenlicht_flur
        - light.spots_badezimmer
        - switch.gosund_sp112_nursery
        - switch.gosund_sp112_nursery_usb
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.dashboard_auswahl
        option: flur_bad

  - type: custom:button-card
    template: room_input_card_modern_wge
    name: Dach / Keller
    variables:
      option: dach_keller
      room_color: "120,180,255"
      entities:
        - light.deckenlicht_dachboden
        - light.deckenlicht_nebenraum
        - light.deckenlicht_keller
        - switch.shellyplug_s_b49a1d
        - switch.socket_washing_machine
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.dashboard_auswahl
        option: dach_keller
