  - type: conditional
    conditions:
      - entity: input_select.haus_anwesenheit
        state: Anwesend
    chip:
      type: template
      icon: mdi:location-enter
      entity: input_select.haus_anwesenheit
      tap_action:
        action: more-info

  - type: conditional
    conditions:
      - entity: input_select.haus_anwesenheit
        state: Abwesend
    chip:
      type: template
      icon: mdi:location-exit
      entity: input_select.haus_anwesenheit
      tap_action:
        action: more-info

view_layout:
  grid-area: chips
alignment: end
card_mod:
  style: |
    ha-card {
      margin-top: 48px;
      padding-bottom: 0px;
      margin-bottom: -20px;
      transition: none;
    }
