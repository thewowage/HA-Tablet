  # HEUTE AKTIV
type: conditional
conditions:
      - entity: sensor.abfall_morgen_aktiv
        state: "off"
    card:
      type: custom:button-card
      entity: sensor.abfall_heute_aktiv
      icon: mdi:trash-can
      name: Heute
      show_state: true
      styles:
        card:
          - height: 120px
          - border-radius: 26px
          - padding: 18px
          - border: none
          - background: |
              [[[
                return `
                  linear-gradient(
                    145deg,
                    rgba(255,95,87,0.32),
                    rgba(255,95,87,0.08)
                  )
                `;
              ]]]
          - box-shadow: 0 6px 18px rgba(0,0,0,0.16)
        grid:
          - grid-template-areas: |
              "i"
              "n"
              "s"
          - grid-template-columns: 1fr
          - grid-template-rows: 1fr min-content min-content
        icon:
          - width: 42px
          - color: rgba(255,95,87,1)
        name:
          - font-size: 16px
          - font-weight: 700
        state:
          - font-size: 13px
          - color: var(--secondary-text-color)
      tap_action:
        action: more-info