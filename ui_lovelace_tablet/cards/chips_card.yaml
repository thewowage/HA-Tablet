type: custom:mod-card
view_layout:
  grid-area: chips

card_mod:
  style: |
    ha-card {
      background: none !important;
      box-shadow: none !important;
      border: none !important;
      margin-top: 48px;
      padding-bottom: 0px;
      margin-bottom: -18px;
      transition: none;

      display: flex !important;
      justify-content: flex-end !important;
      width: 100% !important;
    }

    hui-horizontal-stack-card {
      width: auto !important;
      margin-left: auto !important;
    }

card:
  type: horizontal-stack
  cards:

    #################################################################
    # ABFALL
    #################################################################

    ### ABFALL HEUTE ###
    - type: conditional
      conditions:
        - entity: sensor.abfall_heute_aktiv
          state: "off"
      card:
        type: custom:button-card
        entity: sensor.waste_collection_next_type
        template:
          - waste_collection_modern_wge


    ### ABFALL MORGEN ###
    - type: conditional
      conditions:
        - entity: sensor.abfall_morgen_aktiv
          state: "on"
      card:
        type: custom:button-card
        entity: sensor.waste_collection_next_type
        template:
          - waste_collection_modern_wge

    #################################################################
    # GEBURTSTAG
    #################################################################

    - type: conditional
      conditions:
        - entity: sensor.geburtstage_heute_anzahl
          state_not: "0"

      card:
        type: custom:button-card
        entity: sensor.geburtstage_heute
        icon: mdi:cake-variant

        show_name: false
        show_state: true

        styles:
          grid:
            - grid-template-areas: '"i s"'
            - grid-template-columns: min-content min-content
            - column-gap: 8px
            - align-items: center
            - justify-content: center

          card:
            - width: 150px
            - max-width: 200px
            - height: 42px
            - padding: 0 14px
            - border-radius: 999px
            - background: rgba(255,120,190,0.18)

          icon:
            - width: 28px
            - color: rgba(255,120,190,1)

          state:
            - font-size: 13px
            - font-weight: 700
            - color: var(--primary-text-color)
            - white-space: nowrap
            - text-overflow: ellipsis
            - overflow: hidden

    #################################################################
    # LÜFTEN
    #################################################################

    - type: conditional
      conditions:
        - entity: binary_sensor.lueften
          state: "on"

      card:
        type: custom:button-card
        entity: binary_sensor.lueften
        icon: mdi:window-open-variant

        show_name: false
        show_state: true

        state_display: Lüften empfohlen

        styles:
          grid:
            - grid-template-areas: '"i s"'
            - grid-template-columns: min-content min-content
            - column-gap: 8px
            - align-items: center
            - justify-content: center

          card:
            - width: 150px
            - max-width: 200px
            - height: 42px
            - padding: 0 14px
            - border-radius: 999px
            - background: rgba(120,180,255,0.18)

          icon:
            - width: 28px
            - color: rgba(120,180,255,1)

          state:
            - font-size: 13px
            - font-weight: 700
            - color: var(--primary-text-color)
            - white-space: nowrap
            - text-overflow: ellipsis
            - overflow: hidden