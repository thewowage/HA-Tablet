type: custom:mod-card
view_layout:
  grid-area: chips

card_mod:
  style: |
    ha-card {
      background: none !important;
      box-shadow: none !important;
      border: none !important;
      margin-top: 40px;
      padding-bottom: 0px;
      margin-bottom: -14px;
      transition: none;

      display: flex !important;
      justify-content: flex-end !important;
      width: 100% !important;
    }

    hui-horizontal-stack-card {
      width: auto !important;
      margin-left: auto !important;
    }

card:
  type: horizontal-stack
  cards:

    #################################################################
    # ABFALL
    #################################################################

    ### ABFALL HEUTE ###
    - type: conditional
      conditions:
        - entity: sensor.abfall_heute_aktiv
          state: "off"
      card:
        type: custom:button-card
        entity: sensor.waste_collection_next_type
        template:
          - waste_collection_modern_wge


    ### ABFALL MORGEN ###
    - type: conditional
      conditions:
        - entity: sensor.abfall_morgen_aktiv
          state: "on"
      card:
        type: custom:button-card
        entity: sensor.waste_collection_next_type
        template:
          - waste_collection_modern_wge

    #################################################################
    # GEBURTSTAG
    #################################################################

    - type: conditional
      conditions:
        - entity: sensor.geburtstage_heute_anzahl
          state_not: "1"

      card:
        type: custom:button-card
        entity: sensor.geburtstage_heute
        icon: mdi:cake-variant

        show_name: false
        show_state: true

        styles:
          grid:
            - grid-template-areas: '"i s"'
            - grid-template-columns: min-content min-content
            - column-gap: 8px
            - align-items: center
            - justify-content: center

          card:
            - width: 160px
            - max-width: 200px
            - height: 42px
            - padding: 0 14px
            - border-radius: var(--ha-card-border-radius) 
            - background: var(--ha-card-background)
            - border: none
            - overflow: hidden

          icon:
            - width: 28px
            - color: rgba(255,120,190,1)

          img_cell:
            - width: 20px
            - height: 20px
            - display: flex
            - align-items: center
            - justify-content: center

          state:
            - font-size: var(--card-font-size-secondary)
            - font-weight: 700
            - color: var(--primary-text-color)
            - overflow: hidden

    #################################################################
    # LÜFTEN
    #################################################################

    ### LÜFTEN ###
    - type: conditional
      conditions:
        - entity: binary_sensor.luftdiff_mittel_wz
          state: "on"
      card:
        type: custom:button-card
        entity: binary_sensor.luftdiff_mittel_wz
        icon: mdi:window-open-variant
        variables:
          state_value: Lüften
        template:
          - air_quality_modern_wge

    ### DRINGEND LÜFTEN ###
    - type: conditional
      conditions:
        - entity: binary_sensor.luftdiff_hoch_wz
          state: "on"
      card:
        type: custom:button-card
        entity: binary_sensor.luftdiff_hoch_wz
        icon: mdi:window-open-variant
        variables:
          state_value: Dringend lüften
        template:
          - air_quality_modern_wge