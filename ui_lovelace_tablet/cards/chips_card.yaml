type: horizontal-stack
view_layout:
  grid-area: chips
cards:

  # HEUTE
  - type: conditional
    conditions:
      - entity: sensor.abfall_heute_aktiv
        state: "on"

    card:
      type: custom:button-card
      entity: sensor.abfall_heute
      icon: mdi:trash-can

      show_name: false
      show_state: true

      styles:
        grid:
          - grid-template-areas: '"i s"'
          - grid-template-columns: min-content min-content
          - column-gap: 8px

        card:
          - height: 42px
          - width: 40px
          - padding: 0 14px
          - border-radius: 999px
          - background: rgba(255,95,87,0.18)
          - border: none

        icon:
          - width: 18px
          - color: rgba(255,95,87,1)

        state:
          - font-size: 13px
          - font-weight: 700
          - color: var(--primary-text-color)

      tap_action:
        action: more-info


  # MORGEN
  - type: conditional
    conditions:
      - entity: sensor.abfall_morgen_aktiv
        state: "on"

    card:
      type: custom:button-card
      entity: sensor.abfall_morgen
      icon: mdi:recycle

      show_name: false
      show_state: true

      styles:
        grid:
          - grid-template-areas: '"i s"'
          - grid-template-columns: min-content min-content
          - column-gap: 8px

        card:
          - height: 42px
          - padding: 0 14px
          - border-radius: 999px
          - background: rgba(255,190,70,0.18)
          - border: none

        icon:
          - width: 18px
          - color: rgba(255,190,70,1)

        state:
          - font-size: 13px
          - font-weight: 700
          - color: var(--primary-text-color)

      tap_action:
        action: more-info


  # KEINE ABHOLUNG
  - type: conditional
    conditions:
      - entity: sensor.abfall_heute_aktiv
        state: "off"
      - entity: sensor.abfall_morgen_aktiv
        state: "off"

    card:
      type: custom:button-card
      icon: mdi:trash-can-outline
      name: Keine Abholung

      show_icon: true
      show_name: true

      styles:
        grid:
          - grid-template-areas: '"i n"'
          - grid-template-columns: min-content min-content
          - column-gap: 8px

        card:
          - height: 42px
          - padding: 0 14px
          - border-radius: 999px
          - background: var(--ha-card-background)
          - border: none

        icon:
          - width: 18px
          - color: var(--secondary-text-color)

        name:
          - font-size: 13px
          - font-weight: 700
          - color: var(--secondary-text-color)

      tap_action:
        action: more-info