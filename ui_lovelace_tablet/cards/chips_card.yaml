type: custom:mushroom-chips-card
chips:
  - type: conditional
    conditions:
      - entity: sensor.abfall_heute_aktiv
        state: "off"
      - entity: sensor.abfall_morgen_aktiv
        state: "off"
    chip:
      type: template
      icon: mdi:recycle-variant
      content: ""
      tap_action:
        action: fire-dom-event
        browser_mod:
          service: script.popup_abfall_termine
          data:
            browser_id: THIS
      card_mod:
        style: |
          ha-card {
            --chip-text-color: var(--primary-text-color);
            --chip-icon-color: var(--secondary-text-color);
            --chip-background: var(--ha-card-background);
            --chip-border-color: transparent;

            border-radius: 999px !important;
            box-shadow: var(--card-shadow, 0 3px 10px rgba(0,0,0,0.16));
            border: none !important;
          }

          ha-card:active {
            transform: scale(0.94);
          }

  - type: conditional
    conditions:
      - entity: sensor.abfall_morgen_aktiv
        state: "on"
    chip:
      type: template
      icon: mdi:trash-can-outline
      content: >-
        Morgen: {{ states('sensor.waste_collection_type')}}
      tap_action:
        action: fire-dom-event
        browser_mod:
          service: script.popup_abfall_termine
          data:
            browser_id: THIS
      card_mod:
        style: |
          ha-card {
            --chip-text-color: var(--primary-text-color);
            --chip-icon-color: var(--secondary-text-color);
            --chip-background: var(--ha-card-background);
            --chip-border-color: transparent;

            border-radius: 999px !important;
            box-shadow: var(--card-shadow, 0 3px 10px rgba(0,0,0,0.16));
            border: none !important;
          }

          ha-card:active {
            transform: scale(0.94);
          }

  - type: conditional
    conditions:
      - entity: sensor.abfall_heute_aktiv
        state: "on"
    chip:
      type: template
      icon: mdi:trash-can-outline
      content: >-
        Heute: {{ states('sensor.waste_collection_type')}}
      tap_action:
        action: fire-dom-event
        browser_mod:
          service: script.popup_abfall_termine
          data:
            browser_id: THIS
      card_mod:
        style: >
          ha-card { background: var(--accent-color)!important;
          color:#FFF!important; border: var(--accent-color)!important; }
          ha-card ::slotted(span) { color:#FFF!important; }

  - type: conditional
    conditions:
      - entity: input_select.washing_machine_state
        state: "arbeitet"
    chip:
      type: entity
      entity: sensor.waschmaschine_timer
      icon: mdi:washing-machine

  - type: conditional
    conditions:
      - entity: calendar.geburtstage_ha
        state: "on"
    chip:
      type: entity
      entity: sensor.geburtstage_heute
      icon: mdi:cake-variant
      tap_action:
        action: more-info
      hold_action:
        action: more-info
      double_tap_action:
        action: more-info
      card_mod:
        style: |
          ha-card {
            background: var(--accent-color) !important;
            color: #FFFFFF !important;
            border: var(--accent-color) !important;
          }
          ha-card ::slotted(span) {
            color: #FFFFFF !important;
          }

  - type: conditional
    conditions:
      - entity: calendar.geburtstage_ha
        state: "off"
    chip:
      type: template
      content: ""
      icon: mdi:cake-variant
      tap_action:
        action: fire-dom-event
        browser_mod:
          service: script.popup_geburtstage
          data:
            browser_id: THIS
      entity: sensor.geburtstage_heute

  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.luftdiff_niedrig_wz
        state: "on"
    chip:
      type: template
      icon: mdi:weather-windy
      content: ""
      entity: sensor.multisensor_wohnzimmer_temperatur
      tap_action:
        action: fire-dom-event
        browser_mod:
          service: script.popup_luftqualitaet_erdgeschoss
          data:
            browser_id: THIS

  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.luftdiff_mittel_wz
        state: "on"
    chip:
      type: template
      icon: mdi:weather-windy
      content: Lüften
      entity: sensor.multisensor_wohnzimmer_temperatur
      tap_action:
        action: fire-dom-event
        browser_mod:
          service: script.popup_luftqualitaet_erdgeschoss
          data:
            browser_id: THIS

  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.luftdiff_hoch_wz
        state: "on"
    chip:
      type: template
      icon: mdi:weather-windy
      content: Dringend lüften
      entity: sensor.multisensor_wohnzimmer_temperatur
      tap_action:
        action: fire-dom-event
        browser_mod:
          service: script.popup_luftvergleich_innen_aussen
          data:
            browser_id: THIS
      card_mod:
        style: >
          ha-card { background: var(--accent-color) !important;
          color:#fff!important; border:var(--accent-color)!important; }
          ha-card ::slotted(span) { color:#fff!important; }

  #- type: conditional
  #  conditions:
  #    - entity: sensor.luftfeuchtigkeit_wohnzimmer_zu_hoch
  #      state: "true"
  #  chip:
  #    type: entity
  #    entity: sensor.multisensor_wohnzimmer_luftfeuchtigkeit
  #    icon: mdi:sofa-outline

  #- type: conditional
  #  conditions:
  #    - entity: sensor.luftfeuchtigkeit_schlafzimmer_zu_hoch
  #      state: "true"
  #  chip:
  #    type: entity
  #    entity: sensor.multisensor_schlafzimmer_luftfeuchtigkeit
  #    icon: mdi:bed-king-outline

  #- type: conditional
  #  conditions:
  #    - entity: sensor.luftfeuchtigkeit_kinderzimmer_zu_hoch
  #      state: "true"
  #  chip:
  #    type: entity
  #    entity: sensor.multisensor_kinderzimmer_luftfeuchtigkeit
  #    icon: mdi:bed-queen-outline

  #- type: conditional
  #  conditions:
  #    - entity: sensor.luftfeuchtigkeit_kuche_zu_hoch
  #      state: "true"
  #  chip:
  #    type: entity
  #    entity: sensor.multisensor_kuche_luftfeuchtigkeit
  #    icon: mdi:fridge-outline

  #- type: conditional
  #  conditions:
  #    - entity: sensor.luftfeuchtigkeit_badezimmer_zu_hoch
  #      state: "true"
  #  chip:
  #    type: entity
  #    entity: sensor.multisensor_badezimmer_luftfeuchtigkeit
  #    icon: mdi:paper-roll-outline

  - type: conditional
    conditions:
      - entity: input_select.haus_anwesenheit
        state: Anwesend
    chip:
      type: template
      icon: mdi:location-enter
      entity: input_select.haus_anwesenheit
      tap_action:
        action: more-info

  - type: conditional
    conditions:
      - entity: input_select.haus_anwesenheit
        state: Abwesend
    chip:
      type: template
      icon: mdi:location-exit
      entity: input_select.haus_anwesenheit
      tap_action:
        action: more-info

  - type: weather
    entity: weather.forecast_home
    show_temperature: true
    show_conditions: true
    tap_action:
      action: more-info
view_layout:
  grid-area: chips
alignment: end
card_mod:
  style: |
    ha-card {
      margin-top: 48px;
      padding-bottom: 0px;
      margin-bottom: -20px;
      transition: none;
    }
