type: custom:mod-card
view_layout:
  grid-area: chips

card_mod:
  style: |
    ha-card {
      background: none !important;
      box-shadow: none !important;
      border: none !important;
    }

    hui-grid-card {
      width: 100% !important;
    }

    hui-grid-card #root {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(max-content, 200px)) !important;
      justify-content: end !important;
      gap: 10px !important;
    }

card:
  type: grid
  square: false
  columns: 10
  cards:

    #################################################################
    # ABFALL
    #################################################################

    ### ABFALL HEUTE ###
    - type: conditional
      conditions:
        - entity: sensor.abfall_heute_aktiv
          state: "off"
      card:
        type: custom:button-card
        entity: sensor.waste_collection_next_type
        template:
          - waste_collection_modern_wge


    ### ABFALL MORGEN ###
    - type: conditional
      conditions:
        - entity: sensor.abfall_morgen_aktiv
          state: "on"
      card:
        type: custom:button-card
        entity: sensor.waste_collection_next_type
        template:
          - waste_collection_modern_wge

    #################################################################
    # GEBURTSTAG
    #################################################################

    - type: conditional
      conditions:
        - entity: sensor.geburtstage_heute_anzahl
          state_not: "1"

      card:
        type: custom:button-card
        entity: sensor.geburtstage_heute
        icon: mdi:cake-variant

        show_name: false
        show_state: true

        styles:
          grid:
            - grid-template-areas: '"i s"'
            - grid-template-columns: min-content min-content
            - column-gap: 8px
            - align-items: center
            - justify-content: center

          card:
            - width: auto
            - max-width: 200px
            - min-width: max-content
            - height: 42px
            - padding: 0 14px
            - border-radius: var(--ha-card-border-radius) 
            - background: var(--ha-card-background)
            - border: none
            - overflow: hidden

          icon:
            - width: 28px
            - color: rgba(255,120,190,1)

          img_cell:
            - width: 20px
            - height: 20px
            - display: flex
            - align-items: center
            - justify-content: center

          state:
            - font-size: var(--card-font-size-secondary)
            - font-weight: 700
            - color: var(--primary-text-color)
            - overflow: hidden
            - white-space: nowrap

    #################################################################
    # LÜFTEN
    #################################################################

    ### LÜFTEN ###
    - type: conditional
      conditions:
        - entity: binary_sensor.luftdiff_mittel_wz
          state: "on"
      card:
        type: custom:button-card
        entity: binary_sensor.luftdiff_mittel_wz
        icon: mdi:window-open-variant
        variables:
          state_value: Lüften
        template:
          - air_quality_modern_wge

    ### DRINGEND LÜFTEN ###
    - type: conditional
      conditions:
        - entity: binary_sensor.luftdiff_hoch_wz
          state: "on"
      card:
        type: custom:button-card
        entity: binary_sensor.luftdiff_hoch_wz
        icon: mdi:window-open-variant
        variables:
          state_value: Dringend lüften
        template:
          - air_quality_modern_wge


    - type: conditional
      conditions:
        - entity: input_select.anwesenheit
          state: anwesend

      card:
        type: custom:button-card
        entity: person.max
        icon: mdi:home-account

        show_name: false
        show_state: false
        show_icon: true

        state_display: |
          [[[
            return "Max Zuhause";
          ]]]

        styles:
          grid:
            - grid-template-areas: '"i s"'
            - grid-template-columns: min-content max-content
            - column-gap: 8px

          card:
            - width: max-content
            - min-width: max-content
            - max-width: 200px
            - height: 42px
            - padding: 0 14px
            - border-radius: 999px
            - background: rgba(88,214,141,0.18)
            - border: none
            - overflow: hidden

          img_cell:
            - width: 20px
            - height: 20px
            - display: flex
            - align-items: center
            - justify-content: center

          icon:
            - width: 18px
            - height: 18px
            - color: rgba(88,214,141,1)

          state:
            - font-size: 13px
            - font-weight: 700
            - color: var(--primary-text-color)
            - white-space: nowrap
            - text-overflow: ellipsis
            - overflow: hidden