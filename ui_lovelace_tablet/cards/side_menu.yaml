type: conditional
conditions:
  - entity: input_boolean.debug_mode
    state: "off"
card:
  type: horizontal-stack
  cards:
    - type: custom:mod-card
      view_layout:
        grid-area: side_menu

      card_mod:
        style: |
          :host {
            position: fixed !important;
            left: 0;
            top: 0;
            margin-top: 0 !important;
            margin-left: 0 !important;

            width: 200px !important;
            height: 100vh !important;

            z-index: 9999 !important;
            overflow: hidden !important;
          }

          ha-card {
            width: 200px !important;
            height: 100vh !important;

            display: flex;
            flex-direction: column;
            align-items: center;

            padding: 20px 0;

            border-radius: 0 30px 30px 0;

            background: var(--sidebar-bg);
          }

          /* verhindert JEGLICHES Scrollen im Menü */
          #root,
          #container,
          .vertical-stack,
          hui-vertical-stack-card {
            height: 100% !important;
            overflow: hidden !important;
          }

      card:
        type: vertical-stack
        cards:
          - type: custom:button-card
            show_icon: false
            show_name: true
            tap_action:
              action: navigate
              navigation_path: /lovelace-tablet/welcome
            name: >
              [[[ return new Date().toLocaleTimeString("de-DE", {hour: "2-digit", minute: "2-digit"}); ]]]
            styles:
              card:
                - height: 42px
                - background: transparent
                - box-shadow: none
                - padding: 0
              name:
                - font-size: 30px
                - font-weight: 900
                - color: var(--primary-text-color)
                - justify-self: center
                - text-align: center

          - type: custom:button-card
            show_icon: false
            show_name: true
            name: >
              [[[
                return new Date().toLocaleDateString("de-DE", {
                  weekday: "short",
                  day: "numeric",
                  month: "short"
                });
              ]]]
            styles:
              card:
                - height: 24px
                - background: transparent
                - box-shadow: none
                - padding: 0
                - margin-bottom: 18px
              name:
                - font-size: 14px
                - font-weight: 700
                - color: var(--primary-text-color)
                - justify-self: center
                - text-align: center

          # WETTER ICON
          - type: custom:button-card
            entity: weather.forecast_home
            show_name: false
            show_state: true
            show_icon: true
            icon: >
              [[[
                const s = entity?.state;
                if (s === "sunny") return "mdi:weather-sunny";
                if (s === "partlycloudy") return "mdi:weather-partly-cloudy";
                if (s === "cloudy") return "mdi:weather-cloudy";
                if (s === "rainy") return "mdi:weather-rainy";
                if (s === "pouring") return "mdi:weather-pouring";
                if (s === "snowy") return "mdi:weather-snowy";
                if (s === "fog") return "mdi:weather-fog";
                return "mdi:weather-cloudy";
              ]]]
            state_display: >
              [[[
                const t = entity?.attributes?.temperature;
                return t !== undefined ? `${Math.round(t)}°` : "";
              ]]]
            styles:
              grid:
                - grid-template-areas: |
                    "i"
                    "s"
                - grid-template-columns: 1fr
                - grid-template-rows: min-content min-content
                - justify-items: center
                - align-items: center

              card:
                - width: 108px
                - height: 78px
                - margin: 0 auto 0 auto
                - border-radius: 22px
                - position: relative
                - overflow: hidden
                - background: transparent

              img_cell:
                - justify-self: center
                - align-self: center
                - width: 42px
                - height: 42px
                - border-radius: 50%
                - background: transparent
                - z-index: 2

              icon:
                - width: 34px
                - color: >
                    [[[
                      const s = entity?.state;
                      if (s === "sunny") return "rgba(255,209,102,1)";
                      if (s === "rainy" || s === "pouring") return "rgba(120,180,255,1)";
                      if (s === "snowy") return "rgba(220,245,255,1)";
                      return "rgba(255,255,255,0.86)";
                    ]]]
                - animation: >
                    [[[
                      const s = entity?.state;
                      if (s === "sunny") return "sunGlow 2.4s ease-in-out infinite";
                      if (s === "rainy" || s === "pouring") return "rainBounce 1.1s ease-in-out infinite";
                      if (s === "snowy") return "snowFloat 2.8s ease-in-out infinite";
                      return "none";
                    ]]]

              state:
                - justify-self: center
                - align-self: center
                - font-size: 14px
                - font-weight: 800
                - color: var(--primary-text-color)
                - z-index: 2

            extra_styles: |
              ha-card {
                margin-left: auto !important;
                margin-right: auto !important;
              }

              @keyframes sunGlow {
                0%, 100% {
                  filter: drop-shadow(0 0 4px rgba(255,209,102,0.45));
                  transform: scale(1);
                }
                50% {
                  filter: drop-shadow(0 0 14px rgba(255,209,102,0.95));
                  transform: scale(1.08);
                }
              }

              @keyframes rainBounce {
                0%, 100% {
                  transform: translateY(0);
                  filter: drop-shadow(0 0 5px rgba(120,180,255,0.45));
                }
                50% {
                  transform: translateY(3px);
                  filter: drop-shadow(0 0 12px rgba(120,180,255,0.8));
                }
              }

              @keyframes snowFloat {
                0%, 100% {
                  transform: translateY(0) rotate(0deg);
                  filter: drop-shadow(0 0 6px rgba(220,245,255,0.5));
                }
                50% {
                  transform: translateY(-3px) rotate(4deg);
                  filter: drop-shadow(0 0 14px rgba(220,245,255,0.9));
                }
              }

          #- type: custom:button-card
          #  color_type: blank-card
          #  styles:
          #    card:
          #      - height: 30px
          #      - background: transparent
          #      - box-shadow: none

          - type: custom:button-card
            icon: fapro:house-fill
            tap_action:
              action: navigate
              navigation_path: /lovelace-tablet/home
            styles: &sidebar_button
              grid:
                - grid-template-areas: '"spacer i indicator"'
                - grid-template-columns: 22px 1fr 22px
                - grid-template-rows: 1fr
              card:
                - width: 108px
                - height: 58px
                - margin: 8px auto
                - border-radius: 18px
                - background: transparent
                #- box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 6px 18px rgba(0,0,0,0.16)
                - position: relative
                - transition: none
                - transform: none
              img_cell:
                - grid-area: i
                - justify-self: center
                - align-self: center
                - width: 100%
                - height: 100%
                - margin: 0
              icon:
                - width: 34px
                - height: 34px
                - justify-self: center
                - align-self: center
                - margin: 0
                - color: >
                    [[[
                      return location.pathname.includes("home")
                        ? "rgba(var(--card-color-rgb,120,180,255),1)"
                        : "var(--primary-text-color)";
                    ]]]
              custom_fields:
                indicator:
                  - grid-area: indicator
                  - justify-self: center
                  - align-self: center
                  - display: >
                      [[[ return location.pathname.includes("home") ? "block" : "none"; ]]]
            custom_fields: &indicator
              indicator: <div class="side-indicator"></div>
            extra_styles: &indicator_style |
              .side-indicator {
                width: 5px;
                height: 20px;
                border-radius: 999px;
                background: rgba(var(--card-color-rgb,120,180,255),1);
                animation: sidePulse 1.8s ease-in-out infinite;
              }
              @keyframes sidePulse {
                0%, 100% {
                  opacity: 0.55;
                  transform: scaleY(0.72);
                }
                50% {
                  opacity: 1;
                  transform: scaleY(1);
                }
              }

          - type: custom:button-card
            icon: fapro:music-alt
            tap_action:
              action: navigate
              navigation_path: /lovelace-tablet/audio
            styles:
              <<: *sidebar_button
              icon:
                - width: 34px
                - height: 34px
                - justify-self: center
                - align-self: center
                - margin: 0
                - color: >
                    [[[
                      return location.pathname.includes("audio")
                        ? "rgba(var(--card-color-rgb,120,180,255),1)"
                        : "var(--primary-text-color)";
                    ]]]
              custom_fields:
                indicator:
                  - grid-area: indicator
                  - justify-self: center
                  - align-self: center
                  - display: >
                      [[[ return location.pathname.includes("audio") ? "block" : "none"; ]]]
            custom_fields: *indicator
            extra_styles: *indicator_style

          - type: custom:button-card
            icon: phu:scene-concentrate
            tap_action:
              action: navigate
              navigation_path: /lovelace-tablet/szenen
            styles:
              <<: *sidebar_button
              icon:
                - width: 34px
                - height: 34px
                - justify-self: center
                - align-self: center
                - margin: 0
                - color: >
                    [[[
                      return location.pathname.includes("szenen")
                        ? "rgba(var(--card-color-rgb,120,180,255),1)"
                        : "var(--primary-text-color)";
                    ]]]
              custom_fields:
                indicator:
                  - grid-area: indicator
                  - justify-self: center
                  - align-self: center
                  - display: >
                      [[[ return location.pathname.includes("szenen") ? "block" : "none"; ]]]
            custom_fields: *indicator
            extra_styles: *indicator_style

          - type: custom:button-card
            icon: fapro:toggle-on
            tap_action:
              action: navigate
              navigation_path: /lovelace-tablet/einstellungen
            styles:
              <<: *sidebar_button
              icon:
                - width: 34px
                - height: 34px
                - justify-self: center
                - align-self: center
                - margin: 0
                - color: >
                    [[[
                      return location.pathname.includes("einstellungen")
                        ? "rgba(var(--card-color-rgb,120,180,255),1)"
                        : "var(--primary-text-color)";
                    ]]]
              custom_fields:
                indicator:
                  - grid-area: indicator
                  - justify-self: center
                  - align-self: center
                  - display: >
                      [[[ return location.pathname.includes("einstellungen") ? "block" : "none"; ]]]
            custom_fields: *indicator
            extra_styles: *indicator_style
