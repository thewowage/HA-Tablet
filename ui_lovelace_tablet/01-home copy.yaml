  - type: custom:button-card
    template: header_card_small
    name: Außen
    view_layout:
      grid-area: h_temp_hum_out_label

  - type: custom:button-card
    template: sensor_graph_card
    name: Temperatur
    icon: fapro:thermometer
    entity: sensor.outside_temperature_weather
    variables:
      label_icon: celsius
    view_layout:
      grid-area: h_temp_out

  - type: custom:button-card
    template: sensor_graph_card
    name: Luftfeuchtigkeit
    icon: fapro:humidity
    entity: sensor.outside_humidity_weather
    variables:
      label_icon: percent
    view_layout:
      grid-area: h_hum_out

  - type: custom:button-card
    template: header_card_small
    name: Durchschnitt Innen
    view_layout:
      grid-area: h_temp_hum_in_label

  - type: custom:button-card
    template: sensor_graph_card
    name: Temperatur
    icon: fapro:thermometer
    entity: sensor.average_home_temperature
    variables:
      label_icon: celsius
    view_layout:
      grid-area: h_temp_in

  - type: custom:button-card
    template: sensor_graph_card
    name: Luftfeuchtigkeit
    icon: fapro:humidity
    entity: sensor.average_home_humidity
    variables:
      label_icon: percent
    view_layout:
      grid-area: h_hum_in

  - type: custom:button-card
    template: header_card_small
    name: |
      [[[            
        if (states["input_select.dashboard_state_switch_card_helfer"].state === "Flora")
          return 'Flora'
        else if (states["input_select.dashboard_state_switch_card_helfer"].state === "Verbrauch")
          return 'Stromverbrauch'
        else 
          return "Mango"
      ]]]
    view_layout:
      grid-area: h_slider_label

  - type: custom:mod-card
    view_layout:
      grid-area: h_slider
    card_mod:
      style: |
        ha-card {
          background: var(--ha-card-background);
          border-top: 1px solid var(--background-color);
          height: 100%;
        }
    card:
      type: custom:state-switch
      entity: input_select.dashboard_state_switch_card_helfer
      states:
        Flora:
          type: custom:button-card
          template: home_card_flora
        Verbrauch:
          type: custom:button-card
          template: home_card_consumption

  - type: custom:button-card
    entity: alarm_control_panel.home_alarm
    template: alarm_card
    name: Security System
    tap_action:
      action: none
    hold_action:
      action: more-info
    view_layout:
      grid-area: h_alarm

  - type: custom:button-card
    entity: input_select.haus_anwesenheit
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.haus_anwesenheit
        option: Abwesend
    view_layout:
      grid-area: h_script_1
    icon: fapro:door
    layout: icon_name
    show_state: false
    name: Haus verlassen
    show_name: true
    show_label: false
    styles:
      icon:
        - width: 32px
        - height: 32px
        - color: var(--primary-text-color)
        - padding: 12px
        - margin-left: 12px
      name:
        - font-size: 14px
        - padding-left: 0px
        - font-weight: bold
        - justify-self: start
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 64px 1fr

  - type: custom:button-card
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.haus_anwesenheit
        option: Wachhund
    view_layout:
      grid-area: h_script_2
    icon: fapro:freddy
    layout: icon_name
    show_state: false
    name: freddy Mode
    show_name: true
    show_label: false
    styles:
      icon:
        - width: 32px
        - height: 32px
        - color: var(--primary-text-color)
        - padding: 12px
        - margin-left: 12px
      name:
        - font-size: 14px
        - padding-left: 0px
        - font-weight: bold
        - justify-self: start
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 64px 1fr

  - type: custom:button-card
    entity: input_select.haus_modi
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.haus_modi
        option: Nacht
    icon: fapro:stars
    view_layout:
      grid-area: h_script_3
    layout: icon_name
    show_state: false
    name: Gute Nacht
    show_name: true
    show_label: false
    styles:
      icon:
        - width: 32px
        - height: 32px
        - color: var(--primary-text-color)
        - padding: 12px
        - margin-left: 12px
      name:
        - font-size: 14px
        - padding-left: 0px
        - font-weight: bold
        - justify-self: start
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 64px 1fr

  - type: custom:button-card
    tap_action:
      action: call-service
      service: input_boolean.toggle
      service_data:
        entity_id: input_boolean.guten_morgen_mode_aktiviert
    view_layout:
      grid-area: h_script_4
    icon: fapro:sun
    layout: icon_name
    show_state: false
    name: Guten Morgen
    show_name: true
    show_label: false
    styles:
      icon:
        - width: 32px
        - height: 32px
        - color: var(--primary-text-color)
        - padding: 12px
        - margin-left: 12px
      name:
        - font-size: 14px
        - padding-left: 0px
        - font-weight: bold
        - justify-self: start
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 64px 1fr
