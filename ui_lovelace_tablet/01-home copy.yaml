theme: Backend-selected
title: Home
path: home
badges: []
type: custom:grid-layout
layout:
  grid-template-columns: 24px 1fr 1fr 1fr 1fr 24px
  grid-template-rows: auto
  grid-gap: 16px
  grid-template-areas: |
    ". home_h chips chips chips . "
    ". h_licht_1 h_licht_2 h_licht_3 h_licht_4 ."
    ". h_temp_hum_out_label h_temp_hum_out_label h_slider_label h_slider_label ."
    ". h_temp_out h_hum_out h_slider h_slider ."
    ". h_temp_hum_in_label h_temp_hum_in_label h_slider h_slider ."
    ". h_temp_in h_hum_in h_slider h_slider ."
    ". h_alarm  h_alarm h_slider h_slider ."
    ". h_script_1 h_script_2 h_script_3 h_script_4 ."
    ". h_pop1 h_pop1 h_pop2 h_pop2 ."
    ". h_pop3 h_pop3 h_pop4 h_pop4 ."

cards:
  - type: custom:button-card
    template: header_card
    view_layout:
      grid-area: home_h
    name: Home

  - !include /config/ui_lovelace_tablet/cards/chips_card.yaml

  - type: custom:button-card
    template: room_input_card
    entity: input_boolean.wohnzimmer_auswahl
    name: Wohnzimmer
    view_layout:
      grid-area: h_licht_1

  - type: custom:button-card
    template: room_input_card
    entity: input_boolean.wohnzimmer_auswahl
    name: Schlafzimmer
    view_layout:
      grid-area: h_licht_2

  - type: custom:button-card
    template: room_input_card
    entity: input_boolean.wohnzimmer_auswahl
    name: Kinderzimmer
    view_layout:
      grid-area: h_licht_3

  - type: custom:button-card
    template: room_input_card
    entity: input_boolean.wohnzimmer_auswahl
    name: Küche
    view_layout:
      grid-area: h_licht_4

