theme: Backend-selected
title: Einstellungen
path: einstellungen
icon: ""
badges: []
type: custom:grid-layout
layout:
  grid-template-columns: 200px 7px 1fr 1fr 24px
  grid-template-rows: auto
  grid-gap: 16px
  grid-template-areas: |
    "side_menu . einstellungen_h einstellungen_h . "
    "side_menu . einstellungen_rw_1 einstellungen_rw_1 ."
    "side_menu . einstellungen_rw_2 einstellungen_rw_2 ."
    "side_menu . einstellungen_rw_3 einstellungen_rw_3 ."
    "side_menu . einstellungen_rw_4 einstellungen_rw_4 ."
    "side_menu . einstellungen_rw_5_label einstellungen_rw_5_label ."
    "side_menu . einstellungen_rw_5 einstellungen_rw_5 ."
    "side_menu . einstellungen_rw_6_label einstellungen_rw_6_label ."
    "side_menu . einstellungen_rw_6 einstellungen_rw_6 ."
    "side_menu . einstellungen_rw_7_label einstellungen_rw_7_label ."
    "side_menu . einstellungen_rw_7 einstellungen_rw_7 ."

cards:
  # MENÜ
  - !include /config/ui_lovelace_tablet/cards/side_menu.yaml

  - type: custom:button-card
    template: header_card
    view_layout:
      grid-area: einstellungen_h
    name: Einstellungen

  - type: vertical-stack
    view_layout:
      grid-area: einstellungen_rw_1
    cards:
      - type: entities
        entities:
          - entity: input_boolean.urlaubsmodus
            name: Urlaubsmodus
            icon: fapro:vacation-holidays
            tap_action:
              action: none
        card_mod:
          style: |
            ha-card {
              font-weight: 700;
              transition: none;
            }
            :host {
              --card-mod-icon-color: var(--primary-text-color)
            }
      - type: markdown
        content: >-
          Alle Routingen werden ausgesetzt und die Heizung hält das benötigste Minimum. Die Vorhänge bewegen sich zum Sonnenauf- und Untergang. 
          Eine kleine Lichtautomation lässt weiterhin Anwesenheit vermuten.
        card_mod:
          style: |
            ha-card {
              background: transparent;
              transition: none;
              border: 0px;
              color: grey;
              margin-top: -8px;
              margin-bottom: 20px;
            }

  - type: vertical-stack
    view_layout:
      grid-area: einstellungen_rw_2
    cards:
      - type: entities
        entities:
          - entity: input_boolean.gaestemodus
            name: Gästemodus
            icon: fapro:accommodation
            tap_action:
              action: none
        card_mod:
          style: |
            ha-card {
              font-weight: 700;
              transition: none;
            }
            :host {
              --card-mod-icon-color: var(--primary-text-color)
            }
      - type: markdown
        content: >-
          Automatische Routinen werden augesetzt und Lichtquellen auf manuelle Steuerung umgestellt.
        card_mod:
          style: |
            ha-card {
              background: transparent;
              transition: none;
              border: 0px;
              color: grey;
              margin-top: -8px;
              margin-bottom: 20px;
            }

  - type: vertical-stack
    view_layout:
      grid-area: einstellungen_rw_3
    cards:
      - type: entities
        entities:
          - entity: input_boolean.wochenendmodus
            name: Wochenende
            icon: fapro:accommodation
            tap_action:
              action: none
        card_mod:
          style: |
            ha-card {
              font-weight: 700;
              transition: none;
            }
            :host {
              --card-mod-icon-color: var(--primary-text-color)
            }
      - type: markdown
        content: >-
          Automatische Routinen werden augesetzt.
        card_mod:
          style: |
            ha-card {
              background: transparent;
              transition: none;
              border: 0px;
              color: grey;
              margin-top: -8px;
              margin-bottom: 20px;
            }

  - type: vertical-stack
    view_layout:
      grid-area: einstellungen_rw_4
    cards:
      - type: entities
        entities:
          - entity: input_boolean.stromsparmodus
            name: Stromsparmudus
            icon: fapro:light-bulb-save
            tap_action:
              action: none
        card_mod:
          style: |
            ha-card {
              font-weight: 700;
              transition: none;
            }
            :host {
              --card-mod-icon-color: var(--primary-text-color)
            }
      - type: markdown
        content: >-
          Standby Geräte werden nachts und bei leerem Haus ausgeschaltet.
        card_mod:
          style: |
            ha-card {
              background: transparent;
              transition: none;
              border: 0px;
              color: grey;
              margin-top: -8px;
              margin-bottom: 20px;
            }

  - type: custom:button-card
    template: header_card_small
    name: Automationen
    view_layout:
      grid-area: einstellungen_rw_5_label

  - type: vertical-stack
    view_layout:
      grid-area: einstellungen_rw_5
