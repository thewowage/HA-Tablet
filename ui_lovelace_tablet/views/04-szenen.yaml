theme: Backend-selected
title: Szenen
path: szenen
icon: ""
badges: []
type: custom:grid-layout
layout:
  grid-template-columns: 200px 7px 1fr 1fr 1fr 24px
  grid-template-rows: auto
  grid-gap: 16px
  grid-template-areas: |
    "side_menu . szenen_h szenen_h szenen_h . "
    "side_menu . szenen_rw_1_ln_1 szenen_rw_1_ln_2 szenen_rw_1_ln_3 ."
    "side_menu . szenen_rw_2_ln_1 szenen_rw_2_ln_2 szenen_rw_2_ln_3 ."
    "side_menu . szenen_rw_3_ln_1 szenen_rw_3_ln_2 szenen_rw_3_ln_3 ."

cards:
  # MENÜ
  - !include /config/ui_lovelace_tablet/cards/side_menu.yaml

  - type: custom:button-card
    template: header_card
    view_layout:
      grid-area: szenen_h
    name: Szenen

  - type: custom:button-card
    template: scene_card_modern_wge
    icon: fapro:cinema-hollywood-star
    entity: "input_boolean.cinema_mode"
    view_layout:
      grid-area: szenen_rw_1_ln_1
    name: Cinema Mode
    variables:
      desc: >-
        Vorhänge fahren zu, das Licht gehr aus. Leinwand und Beamer schalten sich ein.

  - type: custom:button-card
    template: scene_card_modern_wge
    icon: fapro:sun
    entity: "input_boolean.guten_morgen_mode"
    view_layout:
      grid-area: szenen_rw_1_ln_2
    name: Guten Morgen Mode
    variables:
      desc: >-
        Licht wird in Stufen heller, die Vorhänge gehen auf und die Verbraucher schalten sich ein.

  - type: custom:button-card
    template: scene_card_modern_wge
    icon: fapro:moon-stars
    entity: "input_boolean.night_mode"
    view_layout:
      grid-area: szenen_rw_1_ln_3
    name: Gute Nacht
    variables:
      desc: >-
        Das Haus schaltet sich in den Nachtmodus. Alle Verbraucher gehen aus und die Heizung fährt runter.
