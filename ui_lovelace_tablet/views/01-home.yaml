theme: Backend-selected
title: Home
path: home
badges: []

type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: 200px 1fr
  grid-template-rows: 1fr
  grid-template-areas: |
    "side_menu main"
  margin: 0
cards:
  - !include /config/ui_lovelace_tablet/cards/side_menu.yaml

  - type: custom:state-switch
    view_layout:
      grid-area: main
    entity: input_select.dashboard_auswahl
    states:
      ################################################################################################
      ## HOME
      home:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 20px 1fr 1fr 1fr 1fr 24px
          grid-template-rows: auto
          grid-gap: 16px
          grid-template-areas: |
            ". home_h chips chips chips ."
            ". h_select h_select h_select h_select ."
            ". h_temp_hum_out_label h_temp_hum_out_label h_slider_label h_slider_label ."
            ". h_temp_out h_hum_out h_slider h_slider ."
            ". h_temp_hum_in_label h_temp_hum_in_label h_slider h_slider ."
            ". h_temp_in h_hum_in h_slider h_slider ."
            ". h_script_1 h_script_2 h_script_3 h_script_4 ."
            ". h_pop1 h_pop1 h_pop2 h_pop2 ."
            ". bottom bottom bottom bottom ."

        cards:
          - !include /config/ui_lovelace_tablet/cards/chips_card.yaml
          - !include /config/ui_lovelace_tablet/cards/room_select_card.yaml

          - type: custom:button-card
            template: header_card
            view_layout:
              grid-area: home_h
            name: Home

          - type: custom:button-card
            template: header_card_small
            name: Außen
            view_layout:
              grid-area: h_temp_hum_out_label

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Temperatur
            icon: fapro:thermometer
            entity: sensor.outside_temperature_weather
            variables:
              label_icon: celsius
              card_color: "255,150,90"
              graph_color: "255,150,90"
            view_layout:
              grid-area: h_temp_out

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Luftfeuchtigkeit
            icon: fapro:humidity
            entity: sensor.outside_humidity_weather
            variables:
              label_icon: percent
            view_layout:
              grid-area: h_hum_out

          - type: custom:button-card
            template: header_card_small
            name: Durchschnitt Innen
            view_layout:
              grid-area: h_temp_hum_in_label

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Temperatur
            icon: fapro:thermometer
            entity: sensor.average_home_temperature
            variables:
              show_graph: false
              graph_entity: sensor.average_home_temperature
              label_icon: celsius
              card_color: "255,150,90"
              graph_color: "255,150,90"
            view_layout:
              grid-area: h_temp_in

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Luftfeuchtigkeit
            icon: fapro:humidity
            entity: sensor.average_home_humidity
            variables:
              label_icon: percent
            view_layout:
              grid-area: h_hum_in

          - type: custom:button-card
            template: header_card_small
            name: |
              [[[            
                if (states["input_select.dashboard_state_switch_card_helfer"].state === "Flora")
                  return 'Flora'
                else if (states["input_select.dashboard_state_switch_card_helfer"].state === "Verbrauch")
                  return 'Stromverbrauch'
                else 
                  return "Mango"
              ]]]
            view_layout:
              grid-area: h_slider_label

          - type: custom:mod-card
            view_layout:
              grid-area: h_slider
            card_mod:
              style: |
                ha-card {
                  background: var(--sidebar-bg);
                }
            card:
              type: custom:state-switch
              entity: input_select.dashboard_state_switch_card_helfer
              states:
                Flora:
                  type: custom:button-card
                  template: home_card_flora_modern_wge
                Verbrauch:
                  type: custom:button-card
                  template: home_card_consumption_modern_wge

          - type: custom:button-card
            template: room_input_card_modern_wge
            name: Haus verlassen
            variables:
              room_color: "120,180,255"
              input_select: input_select.haus_anwesenheit
            view_layout:
              grid-area: h_script_1
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.haus_anwesenheit
                option: Abwesend

          - type: custom:button-card
            template: room_input_card_modern_wge
            name: freddy Mode
            variables:
              room_color: "120,180,255"
              input_select: input_select.haus_modi
            view_layout:
              grid-area: h_script_2
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.haus_modi
                option: Wachhund

          - type: custom:button-card
            template: room_input_card_modern_wge
            name: Nacht
            variables:
              room_color: "120,180,255"
              input_select: input_select.haus_modi
            view_layout:
              grid-area: h_script_3
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.haus_modi
                option: Nacht

          - type: custom:button-card
            template: room_input_card_modern_wge
            name: Guten Morgen
            variables:
              room_color: "120,180,255"
              input_select: input_select.guten_morgen_mode_aktiviert
            view_layout:
              grid-area: h_script_4
            tap_action:
              action: call-service
              service: input_boolean.toggle
              service_data:
                entity_id: input_boolean.guten_morgen_mode_aktiviert

      ################################################################################################
      ## WOHNZIMMER
      wohnzimmer:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 20px 1fr 1fr 1fr 1fr 24px
          grid-template-rows: auto
          grid-gap: 16px
          grid-template-areas: |
            ". home_h chips chips chips ."
            ". h_select h_select h_select h_select ."
            ". wohnzimmer_h wohnzimmer_h wohnzimmer_h wohnzimmer_h ."
            ". wz_licht_1 wz_licht_2 wz_switch_1 wz_switch_2 ."
            ". wz_climate wz_climate wz_fan wz_fan ."
            ". wz_media wz_media wz_schimmel wz_feuchtigkeit ."
            ". bottom   bottom   bottom      bottom ."
        cards:
          - type: custom:button-card
            template: header_card
            view_layout:
              grid-area: home_h
            name: Home
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.dashboard_auswahl
                option: home
            styles:
              card:
                - transition: none
                - transform: none
                - box-shadow: none
            extra_styles: |
              ha-card:hover {
                transform: none !important;
                box-shadow: none !important;
                background: inherit !important;
              }

          - !include /config/ui_lovelace_tablet/cards/chips_card.yaml
          - !include /config/ui_lovelace_tablet/cards/room_select_card.yaml

          - type: custom:button-card
            template: header_card_small
            view_layout:
              grid-area: wohnzimmer_h
            name: Wohnzimmer

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.deckenlicht_wohnzimmer
            name: Deckenlicht
            variables:
              enable_slider: True
              room_color: "120,255,210"
            view_layout:
              grid-area: wz_licht_1

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.ambiente
            name: Ambiente
            variables:
              enable_slider: True
              card_color: "255,209,102"
            view_layout:
              grid-area: wz_licht_2

          - type: "custom:button-card"
            entity: switch.shellyazplug_5432046783f0_switch_0
            template: switch_card_modern_wge
            name: Computertisch
            icon: fapro:plug
            variables:
              power_entity: sensor.shellyazplug_5432046783f0_switch_0_power
            view_layout:
              grid-area: wz_switch_1

          - type: "custom:button-card"
            template: switch_card_modern_wge
            entity: switch.shellyplusplugs_e465b8b49ef4_switch_0
            name: Sofa
            icon: fapro:plug
            view_layout:
              grid-area: wz_switch_2

          - type: custom:button-card
            template: mediaplayer_tv_card_modern_wge
            entity: media_player.apple_tv_wohnzimmer
            view_layout:
              grid-area: wz_media

          - type: custom:button-card
            template: climate_card_modern_wge
            name: Wohnzimmer
            entity: climate.wohnzimmer
            variables:
              graph_color: var(--label-badge-blue)
              graph_entity: sensor.multisensor_wohnzimmer_temperatur
            view_layout:
              grid-area: wz_climate

          - type: custom:button-card
            template: philips_air_purifier_card_modern_wge
            entity: fan.wohnzimmer
            view_layout:
              grid-area: wz_fan

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Schimmel
            icon: fapro:humidity
            variables:
              label_icon: percent
            entity: sensor.schimmel_indikator_wohnzimmer
            view_layout:
              grid-area: wz_schimmel

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Luftfeuchtigkeit
            icon: fapro:humidity
            variables:
              label_icon: percent
            entity: sensor.multisensor_wohnzimmer_luftfeuchtigkeit
            view_layout:
              grid-area: wz_feuchtigkeit

      schlafzimmer:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 20px 1fr 1fr 1fr 1fr 24px
          grid-template-rows: auto
          grid-gap: 16px
          grid-template-areas: |
            ". home_h chips chips chips ."
            ". h_select h_select h_select h_select ."
            ". schlafzimmer_h schlafzimmer_h        schlafzimmer_h    schlafzimmer_h  ."
            ". sz_licht_1     sz_licht_1            sz_switch_1       sz_switch_2     ."
            ". sz_temperatur  sz_feuchtigkeit       sz_fan            sz_fan          ."
            ". sz_schimmel    sz_media              sz_media          sz_media        ."
            ". bottom   bottom   bottom      bottom ."

        cards:
          ################################################################################################
          ## SCHLAFZIMMER
          - type: custom:button-card
            template: header_card
            view_layout:
              grid-area: home_h
            name: Home

          - !include /config/ui_lovelace_tablet/cards/chips_card.yaml
          - !include /config/ui_lovelace_tablet/cards/room_select_card.yaml

          - type: custom:button-card
            template: header_card_small
            view_layout:
              grid-area: schlafzimmer_h
            name: Schlafzimmer

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.deckenlicht_schlafzimmer
            name: Deckenlicht
            variables:
              enable_slider: True
            view_layout:
              grid-area: sz_licht_1

          - type: "custom:button-card"
            entity: switch.gosund_sp112_bedroom
            template: switch_card_modern_wge
            name: Bett
            icon: fapro:plug
            view_layout:
              grid-area: sz_switch_1

          - type: "custom:button-card"
            template: switch_card_modern_wge
            entity: switch.gosund_sp112_bedroom_usb
            name: Bett USB
            icon: fapro:plug
            view_layout:
              grid-area: sz_switch_2

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Temperatur
            icon: fapro:thermometer
            entity: sensor.multisensor_schlafzimmer_temperatur
            variables:
              label_icon: celsius
            view_layout:
              grid-area: sz_temperatur

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Luftfeuchtigkeit
            icon: fapro:humidity
            entity: sensor.multisensor_schlafzimmer_luftfeuchtigkeit
            variables:
              label_icon: percent
            view_layout:
              grid-area: sz_feuchtigkeit

          - type: custom:button-card
            template: air_cleaner_card_modern_wge
            name: Luftreiniger
            entity: fan.luftreiniger_wohnzimmer
            view_layout:
              grid-area: sz_fan

          - type: custom:button-card
            template: mediaplayer_tv_card_modern_wge
            entity: media_player.apple_tv_wohnzimmer
            view_layout:
              grid-area: sz_media

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Schimmel
            icon: fapro:humidity
            entity: sensor.schimmel_indikator_schlafzimmer
            view_layout:
              grid-area: sz_schimmel

      ################################################################################################
      ## KINDERZIMMER
      kinderzimmer:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 20px 1fr 1fr 1fr 1fr 24px
          grid-template-rows: auto
          grid-gap: 16px
          grid-template-areas: |
            ". home_h         chips                 chips             chips ."
            ". h_select       h_select              h_select          h_select ."
            ". kinderzimmer_h kinderzimmer_h        kinderzimmer_h    kinderzimmer_h  ."
            ". kz_licht_1     kz_licht_2            kz_licht_3        kz_switch_1     ."
            ". kz_media       kz_media              kz_switch_group   kz_switch_usb   ."
            ". kz_climate     kz_climate            kz_schimmel       kz_feuchtigkeit ."
            ". bottom         bottom                bottom            bottom ."

        cards:
          - type: custom:button-card
            template: header_card
            view_layout:
              grid-area: home_h
            name: Home

          - !include /config/ui_lovelace_tablet/cards/chips_card.yaml
          - !include /config/ui_lovelace_tablet/cards/room_select_card.yaml

          - type: custom:button-card
            template: header_card_small
            view_layout:
              grid-area: kinderzimmer_h
            name: Kinderzimmer

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.deckenlicht_kinderzimmer
            name: Deckenlicht
            variables:
              enable_slider: True
            view_layout:
              grid-area: kz_licht_1

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.ambiente_rgb
            name: Ambiente Weiß
            variables:
              enable_slider: True
            view_layout:
              grid-area: kz_licht_2

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.ambiente_rgb_2
            name: Ambiente RGB
            variables:
              enable_slider: True
            view_layout:
              grid-area: kz_licht_3

          - type: "custom:button-card"
            entity: switch.shellyazplug_5432046783f8_switch_0
            template: switch_card_modern_wge
            name: Multimedia
            icon: fapro:plug
            view_layout:
              grid-area: kz_switch_1

          - type: custom:button-card
            template: mediaplayer_tv_card_modern_wge
            entity: media_player.apple_tv_alissa
            view_layout:
              grid-area: kz_media

          - type: "custom:button-card"
            entity: group.nursery_socket_desk
            template: switch_card_modern_group_wge
            name: Tisch
            icon: fapro:plug
            view_layout:
              grid-area: kz_switch_group
              switch_1: switch.steckdosenleiste_kinderzimmer_stecker1
              switch_2: switch.steckdosenleiste_kinderzimmer_stecker2
              switch_3: switch.steckdosenleiste_kinderzimmer_stecker3

          - type: "custom:button-card"
            entity: switch.steckdosenleiste_kinderzimmer_usb
            template: switch_card_modern_wge
            name: Tisch USB
            icon: fapro:plug
            view_layout:
              grid-area: kz_switch_usb

          - type: custom:button-card
            template: climate_card_modern_wge
            name: Kinderzimmer
            entity: climate.kinderzimmer
            variables:
              graph_color: var(--label-badge-blue)
              graph_entity: sensor.multisensor_kinderzimmer_temperatur
            view_layout:
              grid-area: kz_climate

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Luftfeuchtigkeit
            icon: fapro:humidity
            entity: sensor.multisensor_kinderzimmer_luftfeuchtigkeit
            variables:
              label_icon: percent
            view_layout:
              grid-area: kz_feuchtigkeit

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Schimmel
            icon: fapro:humidity
            entity: sensor.schimmel_indikator_kinderzimmer
            variables:
              label_icon: percent
            view_layout:
              grid-area: kz_schimmel

      ################################################################################################
      ## KÜCHE
      kueche:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 20px 1fr 1fr 1fr 1fr 24px
          grid-template-rows: auto
          grid-gap: 16px
          grid-template-areas: |
            ". home_h           chips               chips             chips             ."
            ". h_select         h_select            h_select          h_select          ."
            ". kueche_h         kueche_h            kueche_h          kueche_h          ."
            ". ku_licht_1       ku_licht_2          ku_switch_1       ku_switch_1       ."
            ". ku_temperatur    ku_feuchtigkeit     ku_schimmel       ku_wassersensor   ."
            ". bottom           bottom              bottom            bottom            ."

        cards:
          - type: custom:button-card
            template: header_card
            view_layout:
              grid-area: home_h
            name: Home

          - !include /config/ui_lovelace_tablet/cards/chips_card.yaml
          - !include /config/ui_lovelace_tablet/cards/room_select_card.yaml

          - type: custom:button-card
            template: header_card_small
            view_layout:
              grid-area: kueche_h
            name: Küche

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.deckenlicht_kuche
            name: Deckenlicht
            variables:
              enable_slider: True
            view_layout:
              grid-area: ku_licht_1

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.spots_kuche
            name: Spots
            view_layout:
              grid-area: ku_licht_2

          - type: "custom:button-card"
            entity: switch.shellyazplug_543204663e38_switch_0
            template: switch_card_modern_wge
            name: Kaffeemashine
            icon: fapro:plug
            variables:
              power_entity: sensor.shellyazplug_543204663e38_switch_0_power
            view_layout:
              grid-area: ku_switch_1

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Temperatur
            entity: sensor.multisensor_kuche_temperatur
            variables:
              label_icon: celsius
            view_layout:
              grid-area: ku_temperatur

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Luftfeuchtigkeit
            entity: sensor.multisensor_kuche_luftfeuchtigkeit
            variables:
              label_icon: percent
            view_layout:
              grid-area: ku_feuchtigkeit

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Schimmel
            entity: sensor.schimmel_indikator_kuche
            variables:
              label_icon: percent
            view_layout:
              grid-area: ku_schimmel

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Leckage Sensor
            entity: binary_sensor.wasserleckage_sensor_kuche_feuchtigkeit
            variables:
              label_icon: on_off
              show_graph: false
            view_layout:
              grid-area: ku_wassersensor

      ################################################################################################
      ## FLUR/BAD
      flur_bad:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 20px 1fr 1fr 1fr 1fr 24px
          grid-template-rows: auto
          grid-gap: 16px
          grid-template-areas: |
            ". home_h chips chips chips ."
            ". h_select h_select h_select h_select ."
            ". flur_h           flur_h              bz_h              bz_h            ."
            ". flur_licht_1     flur_lux            bz_licht_1        bz_schimmel     ."
            ". flur_temperatur  flur_motion         bz_switch_1       bz_switch_2     ."
            ". flur_lock        flur_door           bz_temperatur     bz_feuchtigkeit ."
            ". bottom   bottom   bottom      bottom ."
        cards:
          - type: custom:button-card
            template: header_card
            view_layout:
              grid-area: home_h
            name: Home

          - !include /config/ui_lovelace_tablet/cards/chips_card.yaml
          - !include /config/ui_lovelace_tablet/cards/room_select_card.yaml

          ################################################################################################
          ## FLUR
          - type: custom:button-card
            template: header_card_small
            view_layout:
              grid-area: flur_h
            name: Flur

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.deckenlicht_flur
            name: Deckenlicht
            variables:
              enable_slider: True
            view_layout:
              grid-area: flur_licht_1

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Lichtstärke
            icon: fapro:sun
            entity: sensor.hue_bewegungssensor_flur_beleuchtungsstarke
            variables:
              label_icon: lux
            view_layout:
              grid-area: flur_lux

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Temperatur
            icon: fapro:thermometer
            entity: sensor.hue_bewegungssensor_flur_temperatur
            variables:
              label_icon: celsius
            view_layout:
              grid-area: flur_temperatur

          - type: custom:button-card
            entity: lock.wohnungstur
            name: Wohnungstür
            template: button_template_modern_wge
            variables:
              sensor_type: lock
            view_layout:
              grid-area: flur_motion

          - type: custom:button-card
            entity: binary_sensor.hue_bewegungssensor_flur_bewegung
            name: Bewegungssensor
            template: button_template_modern_wge
            variables:
              sensor_type: motion
            view_layout:
              grid-area: flur_lock

          - type: custom:button-card
            entity: binary_sensor.eingangstur_offnung
            name: Wohnungstür
            template: button_template_modern_wge
            variables:
              sensor_type: door
            view_layout:
              grid-area: flur_door

          ################################################################################################
          ## BADEZIMMER
          - type: custom:button-card
            template: header_card_small
            view_layout:
              grid-area: bz_h
            name: Badezimmer

          - type: custom:button-card
            template: light_card_modern_wge
            entity: light.spots_badezimmer
            name: Spots
            view_layout:
              grid-area: bz_licht_1

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Schimmel
            icon: fapro:humidity
            entity: sensor.schimmel_indikator_badezimmer
            variables:
              label_icon: percent
            view_layout:
              grid-area: bz_schimmel

          - type: "custom:button-card"
            entity: switch.gosund_sp112_nursery
            template: switch_card_modern_wge
            name: Steckdose
            icon: fapro:plug
            view_layout:
              grid-area: bz_switch_1

          - type: "custom:button-card"
            entity: switch.gosund_sp112_nursery_usb
            template: switch_card_modern_wge
            name: USB
            icon: fapro:plug
            view_layout:
              grid-area: bz_switch_2

          - type: custom:button-card
            template: sensor_graph_card_modern_wge
            name: Temperatur
