philips_air_purifier_card_modern_wge:
  template:
    - responsive_card_base

  variables:
    enable_osc_btn: false
    child_lock: switch.wohnzimmer_kindersicherung_2
    pm25_sensor: sensor.wohnzimmer_pm2_5
    show_graph: true
    graph_entity:
    #card_color: "120,180,255"
    graph_color: >
      [[[
        const value = Number(states[variables.pm25_sensor]?.state) || 0;

        if (value <= 12) return "120,255,180"; // gut = grün
        if (value <= 35) return "255,170,80"; // mittel = orange
        return "236,99,55";
      ]]]
    card_color: >
      [[[
        const value = Number(states[variables.pm25_sensor]?.state) || 0;

        if (value <= 12) return "120,255,180";     // gut = grün
        if (value <= 35) return "255,170,80";     // mittel = orange
        return "236,99,55";                      // schlecht = rot
      ]]]

  show_name: true
  show_icon: true
  show_label: true
  show_state: false
  icon: mdi:fan

  label: |
    [[[
      if (entity.state === "off") return "Aus";
      if (entity.state === "unavailable") return "Unavailable";

      const preset = entity.attributes.preset_mode;
      const mode = entity.attributes.mode;
      const percentage = entity.attributes.percentage;

      if (preset === "auto") return "Automatisch";
      if (preset === "turbo") return "Turbo";
      if (preset === "sleep") return "Schlafen";
      if (mode === "manual" && percentage !== undefined) return percentage + "%";

      return "Unbekannt";
    ]]]

  styles:
    grid:
      - grid-template-areas: |
          "n auto_icon turbo_icon sleep_icon i"
          "l auto_icon turbo_icon sleep_icon i"
          "slider slider slider slider slider"
          "graph graph graph graph graph"
      - grid-template-columns: 1fr min-content min-content min-content min-content
      - grid-template-rows: min-content min-content 1fr min-content
      - column-gap: 6px

    card:
      - background: >
          [[[
            const color = variables.card_color || "120,180,255";

            return entity.state === "on"
              ? `
                linear-gradient(
                  145deg,
                  rgba(${color},0.32),
                  rgba(${color},0.10)
                ),
                var(--ha-card-background)
              `
              : "var(--ha-card-background)";
          ]]]
      - box-shadow: >
          [[[
            const color = variables.card_color || "120,180,255";

            return entity.state === "on"
              ? `0 6px 18px rgba(${color},0.22)`
              : "var(--card-shadow)";
          ]]]

    name:
      - justify-self: start
      - align-self: end
      - text-align: left
      - z-index: 2

    label:
      - justify-self: start
      - align-self: start
      - text-align: left
      - z-index: 2

    icon:
      - color: >
          [[[
            const color = variables.card_color || "120,180,255";
            return entity.state === "on"
              ? `rgba(${color},1)`
              : "var(--secondary-text-color)";
          ]]]
      - animation: >
          [[[
            return entity.state === "on" ? "spin 5s linear infinite" : "none";
          ]]]

    img_cell:
      - justify-self: end
      - align-self: start
      - background: >
          [[[
            return entity.state === "on"
              ? "rgba(255,255,255,0.14)"
              : "rgba(0,0,0,0.08)";
          ]]]
      - z-index: 2

    custom_fields:
      slider:
        - z-index: 2
        - align-self: end

      graph:
        - display: >
            [[[
              return variables.show_graph && variables.graph_entity ? "block" : "none";
            ]]]
        - position: absolute
        - left: 0
        - bottom: -1px
        - width: 100%
        - height: 42px
        - opacity: 0.55
        - z-index: 1
        - pointer-events: none

      auto_icon:
        - z-index: 3
      turbo_icon:
        - z-index: 3
      sleep_icon:
        - z-index: 3

  state:
    - value: "on"
      icon: mdi:fan

    - value: "off"
      icon: mdi:fan-off

    - value: unavailable
      icon: mdi:fan-alert
      label: Unavailable
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none
        name:
          - text-decoration: line-through
        icon:
          - color: var(--secondary-text-color)

  custom_fields:
    slider:
      card:
        type: custom:my-slider-v2
        entity: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - height: var(--card-slider-height)
            - box-shadow: none
            - padding: 0
            - background: rgba(0,0,0,0.12)
            - border-radius: 10px
            - touch-action: pan-y

          progress:
            - height: 100%
            - border-radius: 10px
            - touch-action: pan-y
            - background: >
                [[[
                  const color = variables.card_color || "120,180,255";
                  return entity.state === "on"
                    ? `rgba(${color},0.95)`
                    : "transparent";
                ]]]

          track:
            - border-radius: 10px
            - touch-action: pan-y
            - background: rgba(0,0,0,0.12)

          thumb:
            - height: 30%
            - width: 3px
            - position: absolute
            - right: 7px
            - top: 10px
            - touch-action: pan-y
            - background: >
                [[[
                  const color = variables.card_color || "120,180,255";
                  return entity.state === "on"
                    ? `rgba(${color},1)`
                    : "transparent";
                ]]]

    auto_icon:
      card:
        type: custom:button-card
        icon: mdi:fan-auto
        tap_action:
          action: call-service
          service: fan.set_preset_mode
          service_data:
            preset_mode: auto
            entity_id: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - width: 28px
            - height: 28px
            - padding: 0
            - border-radius: 10px
            - box-shadow: none
            - border: none
            - background: >
                [[[
                  return entity.attributes.preset_mode === "auto"
                    ? "rgba(255,255,255,0.16)"
                    : "rgba(0,0,0,0.08)";
                ]]]
          icon:
            - width: 16px
            - color: >
                [[[
                  const color = variables.card_color || "120,180,255";
                  return entity.attributes.preset_mode === "auto"
                    ? `rgba(${color},1)`
                    : "var(--secondary-text-color)";
                ]]]

    turbo_icon:
      card:
        type: custom:button-card
        icon: pap:speed_3
        tap_action:
          action: call-service
          service: fan.set_preset_mode
          service_data:
            preset_mode: turbo
            entity_id: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - width: 28px
            - height: 28px
            - padding: 0
            - border-radius: 10px
            - box-shadow: none
            - border: none
            - background: >
                [[[
                  return entity.attributes.preset_mode === "turbo"
                    ? "rgba(255,255,255,0.16)"
                    : "rgba(0,0,0,0.08)";
                ]]]
          icon:
            - width: 16px
            - color: >
                [[[
                  const color = variables.card_color || "120,180,255";
                  return entity.attributes.preset_mode === "turbo"
                    ? `rgba(${color},1)`
                    : "var(--secondary-text-color)";
                ]]]

    sleep_icon:
      card:
        type: custom:button-card
        icon: mdi:weather-night
        tap_action:
          action: call-service
          service: fan.set_preset_mode
          service_data:
            preset_mode: sleep
            entity_id: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - width: 28px
            - height: 28px
            - padding: 0
            - border-radius: 10px
            - box-shadow: none
            - border: none
            - background: >
                [[[
                  return entity.attributes.preset_mode === "sleep"
                    ? "rgba(255,255,255,0.16)"
                    : "rgba(0,0,0,0.08)";
                ]]]
          icon:
            - width: 16px
            - color: >
                [[[
                  const color = variables.card_color || "120,180,255";
                  return entity.attributes.preset_mode === "sleep"
                    ? `rgba(${color},1)`
                    : "var(--secondary-text-color)";
                ]]]

    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.graph_entity ]]]"
        line_width: 2
        line_color: >
          [[[
            const color = variables.graph_color || variables.card_color || "120,180,255";
            return `rgba(${color},0.95)`;
          ]]]
        height: 42
        show:
          icon: false
          name: false
          state: false
          legend: false
          labels: false
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              --ha-card-border-width: 0;
              border-radius: 0 !important;
            }

  tap_action:
    action: toggle

  hold_action:
    action: more-info

  extra_styles: |
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
