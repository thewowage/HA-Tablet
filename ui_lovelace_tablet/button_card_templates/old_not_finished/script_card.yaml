script_card:
  show_state: false
  show_name: true
  show_label: false
  label: label
  styles:
    card:
      - max-height: 80px
    icon:
      - width: 32px
      - height: 32px
      - color: var(--primary-text-color)
      - padding: 14px 12px
      - margin-left: 12px
    name:
      - font-size: 14px
      - padding-left: 0px
      - font-weight: bold
      - justify-self: start
    grid:
      - grid-template-areas: '"i n"'
      - grid-template-columns: 64px 1fr
