welcome_view_media_cinema_mode:
  show_name: false
  show_icon: false
  styles:
    card:
      - margin: 0
      - padding: 0
      - box-shadow: none
      - background: var(--background-color) !important;
      - border-color: var(--background-color) !important;
      - border-radius: 12px
      - "--overlap": 16px
    grid:
      - grid-template-columns: 300px 1fr
      - grid-template-areas: '"left right"'
      - column-gap: 8px
    custom_fields:
      left:
        - padding: 0
        - z-index: 1
      right:
        - padding: 0
        - z-index: 2
  custom_fields:
    left:
      card:
        type: custom:mini-media-player
        entity: media_player.apple_tv_wohnzimmer
        card_mod:
          style: |
            ha-card {
              box-shadow: none !important;
              background: transparent;
              border: 0px;
              transition: none;
              border-radius: 4px;
              max-width: 350px !important;
            }
            .mmp__bg {
              background: var(--welcome-card-background) !important;
            }
        hide:
          volume: true
          source: true
          power: true
          controls: true
          progress: true
    right:
      card:
        type: vertical-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: input_boolean.cinema_mode_aktiviert
            tap_action:
              action: toggle
            icon: phu:jiocinema
            icon_color: teal
            name: Cinema Mode
            card_mod:
              style: |
                ha-card {
                  box-shadow: none !important;
                  background: var(--welcome-card-background) !important;
                  border: 0;
                  transition: none;
                  max-width: 350px !important;
                }
