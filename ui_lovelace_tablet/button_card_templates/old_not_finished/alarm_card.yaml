alarm_card:
  icon: mdi:shield-home
  variables:
    active_color: red
  state:
    - value: disarmed
      icon: mdi:shield-off-outline
      custom_fields:
        cs: Disarmed
    - value: arming
      icon: mdi:shield-lock-open
      styles:
        icon:
          - animation: blink 2s ease infinite
      custom_fields:
        cs: Arming...
    - value: armed_away
      icon: mdi:shield-lock
      custom_fields:
        cs: Away
    - value: armed_home
      icon: mdi:shield-home
      custom_fields:
        cs: Home
    - value: unavailable
      icon: mdi:alert-circle-outline
      styles:
        state:
          - text-decoration: line-through
        label:
          - text-decoration: line-through
  styles:
    grid:
      - grid-template-areas: '"i i" "cs ec" "n ec"'
      - grid-template-columns: 1fr min-content
      - grid-template-rows: 1fr min-content min-content min-content
    card:
      - padding: 12px
      - height: 100px
    img_cell:
      - justify-self: start
      - width: 24px
      - height: 24px
      - line-height: 24px
      - border-radius: 8px
      - background: var(--primary-background-color)
    icon:
      - width: 24px
      - height: 24px
      - line-height: 24px
      - color: var(--icon-color)
    name:
      - text-align: start
      - justify-self: start
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
    custom_fields:
      ec:
        - justify-self: start
        - justify-content: center
      cs:
        - text-align: left
        - z-index: 4
        - justify-self: start
        - font-size: var(--font-size-secondary)
        - font-weight: var(--font-weight-secondary)
        - margin: 10px 0 2px 0
        - line-height: 16px
        - width: 100%
        - color: var(--secondary-text-color)
  custom_fields:
    ec:
      card:
        type: tile
        entity: "[[[ return entity.entity_id; ]]]"
        color: red
        features:
          - type: alarm-modes
            modes:
              - armed_away
              - armed_home
              - disarmed
        card_mod:
          style:
            .: |
              ha-card .content { 
                display: none;
              } ha-card {
                width: 200px;
                background: transparent;
                border-radius: 0px;
              } ha-card.active {
                height: 40px;
              }
            .features hui-alarm-modes-tile-feature $: |
              .container {
                padding: 0px !important;
              }
            .features hui-alarm-modes-tile-feature $ .container ha-control-select $ .container:
              |
              .option {
                background-color: transparent !important;
                border-radius: 13px !important;
              }
              card_mod:
            hui-card-features $:
              hui-alarm-modes-card-feature $:
                ha-control-select$: |
                  .container {
                    color: white !important;
                    --control-select-color: white !important;
                        }
