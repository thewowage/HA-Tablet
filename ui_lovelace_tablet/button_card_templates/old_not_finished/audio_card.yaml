audio_card:
  show_icon: true
  show_name: true
  aspect_ratio: 1/1
  styles:
    grid:
      - grid-template-areas: '"i thumb name"'
      - grid-template-columns: 1fr
      - grid-template-rows: 1fr
    icon:
      - color: var(--accent-color)
      - padding: 4px
      - right: 8px
      - top: 8px
      - position: absolute
      - border-radius: 50px
      - width: 28px
      - height: 28px
      - justify-self: end
    card:
      - margin: 0px
      - padding: 0px
    name:
      - position: absolute
      - font-weight: bold
      - bottom: 0px
      - width: 100%
      - font-size: 14px
      - padding-bottom: 8%
      - border-radius: 8px
      - justify-self: center
    custom_fields:
      thumb:
        - position: absolute
        - top: calc(50% - 6px)
        - left: 50%
        - transform: translate(-50%, -50%)
        - width: 60%
        - height: 60%
        - justify-self: center
        - border-radius: 100%
        - margin-bottom: 8px
