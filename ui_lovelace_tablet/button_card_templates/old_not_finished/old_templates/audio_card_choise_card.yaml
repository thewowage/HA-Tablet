audio_card_choise_card:
  show_icon: true
  show_name: true
  show_state: false
  show_label: false
  icon: fapro:speaker-minimalistic
  variables:
    player_room:
  styles:
    card:
      - border: 0px solid
      - padding: 20px 0px
      - overflow: visible
      - background: |
          [[[ 
            if (states["input_select.media_player_auswahl_helfer"].state === variables.player_room) 
              return "var(--accent-color)"
            else 
              return "var(--ha-card-background)"
          ]]]
    icon:
      - width: 32px
      - height: 32px
      - background: |
          [[[ 
            if (states[entity.entity_id].state === "playing" && states["input_select.media_player_auswahl_helfer"].state === variables.player_room)
              return "rgba(255,255,255,0.75)"
            if (states[entity.entity_id].state === "playing")
              return "var(--accent-color-background-opacity)"
            else 
              return "transparent"
          ]]]
      - border-radius: 50px
      - color: |
          [[[ 
            if (states[entity.entity_id].state === "playing")
              return "var(--accent-color)"
            if (states["input_select.media_player_auswahl_helfer"].state === variables.player_room) 
              return "rgba(255,255,255,1)"
            else 
              return "var(--primary-text-color)"
          ]]]
      - padding: 8px
      - margin: 0px 0px 0px 12px
    name:
      - font-size: 14px
      - padding-left: 0px
      - margin-top: "-20px"
      - font-weight: bold
      - justify-self: start
      - color: |
          [[[ 
            if (states["input_select.media_player_auswahl_helfer"].state === variables.player_room )
              return "rgba(255,255,255,1)"
            else 
              return "(var(--primary-text-color)"
          ]]]
    grid:
      - grid-template-areas: '"i n" ". playing_label"'
      - grid-template-columns: 76px 1fr
    custom_fields:
      playing_label:
        - color: |
            [[[ 
              if (states["input_select.media_player_auswahl_helfer"].state === variables.player_room )
                return "rgba(255,255,255,0.5)"
              else 
                return "var(--secondary-text-color)"
            ]]]
        - justify-self: start
        - font-weight: 700
        - font-size: 14px
        - margin-top: "-30px"
      active_indicator:
        - position: absolute
        - bottom: "-16px"
        - margin-left: 50%
        - background: var(--accent-color)
        - width: 20px
        - height: 20px
        - transform: rotate(45deg) translateX(-15px)
        - display: |
            [[[ 
              if (states["input_select.media_player_auswahl_helfer"].state === variables.player_room )
                return "block"
              else 
                return "none"
            ]]]
  custom_fields:
    playing_label: |
      [[[ 
        if (states[entity.entity_id].state === "playing") 
          return "Spielt ab" 
        else if (states[entity.entity_id].state === "paused") 
          return "Wartet" 
        else 
          return "Unbekannt"
      ]]]
    active_indicator: ""
