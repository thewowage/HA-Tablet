button_template:
  variables:
    state_on: |
      [[[
        if (variables.sensor_type == "window") return 'on';
        else if (variables.sensor_type == "door") return "on";
        else if (variables.sensor_type == "motion") return "on";
        else if (variables.sensor_type == "lock") return "locked";
        else return states[entity.entity_id].state;
      ]]]
    state_off: |
      [[[
        if (variables.sensor_type == "window") return 'off';
        else if (variables.sensor_type == "door") return "off";
        else if (variables.sensor_type == "motion") return "off";
        else if (variables.sensor_type == "lock") return "unlocked";
        else return states[entity.entity_id].state;
      ]]]
    sensor_type:
  type: custom:button-card
  icon: "[[[ return entity.attributes.icon ]]]"
  show_label: true
  show_icon: true
  tap_action:
    action: more-info
    haptic: success
  hold_action:
    action: more-info
  state:
    - value: "[[[ return variables.state_on ]]]"
      styles:
        card:
          - background: var(--button-color-background-active-opacity)
        name:
          - color: var(--text-color)
        label:
          - color: var(--text-color)
        state:
          - color: var(--text-color)
        icon:
          - color: var(--paper-item-icon-active-color)
        img_cell:
          - background: var(--ha-cardButton-background--inactive)
      icon: |
        [[[
          if (variables.sensor_type == "window") return 'mdi:window-closed';
          else if (variables.sensor_type == "door") return "mdi:door-open";
          else if (variables.sensor_type == "motion") return "mdi:motion-sensor";
          else if (variables.sensor_type == "lock") return "mdi:lock-outline";
          else return states[entity.entity_id].state;
        ]]]
      label: |
        [[[
          if (variables.sensor_type == "window") return 'offen';
          else if (variables.sensor_type == "door") return "offen";
          else if (variables.sensor_type == "motion") return "bewegung";
          else if (variables.sensor_type == "lock") return "verschlossen";
          else return states[entity.entity_id].state;
        ]]]
    - value: "[[[ return variables.state_off ]]]"
      styles:
        card:
          - background: var(--ha-cardButton-background--active)
        icon:
          - color: var(--paper-item-icon-color)
        img_cell:
          - background: var(--background-icon-color-default)
      icon: |
        [[[
          if (variables.sensor_type == "window") return "mdi:window-open";
          else if (variables.sensor_type == "door") return "mdi:door";
          else if (variables.sensor_type == "motion") return "mdi:motion-sensor-off";
          else if (variables.sensor_type == "lock") return "mdi:lock-open-outline";
          else return states[entity.entity_id].state;
        ]]]
      label: |
        [[[
          if (variables.sensor_type == "window") return "zu";
          else if (variables.sensor_type == "door") return "zu";
          else if (variables.sensor_type == "motion") return "ruhig";
          else if (variables.sensor_type == "lock") return "aufgeschlossen";
          else return states[entity.entity_id].state;
        ]]]
    - value: "unavailable"
      styles:
        name:
          - text-decoration: line-through
        icon:
          - color: var(--paper-item-icon-color)
        img_cell:
          - background: var(--background-icon-color-default)
        card:
          - opacity: 0.6
          - pointer-events: none
      label: Unknown
      icon: mdi:alert-box-outline
  styles:
    grid:
      - grid-template-areas: |
          '. i'
          'n n'
          'l l'
      - grid-template-rows: min-content min-content 1fr
    card:
      - padding: 12px
      - height: 105px
    name:
      - text-align: left
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
      - justify-self: start
      - align-self: end
    label:
      - text-align: left
      - font-size: var(--font-size-state)
      - font-weight: var(--font-weight-state)
      - justify-self: start
      - align-self: center
      - color: var(--subtext-color)
    icon:
      - width: 50%
      - color: var(--text-color)
    img_cell:
      - border-radius: 50%
      - width: 35px
      - height: 35px
      - align-self: start
      - margin-bottom: 10px
