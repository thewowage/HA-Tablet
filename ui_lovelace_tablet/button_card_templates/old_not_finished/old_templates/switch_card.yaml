switch_card:
  variables:
    power_entity:
    power_unit: w
    graph_color: var(--label-badge-blue)
    show_graph: false
    show_graph_line: true
    show_graph_fill: false
  show_state: true
  styles:
    grid:
      - grid-template-areas: |
          '. i'
          'n n'
          's s'
          'graph graph'
      - grid-template-rows: min-content min-content 1fr
    card:
      - padding: 12px
      - height: 105px
    name:
      - text-align: left
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
      - justify-self: start
      - align-self: end
    state:
      - text-align: left
      - font-size: var(--font-size-state)
      - font-weight: var(--font-weight-state)
      - justify-self: start
      - align-self: center
      - color: var(--secondary-text-color)
    icon:
      - width: 50%
      - color: var(--text-color)
    img_cell:
      - border-radius: 50%
      - width: 35px
      - height: 35px
      - align-self: start
      - margin-bottom: 10px
    custom_fields:
      graph:
        - display: |
            [[[
              if (variables.show_graph) {
                return 'block';
              }
              else {
                return 'none';
              }            
            ]]]
        - position: absolute
        - left: 0
        - bottom: -1px
        - width: 100%
        - z-index: 1
        - pointer-events: none
  state:
    - value: "on"
      styles:
        card:
          - background: var(--button-color-background-active-opacity)
        name:
          - color: var(--text-color)
        label:
          - color: var(--text-color)
        state:
          - color: var(--text-color)
        icon:
          - color: var(--paper-item-icon-active-color)
        img_cell:
          - background: var(--ha-cardButton-background--inactive)
      state_display: |
        [[[
          if (entity.state === "on" && variables.power_entity !== null) {
            return 'an' + " - " + states[variables.power_entity].state + variables.power_unit;
          } else {
            return 'an';
          }
        ]]]
    - value: "off"
      styles:
        card:
          - background: var(--ha-cardButton-background--active)
        icon:
          - color: var(--paper-item-icon-color)
        img_cell:
          - background: var(--background-icon-color-default)
      state_display: "aus"
    - value: unavailable
      styles:
        name:
          - text-decoration: line-through
        icon:
          - color: var(--icon-color-default)
        img_cell:
          - background: var(--background-icon-color-default)
        card:
          - opacity: 0.6
          - pointer-events: none
  custom_fields:
    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.power_entity ]]]"
            show_fill: "[[[ return variables.show_graph_fill ]]]"
            show_line: "[[[ return variables.show_graph_line ]]]"
        animate: true
        show:
          name: false
          icon: false
          state: false
        line_width: 1
        line_color: |
          [[[
            if (entity.state === "on" && variables.power_entity !== null) {
              return variables.graph_color;
            } else {
              return 'var(--label-badge-yellow)';
            }
          ]]]
        hours_to_show: 24
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              --ha-card-border-width: 0;
              z-index: 1
            }
