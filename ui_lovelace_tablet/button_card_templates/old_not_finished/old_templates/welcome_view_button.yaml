welcome_view_button:
  show_state: false
  show_name: false
  show_label: false
  styles:
    card:
      - width: 72px
      - height: 72px
      - margin-right: 12px
      - margin-top: 0px
      - background: var(--welcome-card-background)
      - border: 0px
    icon:
      - width: 40px
      - height: 40px
      - color: var(--primary-text-color)
      - padding: 12px
      - margin-left: 7px
    name:
      - font-size: 14px
      - padding-left: 14px
      - font-weight: bold
      - justify-self: start
    grid:
      - grid-template-areas: '"i n"'
      - grid-template-columns: 64px 1fr
