welcome_greeting:
  entity: sensor.welcome_begruessung
  show_state: true
  name: begruessung
  show_name: false
  show_icon: false
  show_label: false
  card_mod:
    styles:
      ha-card:
        transition: none
  styles:
    card:
      - background: transparent
      - margin: 0px 0px 8px 0px
      - padding: 0px
      - border: 0px
    state:
      - font-size: 24px
      - padding-left: 0px
      - font-weight: 300
      - text-transform: uppercase
      - justify-self: start
      - color: var(--primary-text-color)
  tap_action:
    action: none

welcome_time:
  show_icon: false
  show_state: true
  show_name: false
  card_mod:
    style: |
      ha-card {
        box-shadow: none !important;
        background: transparent;
        border: 0px;
        width: 550px !important;
      }
  entity: sensor.time
  hold_action:
    action: none
  tap_action:
    action: none
  styles:
    card:
      - background-color: transparent
      - height: 140px
      - margin-bottom: 8px
    state:
      - font-size: 168px
      - text-align: left
      - color: var(--primary-text-color)
      - font-weight: 100
      - justify-self: start
      - transform: |-
          [[[
            const state = entity?.state || '';
            const hour = state.split(':')[0] || '';

            const offset0 = -18;  // Stunden, die mit 0 beginnen
            const offset2 = -6;   // Stunden, die mit 2 beginnen

            if (/^0/.test(hour)) return `translateX(${offset0}px)`;
            if (/^2/.test(hour)) return `translateX(${offset2}px)`;
            return 'translateX(0)';
          ]]]

welcome_date:
  show_icon: false
  show_state: true
  show_name: false
  entity: sensor.calendar_date_de
  hold_action:
    action: none
  tap_action:
    action: none
  card_mod:
    style: |
      ha-card {
        box-shadow: none !important;
        background: transparent;
        border: 0px;
        transition: none;
        border-radius: 4px;
        width: 500px !important;
      }
  styles:
    card:
      - margin: 0px
      - height: 40px
      - padding: 0px
    state:
      - font-size: 24px
      - text-align: left
      - color: var(--primary-text-color)
      - font-weight: 300
      - justify-self: start
