sensor_graph_card:
  variables:
    show_graph: true
    graph_entity: "[[[ return entity.entity_id ]]]"
    graph_color: var(--label-badge-blue)
    current_temp_label: "Momentane Temperatur: "
    label_icon:
  show_label: true
  show_state: false
  show_icon: true
  label: |
    [[[
      if (variables.label_icon == "percent") return states[entity.entity_id].state + '<sup style="font-size: 20px;"> %</sup>';
      else if (variables.label_icon == "celsius") return states[entity.entity_id].state + '<sup style="font-size: 20px;"> °</sup>';
      else if (variables.label_icon == "lux") return states[entity.entity_id].state + '<sup style="font-size: 18px;"> lx</sup>';
      else return states[entity.entity_id].state;
    ]]]
  styles:
    grid:
      - grid-template-areas: |
          'l i'
          'n n'
      - grid-template-columns: 1fr
      - grid-template-rows: 60% 1fr
    card:
      - height: 105px
      - padding: 10px 20px 10px 20px
    name:
      - justify-self: start
      - align-self: end
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
      - z-index: 2
      - pointer-events: none
      - margin-bottom: 12px
    label:
      - font-size: var(--font-size-label)
      - font-weight: var(--font-weight-label)
      - justify-self: start
      - align-self: start
      - margin-top: 10px
      - z-index: 2
    icon:
      - width: 50%
      - color: var(--icon-color)
    img_cell:
      #- background: var(--primary-background-color)
      - border-radius: 50%
      - width: 40px
      - height: 40px
      - align-self: start
      - margin-bottom: 5px
      - margin-right: -6px
      - justify-self: end
    custom_fields:
      graph:
        - position: absolute
        - display: |
            [[[ return variables.show_graph && variables.graph_entity ? 'block' : 'none' ]]]
        - width: 100%
        - left: 0
        - bottom: 0
  custom_fields:
    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.graph_entity ]]]"
        line_width: 0
        line_color: "[[[ return variables.graph_color ]]]"
        height: 60
        show:
          icon: false
          name: false
          state: false
          legend: false
          labels: false
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              --ha-card-border-width: 0;
              z-index: 1;
            }
