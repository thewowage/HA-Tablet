room_input_card:
  show_state: false
  show_icon: false
  styles:
    grid:
      - grid-template-areas: |
          '. i'
          'n n'
      - grid-template-rows: min-content min-content
    card:
      - padding: 12px
      - height: 43px
    name:
      - text-align: left
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
      #- justify-self: start
      #- align-self: end
    icon:
      - width: 50%
      - color: var(--text-color)
    img_cell:
      - border-radius: 50%
      - width: 35px
      - height: 35px
      - align-self: start
      #- margin-bottom: 10px

room_input_card_badge:
  show_state: false
  show_icon: false

  custom_fields:
    light_badge: |
      [[[
        const entities = variables.entities || [];
        const lights = entities.filter(e =>
          e.startsWith('light.') && states[e]?.state === 'on'
        );
        if (lights.length === 0) return '';
        return `<div class="mini_badge light">${lights.length}</div>`;
      ]]]
    device_badge: |
      [[[
        const entities = variables.entities || [];
        const devices = entities.filter(e => {
          const s = states[e]?.state;
          return !e.startsWith('light.') &&
            ['on','playing','heating','cooling'].includes(s);
        });
        if (devices.length === 0) return '';
        return `<div class="mini_badge device">${devices.length}</div>`;
      ]]]
  styles:
    grid:
      - grid-template-areas: |
          "n n"
          "light_badge device_badge"
      - grid-template-columns: min-content min-content
      - grid-template-rows: min-content min-content
      - justify-content: center
      - column-gap: 8px
      - row-gap: 5px
    card:
      - padding: 10px 14px
      - height: 58px
      - border-radius: 22px
      - background: rgba(255,255,255,0.06)
    name:
      - justify-self: center
      - text-align: center
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
    custom_fields:
      light_badge:
        - justify-self: end
      device_badge:
        - justify-self: start
  extra_styles: |
    .mini_badge {
      min-width: 28px;
      height: 14px;
      padding: 0 4px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 700;
      line-height: 14px;
      text-align: center;
    }
    .mini_badge.light {
      background: rgba(255, 209, 102, 0.95);
      color: #1b1b1b;
      box-shadow: 0 0 10px rgba(255, 209, 102, 0.45);
    }
    .mini_badge.device {
      background: rgba(120, 180, 255, 0.95);
      color: #0b1220;
      box-shadow: 0 0 10px rgba(120, 180, 255, 0.35);
    }

room_input_card_badge_apple_old:
  show_state: false
  show_icon: false

  variables:
    input_select: input_select.dashboard_auswahl
    option: home

  custom_fields:
    light_badge: |
      [[[
        const entities = variables.entities || [];
        const lights = entities.filter(e =>
          e.startsWith('light.') && states[e]?.state === 'on'
        );
        if (lights.length === 0) return '';
        return `<div class="badge light">${lights.length}</div>`;
      ]]]

    device_badge: |
      [[[
        const entities = variables.entities || [];
        const devices = entities.filter(e => {
          const s = states[e]?.state;
          return !e.startsWith('light.') &&
            ['on','playing','heating','cooling'].includes(s);
        });
        if (devices.length === 0) return '';
        return `<div class="badge device">${devices.length}</div>`;
      ]]]

  styles:
    grid:
      - grid-template-areas: |
          "n"
      - grid-template-columns: 1fr

    card:
      - padding: 14px
      - height: 60px
      - border-radius: 22px
      - position: relative
      - overflow: visible
      - backdrop-filter: blur(18px)
      - -webkit-backdrop-filter: blur(18px)
      - border: 1px solid rgba(255,255,255,0.12)
      - background: >
          [[[
            const color = variables.room_color || '255,209,102';
            const input = variables.input_select || 'input_select.dashboard_auswahl';
            const option = variables.option;
            const selected = states[input]?.state === option;

            if (!selected) {
              return `
                linear-gradient(
                  135deg,
                  rgba(255,255,255,0.10),
                  rgba(255,255,255,0.035)
                )
              `;
            }

            return `
              radial-gradient(
                circle at 88% 18%,
                rgba(${color},0.55) 0%,
                rgba(${color},0.28) 28%,
                rgba(${color},0.10) 52%,
                rgba(255,255,255,0.07) 78%
              ),
              linear-gradient(
                135deg,
                rgba(255,255,255,0.16),
                rgba(255,255,255,0.045)
              )
            `;
          ]]]

      - box-shadow: >
          [[[
            const color = variables.room_color || '255,209,102';
            const input = variables.input_select || 'input_select.dashboard_auswahl';
            const option = variables.option;
            const selected = states[input]?.state === option;

            return selected
              ? `0 5px 14px rgba(${color},0.35), inset 0 1px 0 rgba(255,255,255,0.18)`
              : `none`;
          ]]]

    name:
      - justify-self: center
      - text-align: center
      - color: rgba(255,255,255,0.95)
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
      - text-shadow: 0 1px 8px rgba(0,0,0,0.25)

    custom_fields:
      light_badge:
        - position: absolute
        - top: -7px
        - right: 34px
        - z-index: 5

      device_badge:
        - position: absolute
        - top: -7px
        - right: 6px
        - z-index: 5

  extra_styles: |
    ha-card {
      border-radius: 22px !important;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    ha-card:hover {
      border-radius: 22px !important;
      transform: none !important;
    }

    .badge {
      min-width: 22px;
      height: 16px;
      padding: 0 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      line-height: 16px;
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
    }

    .badge.light {
      background: rgba(255, 209, 102, 0.95);
      color: #1b1b1b;
      box-shadow: 0 3px 12px rgba(255, 209, 102, 0.55);
    }

    .badge.device {
      background: rgba(120, 180, 255, 0.95);
      color: #07111f;
      box-shadow: 0 3px 12px rgba(120, 180, 255, 0.45);
    }

room_input_card_badges:
  show_state: false
  show_icon: false

  custom_fields:
    light_badge: |
      [[[
        const entities = variables.entities || [];
        const lights = entities.filter(e =>
          e.startsWith('light.') && states[e]?.state === 'on'
        );
        if (lights.length === 0) return '';
        return `<div class="badge light">${lights.length}</div>`;
      ]]]
    device_badge: |
      [[[
        const entities = variables.entities || [];
        const devices = entities.filter(e => {
          const s = states[e]?.state;
          return !e.startsWith('light.') &&
            ['on','playing','heating','cooling'].includes(s);
        });
        if (devices.length === 0) return '';
        return `<div class="badge device">${devices.length}</div>`;
      ]]]
  styles:
    grid:
      - grid-template-areas: |
          "n"
      - grid-template-columns: 1fr
    card:
      - padding: 12px
      - height: 43px
      - background: rgba(255,255,255,0.06)
      - position: relative
      - overflow: visible # 🔥 wichtig!
    name:
      - justify-self: center
      - text-align: center
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
    custom_fields:
      light_badge:
        - position: absolute
        - top: -6px
        - right: 28px
      device_badge:
        - position: absolute
        - top: -6px
        - right: 6px
  extra_styles: |
    /* Fix für eckigen Hover-Schatten */
    ha-card {
      border-radius: 10px !important;
      overflow: hidden;
      transition: all 0.15s ease;
    }

    ha-card:hover {
      border-radius: 10px !important;
      box-shadow: none !important;
      transform: scale(1.02);
    }

    /* Badge Style */
    .badge {
      min-width: 22px;
      height: 16px;
      padding: 0 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      line-height: 16px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .badge.light {
      background: rgba(255, 209, 102, 0.95);
      color: #1b1b1b;
      box-shadow: 0 2px 10px rgba(255, 209, 102, 0.5);
    }

    .badge.device {
      background: rgba(120, 180, 255, 0.95);
      color: #0b1220;
      box-shadow: 0 2px 10px rgba(120, 180, 255, 0.4);
    }
