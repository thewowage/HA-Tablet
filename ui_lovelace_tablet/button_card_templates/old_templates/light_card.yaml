light_card:
  icon: fapro:lightbulb-on
  show_label: true
  variables:
    enable_slider: false
  label: |
    [[[
      // Brightness absichern
      var bri_raw = states[entity.entity_id].attributes.brightness;
      var bri = bri_raw ? Math.round(bri_raw / 2.55) : 0;

      // Fall 1: Slider deaktiviert + Licht an
      if (variables.enable_slider === false && states[entity.entity_id].state === "on") {
        return "An";
      }

      // Fall 2: Slider aktiviert + Licht an
      if (variables.enable_slider === true && states[entity.entity_id].state === "on") {
        return bri + "%";
      }

      // Fall 3: Licht aus
      return "Aus";
    ]]]
  styles:
    grid:
      - grid-template-areas: |
          [[[
            if (variables.enable_slider && states[entity.entity_id].attributes.brightness) {
                return '"n i" "l i" "slider slider"';
            }
              return '". i" "n n" "l l"';
          ]]]
      - grid-template-rows: min-content min-content 1fr
    card:
      - padding: 12px
      - height: 105px
    name:
      - text-align: left
      - font-size: var(--font-size-primary)
      - font-weight: var(--font-weight-primary)
      - justify-self: start
      - align-self: end
    label:
      - text-align: left
      - font-size: var(--font-size-state)
      - font-weight: var(--font-weight-state)
      - justify-self: start
      - align-self: center
      - color: var(--secondary-text-color)
      - padding-bottom: |
          [[[
            if (variables.enable_slider && states[entity.entity_id].attributes.brightness) {
                return '10px';
            }
              return '0';
          ]]]
    icon:
      - width: 50%
      - color: var(--icon-color)
    img_cell:
      - background: var(--primary-background-color)
      - border-radius: 50%
      - width: 35px
      - height: 35px
      - align-self: start
      - margin-bottom: 10px
      - justify-self: end
    custom_fields:
      slider:
        - display: >
            [[[
              if (variables.enable_slider && states[entity.entity_id].attributes.brightness) {
                  return "block";
              }
              return "none";
            ]]]
  state:
    - value: "on"
      icon: mdi:lightbulb-on
      styles:
        card:
          - background: var(--button-color-background-active-opacity)
          #- box-shadow: 0px 0px 1px 1px var(--paper-item-icon-active-color)
        name:
          - color: var(--text-color)
        label:
          - color: var(--text-color)
        state:
          - color: var(--text-color)
        icon:
          - color: var(--paper-item-icon-active-color)
        img_cell:
          - background: var(--ha-cardButton-background--inactive)
    - value: "off"
      styles:
        card:
          - background: var(--ha-cardButton-background--active)
        icon:
          - color: var(--paper-item-icon-color)
        img_cell:
          - background: var(--background-icon-color-default)
      icon: mdi:lightbulb-outline
    - value: "unavailable"
      styles:
        name:
          - text-decoration: line-through
        icon:
          - color: var(--paper-item-icon-color)
        img_cell:
          - background: var(--background-icon-color-default)
        card:
          - opacity: 0.6
          - pointer-events: none
      label: Unknown
      icon: mdi:lightbulb-question
  custom_fields:
    slider:
      card:
        type: custom:my-slider-v2
        entity: "[[[ return entity.entity_id ]]]"
        mode: brightness
        styles:
          card:
            - height: 30px
            - box-shadow: none
            - padding: 0
            - touch-action: pan-y
            - background: |
                [[[
                  if (states[entity.entity_id].state === 'off') {
                    return 'var(--primary-background-color)';
                  } else {
                    return variables.card_color;
                  }
                ]]]
            - border-radius: 10px
          progress:
            - height: 100%
            - touch-action: pan-y
            - background: |
                [[[
                  if (states[entity.entity_id].state === 'off') {
                    return variables.card_color;
                  } else {
                    return 'var(--paper-slider-knob-color)';
                  }
                ]]]
            - border-radius: 10px
          track:
            - touch-action: pan-y
            - background: |
                [[[
                  if (states[entity.entity_id].state === 'on') {
                    return 'var(--primary-background-color)';
                  } else {
                    return 'var(--slider-color)';
                  }
                ]]]
            - border-radius: 10px
          thumb:
            - touch-action: pan-y
            - height: 30%
            - background: |
                [[[
                  if (states[entity.entity_id].state === 'off') {
                    return 'var(--text-color)';
                  } else {
                    return variables.card_color;
                  }
                ]]]
            - position: absolute
            - right: 7px
            - top: 11px
            - width: 3px
  hold_action:
    action: more-info
