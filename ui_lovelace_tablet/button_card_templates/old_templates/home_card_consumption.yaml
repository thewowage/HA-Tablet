
home_card_consumption_apple:
  entity: null
  show_name: false
  show_icon: false

  variables:
    price_per_kwh: 0.30
    image: /local/images/wall_dashboard/energie_strategie.jpg

  tap_action:
    action: call-service
    service: script.dashboard_state_switch_card_durchwechseln

  styles:
    card:
      - height: 280px
      - padding: 0 18px
      - border-radius: 24px
      - position: relative
      - overflow: hidden
      - backdrop-filter: blur(18px)
      - -webkit-backdrop-filter: blur(18px)
      #- border: 1px solid rgba(255,255,255,0.12)
      - background: >
          [[[
            return `
              linear-gradient(
                90deg,
                rgba(32,37,54,0.98) 0%,
                rgba(32,37,54,0.92) 42%,
                rgba(32,37,54,0.62) 62%,
                rgba(32,37,54,0.24) 82%,
                rgba(32,37,54,0.02) 100%
              ),
              radial-gradient(
                circle at 88% 18%,
                rgba(255,209,102,0.34) 0%,
                rgba(255,209,102,0.14) 35%,
                transparent 72%
              ),
              url('${variables.image}')
            `;
          ]]]
      - background-size: cover, cover, auto 115%
      - background-position: center, center, calc(100% + 8px) center
      - background-repeat: no-repeat
      - box-shadow: >
          [[[
            const daily = Number(states["sensor.energy_consumption_daily"]?.state || 0);
            const color = daily > 10 ? "236,99,55" : "255,209,102";

            return `
              0 10px 30px rgba(${color},0.22),
              inset -40px 0 80px rgba(32,37,54,0.45)
            `;
          ]]]

    grid:
      - grid-template-areas: |
          "title"
          "label_consumption_daily"
          "consumption_daily"
          "label_consumption_monthly"
          "consumption_monthly"
          "label_consumption_yearly"
          "consumption_yearly"
      - grid-template-columns: 1fr
      - row-gap: 6px
      - justify-items: start
      - align-items: center
      - text-align: left
      - padding: 18px 0

    custom_fields:
      title:
        - justify-self: start
        - text-align: left
        - width: 100%
        - font-size: 22px
        - font-weight: 800
        - color: rgba(255,255,255,0.96)
        - z-index: 3
        - margin-bottom: 4px

      label_consumption_daily:
        - justify-self: start
        - text-align: left
        - width: 100%
        - font-size: 11px
        - font-weight: 800
        - letter-spacing: 0.08em
        - color: rgba(255,255,255,0.50)
        - z-index: 3

      consumption_daily:
        - justify-self: start
        - text-align: left
        - width: 100%
        - font-size: 22px
        - font-weight: 800
        - color: rgba(255,255,255,0.96)
        - z-index: 3
        - margin-bottom: 6px

      label_consumption_monthly:
        - justify-self: start
        - text-align: left
        - width: 100%
        - font-size: 11px
        - font-weight: 800
        - letter-spacing: 0.08em
        - color: rgba(255,255,255,0.50)
        - z-index: 3

      consumption_monthly:
        - justify-self: start
        - text-align: left
        - width: 100%
        - font-size: 22px
        - font-weight: 800
        - color: rgba(255,255,255,0.96)
        - z-index: 3
        - margin-bottom: 6px

      label_consumption_yearly:
        - justify-self: start
        - text-align: left
        - width: 100%
        - font-size: 11px
        - font-weight: 800
        - letter-spacing: 0.08em
        - color: rgba(255,255,255,0.50)
        - z-index: 3

      consumption_yearly:
        - justify-self: start
        - text-align: left
        - width: 100%
        - font-size: 22px
        - font-weight: 800
        - color: rgba(255,255,255,0.96)
        - z-index: 3

  custom_fields:
    title: |
      [[[
        return "Energie";
      ]]]

    label_consumption_daily: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_daily"]?.state || 0);
        const price = Number(variables.price_per_kwh || 0.30);
        return `HEUTE · ${(kwh * price).toFixed(2).replace(".",",")} €`;
      ]]]

    consumption_daily: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_daily"]?.state || 0);
        return `
          <div class="energy-value">
            ${kwh.toFixed(2).replace(".",",")}
            <small>kWh</small>
          </div>
        `;
      ]]]

    label_consumption_monthly: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_monthly"]?.state || 0);
        const price = Number(variables.price_per_kwh || 0.30);
        return `MONAT · ${(kwh * price).toFixed(2).replace(".",",")} €`;
      ]]]

    consumption_monthly: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_monthly"]?.state || 0);
        return `
          <div class="energy-value">
            ${kwh.toFixed(2).replace(".",",")}
            <small>kWh</small>
          </div>
        `;
      ]]]

    label_consumption_yearly: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_yearly"]?.state || 0);
        const price = Number(variables.price_per_kwh || 0.30);
        return `JAHR · ${(kwh * price).toFixed(2).replace(".",",")} €`;
      ]]]

    consumption_yearly: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_yearly"]?.state || 0);
        return `
          <div class="energy-value">
            ${kwh.toFixed(2).replace(".",",")}
            <small>kWh</small>
          </div>
        `;
      ]]]

  extra_styles: |
    ha-card {
      border-radius: 24px !important;
      overflow: hidden;
      position: relative;
      text-align: left !important;
      background-attachment: scroll, scroll, fixed !important;
    }

    .energy-value {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .energy-value small {
      font-size: 12px;
      font-weight: 800;
      opacity: 0.72;
    }

    ha-card:hover {
      transform: none !important;
      border-radius: 24px !important;
    }


home_card_consumption:
  entity: null
  show_name: false
  show_icon: false
  tap_action:
    action: call-service
    service: script.dashboard_state_switch_card_durchwechseln
  #name: Stromverbrauch
  #icon: fapro:bolt
  styles:
    card:
      - background: >-
          var(--ha-card-background)
          url('/local/images/wall_dashboard/energie_strategie.jpg')
      #- background: var(--ha-energieverbrauch-img)
      - background-position: center right
      - background-size: contain
      - background-repeat: no-repeat
      - border: 0px
      - height: 100%
    #icon:
    #  - width: 28px
    #  - height: 28px
    #  - color: var(--primary-text-color)
    #  - padding: 5px
    #  - margin-left: 16px
    #name:
    #  - font-size: 14px
    #  - padding-left: 4px
    #  - font-weight: bold
    #  - justify-self: start
    #  #- color: var(--secondary-text-color)
    custom_fields:
      label_consumption_daily:
        - font-size: var(--font-size-primary)
        - font-weight: var(--font-weight-primary)
        - padding-left: 24px
        - justify-self: start
        - color: var(--secondary-text-color)
        #- margin-top: 19px
      consumption_daily:
        - font-size: var(--font-size-label)
        - font-weight: var(--font-weight-label)
        - padding-left: 24px
        - justify-self: start
        - color: var(--primary-text-color)
        - margin-top: -8px
      label_consumption_monthly:
        - font-size: var(--font-size-primary)
        - font-weight: var(--font-weight-primary)
        - padding-left: 24px
        - justify-self: start
        - color: var(--secondary-text-color)
        - margin-top: 16px
      consumption_monthly:
        - font-size: var(--font-size-label)
        - font-weight: var(--font-weight-label)
        - padding-left: 24px
        - justify-self: start
        - color: var(--primary-text-color)
      label_consumption_yearly:
        - font-size: var(--font-size-primary)
        - font-weight: var(--font-weight-primary)
        - padding-left: 24px
        - justify-self: start
        - color: var(--secondary-text-color)
        - margin-top: 16px
      consumption_yearly:
        - font-size: var(--font-size-label)
        - font-weight: var(--font-weight-label)
        - padding-left: 24px
        - justify-self: start
        - color: var(--primary-text-color)
    grid:
      - grid-template-areas: >-
          "label_consumption_daily label_consumption_daily"
          "consumption_daily consumption_daily"
          "label_consumption_monthly label_consumption_monthly"
          "consumption_monthly consumption_monthly"
          "label_consumption_yearly label_consumption_yearly"
          "consumption_yearly consumption_yearly"
      - grid-template-columns: 64px 1fr
      - grid-template-rows: 32px 1fr
  custom_fields:
    label_consumption_daily: >
      [[[ return "Heute - " +
      (parseFloat(states["sensor.energy_consumption_daily"].state)
      * 0.3).toFixed(2).replace(".",",") + " €"]]]
    consumption_daily: |
      [[[
          return parseFloat(states["sensor.energy_consumption_daily"].state).toFixed(2).replace(".",",") + `<span style="font-size: 14px"> kWh</span>`
      ]]]
    label_consumption_monthly: >
      [[[ return "Monat - " +
      (parseFloat(states["sensor.energy_consumption_monthly"].state)
      * 0.3).toFixed(2).replace(".",",") + " €"]]]
    consumption_monthly: |
      [[[
          return parseFloat(states["sensor.energy_consumption_monthly"].state).toFixed(2).replace(".",",") + `<span style="font-size: 14px"> kWh</span>`
      ]]]
    label_consumption_yearly: >
      [[[ return "Jahr - " +
      (parseFloat(states["sensor.energy_consumption_yearly"].state)
      * 0.3).toFixed(2).replace(".",",") + " €"]]]
    consumption_yearly: |
      [[[
          return parseFloat(states["sensor.energy_consumption_yearly"].state).toFixed(2).replace(".",",") + `<span style="font-size: 14px"> kWh</span>`
      ]]]
