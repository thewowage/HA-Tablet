guten_morgen_card:
  show_icon: false
  show_name: false
  show_state: false
  styles:
    card:
      - padding: 16px 0px 0px 0px
      - background: var(--welcome-card-background) !important
      - box-shadow: none !important
      - border: 0
      - border-radius: var(--ha-card-border-radius, 12px)
      - max-width: 400px
    grid:
      - grid-template-areas: >-
          "top trig" "next next" "sep sep" "weather_label
          weather_label" "weather weather"
      - grid-template-columns: 1fr max-content
      - grid-template-rows: min-content min-content min-content min-content min-content
      - column-gap: 12px
      - row-gap: 0px
    custom_fields:
      top:
        - width: 100%
      trig:
        - justify-self: end
      next:
        - width: 100%
      sep:
        - width: 100%
      weather_label:
        - justify-self: start
        - font-weight: 600
        - opacity: 0.8
      weather:
        - width: 100%
  custom_fields:
    top:
      card:
        type: custom:mod-card
        card:
          type: custom:mushroom-entity-card
          entity: input_boolean.guten_morgen_mode_aktiviert
          layout: horizontal
          primary_info: name
          secondary_info: state
          tap_action:
            action: toggle
          icon: fapro:sun
          icon_color: teal
          name: Guten Morgen Mode
        card_mod:
          style:
            .: |
              ha-card {
                background: transparent !important;
                box-shadow: none !important;
                border: 0 !important;
                border-radius: 0 !important;
                padding: 0;
                margin-left: 8px;
              }
            mushroom-entity-card$:
              .: |
                :host {
                  --ha-card-background: transparent;
                  --ha-card-border-width: 0;
                  --ha-card-border-color: transparent;
                  --ha-card-border-radius: 0px;
                  --ha-card-box-shadow: none;
                }
                ha-card {
                  background: transparent !important;
                  border: 0 !important;
                  border-radius: 0 !important;
                  box-shadow: none !important;
                }
              mushroom-state-item$: >
                .container {
                  display: flex !important;
                  flex-direction: row !important;
                  align-items: center !important;
                  justify-content: flex-start !important;
                }

                .info { align-items: flex-start !important;
                text-align: left !important; }

                .primary, .secondary { text-align: left !important; }
    trig:
      card:
        type: conditional
        conditions:
          - condition: state
            entity: >-
              input_boolean.trigger_bewegung_im_flur_erkannt
            state: "on"
        card:
          type: custom:button-card
          icon: fapro:sleep-moon
          show_name: false
          show_state: false
          show_label: false
          styles:
            card:
              - background: transparent !important
              - box-shadow: none !important
              - border: 1px solid var(--primary-text-color--half-opacity)
              - padding: 0
              - width: 48px
              - height: 48px
              - margin-right: 16px
              - border-radius: 12px
            icon:
              - width: 20px
              - height: 20px
              - color: var(--primary-text-color--half-opacity)
    next:
      card:
        type: conditional
        conditions:
          - condition: state
            entity: timer.timer_guten_morgen_mode_phase_2
            state: active
        card:
          type: custom:button-card
          template: script_card
          tap_action:
            action: call-service
            service: timer.finish
            target:
              entity_id: timer.timer_guten_morgen_mode_phase_2
          icon: fapro:lightbulb-on
          layout: icon_name
          name: Nächste Phase aktivieren
          styles:
            card:
              - background: var(--welcome-card-background) !important
              - box-shadow: none !important
              - border: 0
              - border-radius: 12px
              - padding: 5px 0px
              - margin: 16px 0px 0px 16px
              - width: calc(400px - 32px)
            name:
              - font-weight: 700
    sep: >
      <div style="height:1px; background:
      var(--primary-text-color--half-opacity); margin: 16px 16px 8px
      16px;opacity: 0.15"></div>
    weather_label: >
      <div style="font-size: 0.95rem; font-weight: 600; line-height:
      1; margin-top: 16px; margin-left: 16px; transform:
      translateY(2px); opacity:1 !important; color: FFFFFF;">
        Wetterübersicht Heute
      </div>
    weather:
      card:
        type: custom:hourly-weather
        entity: weather.forecast_home
        num_segments: 18
        label_spacing: 4
        name: null
        forecast_type: hourly
        icons: true
        card_mod:
          style: |
            ha-card {
              background: transparent !important;
              box-shadow: none !important;
              border: 0;
              margin: 0px;
              padding-bottom: 8px;
              transition: transform 0s ease;
            }
