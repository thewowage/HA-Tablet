home_card_consumption_modern_wge:
  entity: null
  show_name: false
  show_icon: false

  variables:
    price_per_kwh: 0.30
    image: /local/images/dashboard/lamp_bg.png
    card_color: "255,209,102"
    warning_color: "236,99,55"

  tap_action:
    action: call-service
    service: script.dashboard_state_switch_card_durchwechseln

  styles:
    card:
      - height: 260px
      - padding: 18px
      - border-radius: 24px
      - position: relative
      - overflow: hidden
      - border: none
      - background: >
          [[[
            const daily = Number(states["sensor.energy_consumption_daily"]?.state || 0);
            const color = daily > 10
              ? variables.warning_color || "236,99,55"
              : variables.card_color || "255,209,102";

            return `
              linear-gradient(
                90deg,
                rgba(18,22,30,0.98) 0%,
                rgba(18,22,30,0.94) 42%,
                rgba(18,22,30,0.76) 62%,
                rgba(18,22,30,0.44) 80%,
                rgba(18,22,30,0.12) 100%
              ),
              radial-gradient(
                circle at 18% 22%,
                rgba(${color},0.22),
                transparent 44%
              ),
              url('${variables.image}')
            `;
          ]]]
      - background-size: cover
      - background-position: center right
      - background-repeat: no-repeat
      #- box-shadow: >
      #    [[[
      #      const daily = Number(states["sensor.energy_consumption_daily"]?.state || 0);
      #      const color = daily > 10
      #        ? variables.warning_color || "236,99,55"
      #        : variables.card_color || "255,209,102";
      #      return `0 10px 24px rgba(${color},0.18)`;
      #    ]]]

    grid:
      - grid-template-areas: |
          "title"
          "label_consumption_daily"
          "consumption_daily"
          "label_consumption_monthly"
          "consumption_monthly"
          "label_consumption_yearly"
          "consumption_yearly"
      - grid-template-columns: 1fr
      - row-gap: 7px
      - justify-items: start
      - align-items: start
      - text-align: left

    custom_fields:
      title:
        - font-size: 22px
        - font-weight: 800
        - color: white
        - z-index: 3
        - margin-bottom: 4px

      label_consumption_daily:
        - font-size: 11px
        - font-weight: 800
        - letter-spacing: 0.08em
        - color: rgba(255,255,255,0.62)
        - z-index: 3

      consumption_daily:
        - font-size: 22px
        - font-weight: 800
        - color: white
        - z-index: 3
        - margin-bottom: 5px

      label_consumption_monthly:
        - font-size: 11px
        - font-weight: 800
        - letter-spacing: 0.08em
        - color: rgba(255,255,255,0.62)
        - z-index: 3

      consumption_monthly:
        - font-size: 22px
        - font-weight: 800
        - color: white
        - z-index: 3
        - margin-bottom: 5px

      label_consumption_yearly:
        - font-size: 11px
        - font-weight: 800
        - letter-spacing: 0.08em
        - color: rgba(255,255,255,0.62)
        - z-index: 3

      consumption_yearly:
        - font-size: 22px
        - font-weight: 800
        - color: white
        - z-index: 3

  custom_fields:
    title: "Energie"

    label_consumption_daily: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_daily"]?.state || 0);
        const price = Number(variables.price_per_kwh || 0.30);
        return `HEUTE · ${(kwh * price).toFixed(2).replace(".",",")} €`;
      ]]]

    consumption_daily: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_daily"]?.state || 0);
        return `
          <div class="energy-pill ${kwh > 10 ? "warn" : ""}">
            <ha-icon icon="mdi:flash"></ha-icon>
            <span>${kwh.toFixed(2).replace(".",",")}</span>
            <small>kWh</small>
          </div>
        `;
      ]]]

    label_consumption_monthly: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_monthly"]?.state || 0);
        const price = Number(variables.price_per_kwh || 0.30);
        return `MONAT · ${(kwh * price).toFixed(2).replace(".",",")} €`;
      ]]]

    consumption_monthly: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_monthly"]?.state || 0);
        return `
          <div class="energy-pill">
            <ha-icon icon="mdi:calendar-month"></ha-icon>
            <span>${kwh.toFixed(2).replace(".",",")}</span>
            <small>kWh</small>
          </div>
        `;
      ]]]

    label_consumption_yearly: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_yearly"]?.state || 0);
        const price = Number(variables.price_per_kwh || 0.30);
        return `JAHR · ${(kwh * price).toFixed(2).replace(".",",")} €`;
      ]]]

    consumption_yearly: |
      [[[
        const kwh = Number(states["sensor.energy_consumption_yearly"]?.state || 0);
        return `
          <div class="energy-pill">
            <ha-icon icon="mdi:chart-line"></ha-icon>
            <span>${kwh.toFixed(2).replace(".",",")}</span>
            <small>kWh</small>
          </div>
        `;
      ]]]

  extra_styles: |
    ha-card {
      border-radius: 24px !important;
      overflow: hidden;
      text-align: left !important;
      transition: transform 0.18s ease, box-shadow 0.25s ease;
    }

    ha-card:active {
      transform: scale(0.97);
    }

    .energy-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: white;
      font-size: 13px;
      font-weight: 800;
      overflow: hidden;
    }

    .energy-pill ha-icon {
      width: 16px;
      height: 16px;
      color: rgba(255,209,102,1);
    }

    .energy-pill small {
      font-size: 10px;
      opacity: 0.75;
    }

    .energy-pill.warn {
      background: rgba(236,99,55,0.92);
      animation: energyPulse 1.8s ease-in-out infinite;
    }

    .energy-pill.warn ha-icon {
      color: white;
    }

    @keyframes energyPulse {
      0%, 100% { box-shadow: 0 0 0 rgba(236,99,55,0); }
      50% { box-shadow: 0 0 14px rgba(236,99,55,0.65); }
    }