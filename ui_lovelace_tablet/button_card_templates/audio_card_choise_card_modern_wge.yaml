audio_card_choise_card_modern_wge:
  template:
    - responsive_card_base

  show_icon: true
  show_name: true
  show_state: false
  show_label: false
  icon: fapro:speaker-minimalistic

  variables:
    player_room:
    card_color: "120,180,255"

  styles:
    grid:
      - grid-template-areas: |
          "i n"
          ". playing_label"
      - grid-template-columns: 58px 1fr
      - grid-template-rows: min-content min-content
      - column-gap: 8px

    card:
      - height: 85px
      - background: >
          [[[
            const active = states["input_select.media_player_auswahl_helfer"]?.state === variables.player_room;
            const color = variables.card_color || "120,180,255";

            return active
              ? `
                linear-gradient(
                  145deg,
                  rgba(${color},0.32),
                  rgba(${color},0.10)
                ),
                var(--ha-card-background)
              `
              : "var(--ha-card-background)";
          ]]]
      - box-shadow: >
          [[[
            const active = states["input_select.media_player_auswahl_helfer"]?.state === variables.player_room;
            const color = variables.card_color || "120,180,255";

            return active
              ? `0 6px 18px rgba(${color},0.22)`
              : "var(--card-shadow)";
          ]]]

    icon:
      - width: var(--card-icon-size)
      - height: var(--card-icon-size)
      - padding: 8px
      - border-radius: 60px
      - background: >
          [[[
            const playing = entity.state === "playing";
            return playing ? "rgba(255,255,255,0.14)" : "rgba(0,0,0,0.08)";
          ]]]
      - color: >
          [[[
            const playing = entity.state === "playing";
            const active = states["input_select.media_player_auswahl_helfer"]?.state === variables.player_room;
            const color = variables.card_color || "120,180,255";

            if (playing || active) return `rgba(${color},1)`;
            return "var(--secondary-text-color)";
          ]]]

    img_cell:
      - justify-self: start
      - align-self: center
      - background: transparent

    name:
      - justify-self: start
      - align-self: center
      - color: var(--primary-text-color)
      - z-index: 2

    custom_fields:
      playing_label:
        - justify-self: start
        - align-self: start
        - color: var(--secondary-text-color)
        - font-size: var(--card-font-size-secondary)
        - font-weight: var(--card-font-weight-secondary)
        - z-index: 2

      active_indicator:
        - position: absolute
        - bottom: 8px
        - left: 50%
        - transform: translateX(-50%)
        - display: >
            [[[
              return states["input_select.media_player_auswahl_helfer"]?.state === variables.player_room
                ? "block"
                : "none";
            ]]]
        - z-index: 5

  custom_fields:
    playing_label: |
      [[[
        const state = entity.state;

        if (state === "playing") {
          return `
            <span>Spielt ab</span>
            <span class="wave">
              <i></i><i></i><i></i>
            </span>
          `;
        }

        if (state === "paused") return "Pausiert";
        if (state === "idle") return "Bereit";

        return "Offline";
      ]]]

    active_indicator: |
      [[[
        return `<div class="ios-indicator"></div>`;
      ]]]

  tap_action:
    action: call-service
    service: input_select.select_option
    service_data:
      entity_id: input_select.media_player_auswahl_helfer
      option: "[[[ return variables.player_room ]]]"

  hold_action:
    action: more-info

  extra_styles: |
    .ios-indicator {
      width: 18px;
      height: 4px;
      border-radius: 999px;
      background: var(--primary-text-color);
      opacity: 0.9;
      box-shadow: 0 0 10px rgba(255,255,255,0.45);
      animation: indicatorPulse 1.8s ease-in-out infinite;
    }

    @keyframes indicatorPulse {
      0%, 100% {
        opacity: 0.55;
        transform: scaleX(0.75);
      }
      50% {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    .wave {
      display: inline-flex;
      gap: 2px;
      margin-left: 7px;
      align-items: end;
      height: 10px;
    }

    .wave i {
      display: block;
      width: 3px;
      border-radius: 999px;
      background: currentColor;
      animation: audioWave 0.9s ease-in-out infinite;
    }

    .wave i:nth-child(1) {
      height: 4px;
      animation-delay: 0s;
    }

    .wave i:nth-child(2) {
      height: 9px;
      animation-delay: 0.15s;
    }

    .wave i:nth-child(3) {
      height: 6px;
      animation-delay: 0.3s;
    }

    @keyframes audioWave {
      0%, 100% {
        transform: scaleY(0.55);
        opacity: 0.55;
      }
      50% {
        transform: scaleY(1.15);
        opacity: 1;
      }
    }