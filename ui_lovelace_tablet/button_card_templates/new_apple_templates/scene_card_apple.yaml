scene_card_apple:
  show_icon: true
  show_state: true
  show_name: true
  show_label: false
  size: 32px

  variables:
    desc:
    card_glow_color: "255,209,102"
    card_glass_bg: "var(--card-glass-bg)"

  custom_fields:
    glass_reflection: |
      [[[
        return `<div class="glass-reflection"></div>`;
      ]]]

    soft_light: |
      [[[
        const color = variables.card_glow_color || "255,209,102";
        return `<div class="soft-light" style="--dynamic-color:${color};"></div>`;
      ]]]

    desc: |
      [[[
        return variables.desc || "";
      ]]]

  styles:
    grid:
      - grid-template-areas: |
          "i s"
          "n n"
          "desc desc"
      - grid-template-columns: 1fr min-content
      - grid-template-rows: min-content min-content 1fr
      - row-gap: 6px

    card:
      - height: 150px
      - padding: 18px
      - border-radius: 22px
      - position: relative
      - overflow: hidden
      - backdrop-filter: blur(28px) saturate(160%)
      - -webkit-backdrop-filter: blur(28px) saturate(160%)
      - border: none
      - --ha-card-border-width: 0
      - background: >
          [[[
            const active = entity?.state === "on";
            const color = variables.card_glow_color || "255,209,102";
            const glass = variables.card_glass_bg || "var(--card-glass-bg)";

            if (!active) {
              return `
                linear-gradient(
                  145deg,
                  rgba(255,255,255,0.10),
                  rgba(255,255,255,0.02)
                ),
                ${glass}
              `;
            }

            return `
              radial-gradient(
                circle at 8% 8%,
                rgba(${color},0.55) 0%,
                rgba(${color},0.26) 22%,
                rgba(${color},0.10) 42%,
                rgba(${color},0.04) 58%,
                transparent 74%
              ),
              linear-gradient(
                145deg,
                rgba(255,255,255,0.14),
                rgba(255,255,255,0.03)
              ),
              ${glass}
            `;
          ]]]

    icon:
      - justify-self: start
      - align-self: start
      - width: 32px
      - color: >
          [[[
            const color = variables.card_glow_color || "255,209,102";
            return entity?.state === "on"
              ? `rgba(${color},1)`
              : "var(--card-subtext-color)";
          ]]]
      - z-index: 4

    img_cell:
      - justify-self: start
      - align-self: start
      - width: 36px
      - height: 36px
      - border-radius: 50%
      - background: transparent
      - z-index: 4

    name:
      - justify-self: start
      - align-self: end
      - text-align: left
      - font-size: var(--card-glass-font-size-primary)
      - font-weight: var(--card-glass-font-weight-primary)
      - color: var(--card-text-color)
      - z-index: 4

    state:
      - justify-self: end
      - align-self: start
      - text-transform: uppercase
      - font-size: 10px
      - font-weight: 800
      - letter-spacing: 0.6px
      - color: var(--card-subtext-color)
      - z-index: 4

    custom_fields:
      glass_reflection:
        - position: absolute
        - inset: 0
        - z-index: 1
        - pointer-events: none

      soft_light:
        - position: absolute
        - inset: 0
        - z-index: 2
        - pointer-events: none

      desc:
        - justify-self: start
        - align-self: start
        - text-align: left
        - width: 100%
        - font-size: 13px
        - line-height: 17px
        - font-weight: 600
        - color: var(--card-subtext-color)
        - white-space: normal
        - overflow: hidden
        - z-index: 4

  state:
    - value: "on"
      state_display: "Aktiv"
    - value: "off"
      state_display: "Aus"
    - value: "unavailable"
      state_display: "Unknown"
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none
        name:
          - text-decoration: line-through
        icon:
          - color: rgba(255,255,255,0.35)

  tap_action:
    action: toggle

  hold_action:
    action: more-info

  extra_styles: |
    ha-card {
      border-radius: 22px !important;
      overflow: hidden !important;
      background-color: transparent !important;
      box-shadow: none !important;
    }

    ha-card:hover {
      transform: none !important;
      box-shadow: none !important;
    }

    ha-card:active {
      transform: scale(0.97);
    }

    .glass-reflection {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.28) 0%,
          rgba(255,255,255,0.08) 28%,
          transparent 58%
        );
    }

    .soft-light {
      position: absolute;
      inset: -35%;
      border-radius: 999px;
      background:
        radial-gradient(
          circle,
          rgba(var(--dynamic-color), 0.22) 0%,
          rgba(var(--dynamic-color), 0.10) 34%,
          transparent 65%
        );
      opacity: 0;
      pointer-events: none;
    }
