guten_morgen_card_apple:
  show_icon: false
  show_name: false
  show_state: false

  styles:
    card:
      - padding: 16px 0 0 0
      - max-width: 400px
      - border-radius: 24px
      - overflow: hidden
      - background: >
          [[[
            return `
              linear-gradient(
                145deg,
                rgba(255,255,255,0.12),
                rgba(255,255,255,0.03)
              ),
              var(--card-glass-bg)
            `;
          ]]]
      - backdrop-filter: blur(28px) saturate(160%)
      - -webkit-backdrop-filter: blur(28px) saturate(160%)
      - border: 1px solid var(--card-glass-border)
      - box-shadow: 0 10px 30px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.10)

    grid:
      - grid-template-areas: |
          "top trig"
          "next next"
          "sep sep"
          "weather_label weather_label"
          "weather weather"
      - grid-template-columns: 1fr max-content
      - grid-template-rows: min-content min-content min-content min-content min-content
      - column-gap: 12px
      - row-gap: 0px

    custom_fields:
      top:
        - width: 100%
      trig:
        - justify-self: end
      next:
        - width: 100%
      sep:
        - width: 100%
      weather_label:
        - justify-self: start
      weather:
        - width: 100%

  custom_fields:
    top:
      card:
        type: custom:mod-card
        card:
          type: custom:mushroom-entity-card
          entity: input_boolean.guten_morgen_mode_aktiviert
          layout: horizontal
          primary_info: name
          secondary_info: state
          tap_action:
            action: toggle
          icon: fapro:sun
          icon_color: amber
          name: Guten Morgen Mode
        card_mod:
          style:
            .: |
              ha-card {
                background: transparent !important;
                box-shadow: none !important;
                border: 0 !important;
                border-radius: 0 !important;
                padding: 0;
                margin-left: 8px;
              }
            mushroom-entity-card$:
              .: |
                :host {
                  --ha-card-background: transparent;
                  --ha-card-border-width: 0;
                  --ha-card-border-color: transparent;
                  --ha-card-border-radius: 0px;
                  --ha-card-box-shadow: none;
                }

                ha-card {
                  background: transparent !important;
                  border: 0 !important;
                  border-radius: 0 !important;
                  box-shadow: none !important;
                }
            mushroom-state-item$: |
              .container {
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: flex-start !important;
              }

              .info {
                align-items: flex-start !important;
                text-align: left !important;
              }

              .primary {
                color: var(--card-text-color) !important;
                font-weight: var(--card-glass-font-weight-primary) !important;
                text-align: left !important;
              }

              .secondary {
                color: var(--card-subtext-color) !important;
                font-weight: var(--card-glass-font-weight-secondary) !important;
                text-align: left !important;
              }

    trig:
      card:
        type: conditional
        conditions:
          - condition: state
            entity: input_boolean.trigger_bewegung_im_flur_erkannt
            state: "on"
        card:
          type: custom:button-card
          icon: fapro:sleep-moon
          show_name: false
          show_state: false
          show_label: false
          styles:
            card:
              - background: rgba(255,255,255,0.08)
              - box-shadow: none
              - border: 1px solid var(--card-glass-border)
              - padding: 0
              - width: 48px
              - height: 48px
              - margin-right: 16px
              - border-radius: 16px
              - backdrop-filter: blur(12px)
            icon:
              - width: 20px
              - height: 20px
              - color: var(--card-subtext-color)

    next:
      card:
        type: conditional
        conditions:
          - condition: state
            entity: timer.timer_guten_morgen_mode_phase_2
            state: active
        card:
          type: custom:button-card
          tap_action:
            action: call-service
            service: timer.finish
            target:
              entity_id: timer.timer_guten_morgen_mode_phase_2
          icon: fapro:lightbulb-on
          layout: icon_name
          name: Nächste Phase aktivieren
          styles:
            card:
              - background: rgba(255,255,255,0.08)
              - box-shadow: none
              - border: 1px solid var(--card-glass-border)
              - border-radius: 16px
              - padding: 8px 0
              - margin: 16px 16px 0 16px
              - width: calc(400px - 32px)
            name:
              - color: var(--card-text-color)
              - font-weight: 700
            icon:
              - color: rgba(255,209,102,1)

    sep: >
      <div style="height:1px; background:rgba(255,255,255,0.16); margin:16px 16px 8px 16px;"></div>

    weather_label: >
      <div style="font-size:0.95rem; font-weight:700; line-height:1; margin-top:16px; margin-left:16px; transform:translateY(2px); color:var(--card-text-color);">
        Wetterübersicht Heute
      </div>

    weather:
      card:
        type: custom:hourly-weather
        entity: weather.forecast_home
        num_segments: 18
        label_spacing: 4
        name: null
        forecast_type: hourly
        icons: true
        card_mod:
          style: |
            ha-card {
              background: transparent !important;
              box-shadow: none !important;
              border: 0;
              margin: 0;
              padding-bottom: 8px;
              transition: transform 0s ease;
            }
