philips_air_purifier_card_apple:
  variables:
    enable_osc_btn: false
    child_lock: switch.wohnzimmer_kindersicherung_2
    show_graph: true
    graph_entity:
    card_glow_color: "120,180,255"
    graph_color: "120,180,255"
    card_glass_bg: "var(--card-glass-bg)"

  show_name: true
  show_icon: true
  show_label: true
  show_state: false
  icon: mdi:fan

  label: |
    [[[
      if (entity.state === "off") return "Aus";
      if (entity.state === "unavailable") return "Unavailable";

      const preset = entity.attributes.preset_mode;
      const mode = entity.attributes.mode;
      const percentage = entity.attributes.percentage;

      if (preset === "auto") return "Automatisch";
      if (preset === "turbo") return "Turbo";
      if (preset === "sleep") return "Schlafen";
      if (mode === "manual" && percentage !== undefined) return percentage + "%";

      return "Unbekannt";
    ]]]

  styles:
    card:
      - height: 110px
      - padding: 14px
      - border-radius: 22px
      - position: relative
      - overflow: hidden
      - transform-style: preserve-3d
      - backdrop-filter: blur(28px) saturate(160%)
      - -webkit-backdrop-filter: blur(28px) saturate(160%)
      - border: none
      - --ha-card-border-width: 0
      - transition: background 0.6s ease, box-shadow 0.6s ease, filter 0.6s ease
      - background: >
          [[[
            const active = entity.state === "on";
            const glass = variables.card_glass_bg || "var(--card-glass-bg)";
            const glow = variables.card_glow_color || "120,180,255";

            if (!active) {
              return `
                linear-gradient(
                  145deg,
                  rgba(255,255,255,0.10),
                  rgba(255,255,255,0.02)
                ),
                ${glass}
              `;
            }

            return `
              radial-gradient(
                circle at 8% 8%,
                rgba(${glow},0.55) 0%,
                rgba(${glow},0.26) 22%,
                rgba(${glow},0.10) 42%,
                rgba(${glow},0.04) 58%,
                transparent 74%
              ),
              linear-gradient(
                145deg,
                rgba(255,255,255,0.14),
                rgba(255,255,255,0.03)
              ),
              ${glass}
            `;
          ]]]

    grid:
      - grid-template-areas: |
          "n auto_icon turbo_icon sleep_icon i"
          "l auto_icon turbo_icon sleep_icon i"
          "slider slider slider slider slider"
          "graph graph graph graph graph"
      - grid-template-columns: 1fr min-content min-content min-content min-content
      - grid-template-rows: min-content min-content 1fr min-content
      - column-gap: 6px
      - row-gap: 5px

    name:
      - justify-self: start
      - align-self: end
      - text-align: left
      - font-size: var(--card-glass-font-size-primary)
      - font-weight: var(--card-glass-font-weight-primary)
      - color: var(--card-text-color)
      - z-index: 4

    label:
      - justify-self: start
      - align-self: start
      - text-align: left
      - font-size: var(--card-glass-font-size-secondary)
      - font-weight: var(--card-glass-font-weight-secondary)
      - color: var(--card-subtext-color)
      - z-index: 4

    icon:
      - width: 18px
      - color: >
          [[[
            const glow = variables.card_glow_color || "120,180,255";
            return entity.state === "on"
              ? `rgba(${glow},1)`
              : "var(--card-subtext-color)";
          ]]]
      - animation: >
          [[[
            return entity.state === "on" ? "spin 5s linear infinite" : "none";
          ]]]

    img_cell:
      - justify-self: end
      - align-self: start
      - width: 30px
      - height: 30px
      - border-radius: 50%
      - background: transparent
      - z-index: 4

    custom_fields:
      glass_reflection:
        - position: absolute
        - inset: 0
        - z-index: 1
        - pointer-events: none

      soft_light:
        - position: absolute
        - inset: 0
        - z-index: 2
        - pointer-events: none

      slider:
        - z-index: 4
        - align-self: end

      graph:
        - display: >
            [[[
              return variables.show_graph && variables.graph_entity ? "block" : "none";
            ]]]
        - position: absolute
        - left: 0
        - bottom: -1px
        - width: 100%
        - height: 46px
        - opacity: 0.55
        - z-index: 3
        - pointer-events: none

      auto_icon:
        - z-index: 5
      turbo_icon:
        - z-index: 5
      sleep_icon:
        - z-index: 5

  state:
    - value: "on"
      icon: mdi:fan

    - value: "off"
      icon: mdi:fan-off

    - value: unavailable
      icon: mdi:fan-alert
      label: Unavailable
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none
        name:
          - text-decoration: line-through
        icon:
          - color: rgba(255,255,255,0.35)

  custom_fields:
    glass_reflection: |
      [[[
        return `<div class="glass-reflection"></div>`;
      ]]]

    soft_light: |
      [[[
        const glow = variables.card_glow_color || "120,180,255";
        return `<div class="soft-light" style="--dynamic-color:${glow};"></div>`;
      ]]]

    slider:
      card:
        type: custom:my-slider-v2
        entity: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - height: 28px
            - box-shadow: none
            - padding: 0
            - background: var(--card-slider-bg, rgba(255,255,255,0.08))
            - border-radius: 10px
            - touch-action: pan-y

          progress:
            - height: 100%
            - border-radius: 10px
            - touch-action: pan-y
            - background: >
                [[[
                  const glow = variables.card_glow_color || "120,180,255";
                  return entity.state === "on"
                    ? `rgba(${glow},0.95)`
                    : "transparent";
                ]]]

          track:
            - border-radius: 10px
            - touch-action: pan-y
            - background: var(--card-slider-bg, rgba(255,255,255,0.08))

          thumb:
            - height: 30%
            - width: 3px
            - position: absolute
            - right: 7px
            - top: 10px
            - touch-action: pan-y
            - background: >
                [[[
                  return entity.state === "on"
                    ? "var(--card-text-color)"
                    : "transparent";
                ]]]

    auto_icon:
      card:
        type: custom:button-card
        icon: mdi:fan-auto
        tap_action:
          action: call-service
          service: fan.set_preset_mode
          service_data:
            preset_mode: auto
            entity_id: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - width: 28px
            - height: 28px
            - padding: 0
            - border-radius: 10px
            - box-shadow: none
            - border: none
            - --ha-card-border-width: 0
            - background: >
                [[[
                  return entity.attributes.preset_mode === "auto"
                    ? "rgba(255,255,255,0.18)"
                    : "rgba(255,255,255,0.06)";
                ]]]
          icon:
            - width: 16px
            - color: >
                [[[
                  const glow = variables.card_glow_color || "120,180,255";
                  return entity.attributes.preset_mode === "auto"
                    ? `rgba(${glow},1)`
                    : "var(--card-subtext-color)";
                ]]]

    turbo_icon:
      card:
        type: custom:button-card
        icon: pap:speed_3
        tap_action:
          action: call-service
          service: fan.set_preset_mode
          service_data:
            preset_mode: turbo
            entity_id: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - width: 28px
            - height: 28px
            - padding: 0
            - border-radius: 10px
            - box-shadow: none
            - border: none
            - --ha-card-border-width: 0
            - background: >
                [[[
                  return entity.attributes.preset_mode === "turbo"
                    ? "rgba(255,255,255,0.18)"
                    : "rgba(255,255,255,0.06)";
                ]]]
          icon:
            - width: 16px
            - color: >
                [[[
                  const glow = variables.card_glow_color || "120,180,255";
                  return entity.attributes.preset_mode === "turbo"
                    ? `rgba(${glow},1)`
                    : "var(--card-subtext-color)";
                ]]]

    sleep_icon:
      card:
        type: custom:button-card
        icon: mdi:weather-night
        tap_action:
          action: call-service
          service: fan.set_preset_mode
          service_data:
            preset_mode: sleep
            entity_id: "[[[ return entity.entity_id ]]]"
        styles:
          card:
            - width: 28px
            - height: 28px
            - padding: 0
            - border-radius: 10px
            - box-shadow: none
            - border: none
            - --ha-card-border-width: 0
            - background: >
                [[[
                  return entity.attributes.preset_mode === "sleep"
                    ? "rgba(255,255,255,0.18)"
                    : "rgba(255,255,255,0.06)";
                ]]]
          icon:
            - width: 16px
            - color: >
                [[[
                  const glow = variables.card_glow_color || "120,180,255";
                  return entity.attributes.preset_mode === "sleep"
                    ? `rgba(${glow},1)`
                    : "var(--card-subtext-color)";
                ]]]

    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.graph_entity ]]]"
        line_width: 2
        line_color: >
          [[[
            const color = variables.graph_color || variables.card_glow_color || "120,180,255";
            return `rgba(${color},0.95)`;
          ]]]
        height: 45
        show:
          icon: false
          name: false
          state: false
          legend: false
          labels: false
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              --ha-card-border-width: 0;
              border-radius: 0 !important;
            }

  tap_action:
    action: toggle

  hold_action:
    action: more-info

  extra_styles: |
    ha-card {
      border-radius: 22px !important;
      overflow: hidden;
      background-color: transparent !important;
      transition:
        background 0.6s ease,
        filter 0.6s ease,
        transform 0.22s cubic-bezier(.2,.8,.2,1);
      perspective: 900px;
    }

    ha-card:hover {
      transform: none !important;
      border-radius: 22px !important;
    }

    ha-card:active {
      transform: scale(0.97);
    }

    .glass-reflection {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background:
        linear-gradient(
          135deg,
          var(--card-glass-reflection-start, rgba(255,255,255,0.28)) 0%,
          var(--card-glass-reflection-mid, rgba(255,255,255,0.08)) 28%,
          transparent 58%
        );
    }

    .soft-light {
      position: absolute;
      inset: -35%;
      border-radius: 999px;
      background:
        radial-gradient(
          circle,
          rgba(var(--dynamic-color), var(--card-soft-light-opacity-strong, 0.22)) 0%,
          rgba(var(--dynamic-color), var(--card-soft-light-opacity-soft, 0.10)) 34%,
          transparent 65%
        );
      opacity: 0;
      transform: translate(-18%, -10%);
      pointer-events: none;
    }

    ha-card:hover .soft-light {
      opacity: 1;
      animation: softLightMove 4.5s ease-in-out infinite alternate;
    }

    @keyframes softLightMove {
      0% {
        transform: translate(-22%, -12%) scale(1);
      }

      100% {
        transform: translate(12%, 10%) scale(1.18);
      }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
