welcome_view_button_apple:
  show_state: false
  show_name: false
  show_label: false

  styles:
    card:
      - width: 72px
      - height: 72px
      - margin-right: 12px
      - margin-top: 0px
      - border-radius: 22px
      - border: 1px solid var(--card-glass-border)
      - background: >
          [[[
            return `
              linear-gradient(
                145deg,
                rgba(255,255,255,0.12),
                rgba(255,255,255,0.03)
              ),
              var(--card-glass-bg)
            `;
          ]]]
      - backdrop-filter: blur(28px) saturate(160%)
      - -webkit-backdrop-filter: blur(28px) saturate(160%)
      - box-shadow: 0 3px 10px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.08)
      - overflow: hidden
      - transition: transform 0.22s cubic-bezier(.2,.8,.2,1), box-shadow 0.22s ease

    grid:
      - grid-template-areas: |
          "i"
      - grid-template-columns: 1fr
      - grid-template-rows: 1fr

    icon:
      - width: 30px
      - height: 30px
      - color: var(--card-text-color)
      - padding: 0
      - margin: 0

    img_cell:
      - justify-self: center
      - align-self: center
      - width: 48px
      - height: 48px
      - border-radius: 16px
      - background: rgba(255,255,255,0.08)

  tap_action:
    action: more-info

  extra_styles: |
    ha-card {
      border-radius: 22px !important;
      overflow: hidden;
      background: transparent !important;
    }

    ha-card:active {
      transform: scale(0.94);
    }
