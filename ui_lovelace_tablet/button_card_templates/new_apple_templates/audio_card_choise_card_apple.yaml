audio_card_choise_card_apple:
  show_icon: true
  show_name: true
  show_state: false
  show_label: false
  icon: fapro:speaker-minimalistic

  variables:
    player_room:
    card_color: "120,180,255"

  styles:
    card:
      - padding: 14px 0 12px 0
      - border-radius: 22px
      - overflow: hidden
      - backdrop-filter: blur(22px)
      - -webkit-backdrop-filter: blur(22px)
      - border: 1px solid var(--card-glass-border)
      - transition: all 0.35s ease
      - background: >
          [[[
            const active = states["input_select.media_player_auswahl_helfer"].state === variables.player_room;
            const color = variables.card_color || "120,180,255";

            if (active) {
              return `
                radial-gradient(
                  circle at 85% 20%,
                  rgba(${color},0.45),
                  rgba(${color},0.18) 35%,
                  transparent 70%
                ),
                linear-gradient(
                  145deg,
                  rgba(255,255,255,0.12),
                  rgba(255,255,255,0.03)
                ),
                var(--card-glass-bg)
              `;
            }

            return "var(--card-glass-bg)";
          ]]]

      - box-shadow: >
          [[[
            const active = states["input_select.media_player_auswahl_helfer"].state === variables.player_room;
            const color = variables.card_color || "120,180,255";

            return active
              ? `0 6px 20px rgba(${color},0.35), 0 0 18px rgba(${color},0.25)`
              : "0 3px 10px rgba(0,0,0,0.12)";
          ]]]

    grid:
      - grid-template-areas: |
          "i n "
          ". playing_label"
      #          "slider slider slider"
      - grid-template-columns: 72px 1fr 42px
      - grid-template-rows: min-content min-content min-content

    icon:
      - width: 28px
      - height: 28px
      - padding: 8px
      - margin-left: 10px
      - border-radius: 999px
      - transition: all 0.3s ease
      - background: >
          [[[
            const playing = entity.state === "playing";
            const active = states["input_select.media_player_auswahl_helfer"].state === variables.player_room;

            if (playing && active) return "rgba(255,255,255,0.85)";
            if (playing) return "rgba(255,255,255,0.15)";
            return "transparent";
          ]]]
      - color: >
          [[[
            const playing = entity.state === "playing";
            const active = states["input_select.media_player_auswahl_helfer"].state === variables.player_room;
            const color = variables.card_color || "120,180,255";

            if (playing) return `rgba(${color},1)`;
            if (active) return "white";
            return "var(--card-subtext-color)";
          ]]]

    name:
      - font-size: 14px
      - font-weight: 700
      - justify-self: start
      - align-self: end
      - color: >
          [[[
            const active = states["input_select.media_player_auswahl_helfer"].state === variables.player_room;
            return active ? "white" : "var(--card-text-color)";
          ]]]

    custom_fields:
      playing_label:
        - justify-self: start
        - font-size: 13px
        - font-weight: 600
        - margin-top: "-4px"
        - color: >
            [[[
              const active = states["input_select.media_player_auswahl_helfer"].state === variables.player_room;
              return active ? "rgba(255,255,255,0.6)" : "var(--card-subtext-color)";
            ]]]

      #airplay:
      #  - justify-self: center
      #  - align-self: center
      #  - z-index: 3

      #slider:
      #  - padding: 8px 12px 0 12px
      #  - display: >
      #      [[[
      #        const active = states["input_select.media_player_auswahl_helfer"].state === variables.player_room;
      #        return active ? "block" : "none";
      #      ]]]

      active_indicator:
        - position: absolute
        - bottom: "-5px"
        - left: 50%
        - transform: translateX(-50%)
        - display: >
            [[[
              return states["input_select.media_player_auswahl_helfer"].state === variables.player_room
                ? "block"
                : "none";
            ]]]

  custom_fields:
    playing_label: |
      [[[
        const state = entity.state;

        if (state === "playing") {
          return `
            <span>Spielt ab</span>
            <span class="wave">
              <i></i><i></i><i></i>
            </span>
          `;
        }

        if (state === "paused") return "Pausiert";
        if (state === "idle") return "Bereit";

        return "Offline";
      ]]]

    #airplay:
    #  card:
    #    type: custom:button-card
    #    icon: mdi:airplay
    #    show_name: false
    #    tap_action:
    #      action: more-info
    #    styles:
    #      card:
    #        - width: 34px
    #        - height: 34px
    #        - padding: 0
    #        - border-radius: 14px
    #        - background: rgba(255,255,255,0.08)
    #        - box-shadow: none
    #      icon:
    #        - width: 18px
    #        - color: var(--card-subtext-color)

    #slider:
    #  card:
    #    type: custom:my-slider-v2
    #    entity: "[[[ return entity.entity_id ]]]"
    #    mode: volume
    #    styles:
    #      card:
    #        - height: 28px
    #        - padding: 0
    #        - box-shadow: none
    #        - border-radius: 10px
    #        - background: rgba(255,255,255,0.08)
    #      progress:
    #        - height: 100%
    #        - border-radius: 10px
    #        - background: >
    #            [[[
    #              const color = variables.card_color || "120,180,255";
    #              return `rgba(${color},0.95)`;
    #            ]]]
    #      track:
    #        - border-radius: 10px
    #        - background: rgba(255,255,255,0.08)
    #      thumb:
    #        - height: 30%
    #        - width: 3px
    #        - position: absolute
    #        - right: 7px
    #        - top: 10px
    #        - background: var(--card-text-color)

    active_indicator: |
      [[[
        return `<div class="ios-indicator"></div>`;
      ]]]

  tap_action:
    action: call-service
    service: input_select.select_option
    service_data:
      entity_id: input_select.media_player_auswahl_helfer
      option: "[[[ return variables.player_room ]]]"

  hold_action:
    action: more-info

  extra_styles: |
    ha-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    ha-card:active {
      transform: scale(0.96);
    }

    .ios-indicator {
      width: 18px;
      height: 4px;
      border-radius: 999px;
      background: white;
      opacity: 0.9;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    .wave {
      display: inline-flex;
      gap: 2px;
      margin-left: 7px;
      align-items: end;
      height: 10px;
    }

    .wave i {
      display: block;
      width: 3px;
      border-radius: 999px;
      background: currentColor;
      animation: audioWave 0.9s ease-in-out infinite;
    }

    .wave i:nth-child(1) {
      height: 4px;
      animation-delay: 0s;
    }

    .wave i:nth-child(2) {
      height: 9px;
      animation-delay: 0.15s;
    }

    .wave i:nth-child(3) {
      height: 6px;
      animation-delay: 0.3s;
    }

    @keyframes audioWave {
      0%, 100% {
        transform: scaleY(0.55);
        opacity: 0.55;
      }
      50% {
        transform: scaleY(1.15);
        opacity: 1;
      }
    }

