mediaplayer_tv_card_apple:
  show_label: true
  show_state: true
  icon: mdi:play

  variables:
    card_glow_color: "120,180,255"
    card_glass_bg: "var(--card-glass-bg)"

  tap_action:
    action: call-service
    service: media_player.media_play_pause
    target:
      entity_id: "[[[ return entity.entity_id ]]]"

  hold_action:
    action: more-info

  label: |
    [[[
      const appId = entity.attributes.app_id;
      const appName = entity.attributes.app_name;

      const apps = {
        'de.telekom.magentatv': 'Magenta TV',
        'com.google.ios.youtube': 'YouTube',
        'com.netflix.Netflix': 'Netflix',
        'com.apple.TVMusic': 'Musik',
        'com.apple.TVWatchList': 'Apple TV',
        'com.disney.disneyplus': 'Disney+',
        'com.amazon.aiv.AIVApp': 'Prime Video'
      };

      if (entity.state === 'off') return 'Aus';
      if (entity.state === 'unavailable') return 'Unknown';
      if (appName === 'RTL+') return 'RTL+';
      return apps[appId] || appName || 'Unbekannt';
    ]]]

  name: |
    [[[
      let title = entity.attributes.media_title || '';
      if (!title || entity.state === 'off') return 'Nichts aktiv';
      if (title.length > 42) title = title.slice(0, 42) + '…';
      return `<marquee behavior="alternate" scrollamount="2">${title}</marquee>`;
    ]]]

  state_display: |
    [[[
      if (entity.state === 'off') return 'Es wird nichts abgespielt...';
      if (entity.state === 'unavailable') return 'Nicht verfügbar';

      let artist =
        entity.attributes.media_artist ||
        entity.attributes.media_album_name ||
        entity.attributes.media_series_title ||
        '';

      if (!artist) return entity.state === 'playing' ? 'Wiedergabe läuft' : 'Bereit';

      if (artist.length > 40) artist = artist.slice(0, 40) + '…';
      return `<marquee behavior="alternate" scrollamount="2">${artist}</marquee>`;
    ]]]

  state:
    - value: playing
      icon: mdi:pause
    - value: paused
      icon: mdi:play
    - value: idle
      icon: mdi:play
    - value: off
      icon: mdi:television-off
    - value: unavailable
      icon: mdi:television-off
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none

  custom_fields:
    glass_reflection: |
      [[[
        return `<div class="glass-reflection"></div>`;
      ]]]

    soft_light: |
      [[[
        const glow = variables.card_glow_color || "120,180,255";
        return `<div class="soft-light" style="--dynamic-color:${glow};"></div>`;
      ]]]

    background_cover: ""

    app_icon: |
      [[[
        const appId = entity.attributes.app_id;
        const appName = entity.attributes.app_name;

        if (appId === 'com.google.ios.youtube') return '<ha-icon icon="fapro:youtube"></ha-icon>';
        if (appId === 'com.netflix.Netflix') return '<ha-icon icon="mdi:netflix"></ha-icon>';
        if (appId === 'com.apple.TVMusic') return '<ha-icon icon="mdi:music"></ha-icon>';
        if (appId === 'com.disney.disneyplus') return '<ha-icon icon="mdi:movie-open-star"></ha-icon>';
        if (appId === 'com.amazon.aiv.AIVApp') return '<ha-icon icon="mdi:video-vintage"></ha-icon>';
        if (appName === 'RTL+') return '<ha-icon icon="mdi:television-classic"></ha-icon>';
        return '<ha-icon icon="mdi:television-play"></ha-icon>';
      ]]]

  styles:
    card:
      - height: 110px
      - padding: 15px
      - border-radius: 22px
      - position: relative
      - overflow: hidden
      - transform-style: preserve-3d
      - border: none
      - --ha-card-border-width: 0
      - backdrop-filter: blur(28px) saturate(160%)
      - -webkit-backdrop-filter: blur(28px) saturate(160%)
      - transition: background 0.6s ease, box-shadow 0.6s ease, filter 0.6s ease
      - background: >
          [[[
            const active = !['off','unavailable'].includes(entity.state);
            const glass = variables.card_glass_bg || 'var(--card-glass-bg)';
            const glow = variables.card_glow_color || '120,180,255';

            if (!active) {
              return `
                linear-gradient(
                  145deg,
                  rgba(255,255,255,0.10),
                  rgba(255,255,255,0.02)
                ),
                ${glass}
              `;
            }

            return `
              radial-gradient(
                circle at 8% 8%,
                rgba(${glow},0.55) 0%,
                rgba(${glow},0.26) 22%,
                rgba(${glow},0.10) 42%,
                rgba(${glow},0.04) 58%,
                transparent 74%
              ),
              linear-gradient(
                145deg,
                rgba(255,255,255,0.14),
                rgba(255,255,255,0.03)
              ),
              ${glass}
            `;
          ]]]

    grid:
      - grid-template-areas: |
          "app_icon l i"
          "s s s"
          "n n n"
      - grid-template-columns: min-content 1fr min-content
      - grid-template-rows: min-content min-content min-content
      - column-gap: 10px
      - row-gap: 4px

    label:
      - justify-self: start
      - align-self: center
      - font-family: montserrat
      - font-size: var(--card-glass-font-size-secondary)
      - font-weight: var(--card-glass-font-weight-secondary)
      - color: var(--card-subtext-color)
      - z-index: 4

    state:
      - justify-self: start
      - font-family: montserrat
      - font-size: 18px
      - font-weight: 800
      - color: var(--card-text-color)
      - z-index: 4
      - max-width: 72%

    name:
      - justify-self: start
      - font-family: montserrat
      - font-size: 13px
      - font-weight: 700
      - color: var(--card-subtext-color)
      - z-index: 4
      - max-width: 72%

    icon:
      - width: 15px
      - height: 15px
      - color: >
          [[[
            const glow = variables.card_glow_color || '120,180,255';
            return entity.state === 'playing'
              ? `rgba(${glow},1)`
              : 'var(--card-subtext-color)';
          ]]]
      - z-index: 4

    img_cell:
      - justify-self: end
      - align-self: start
      - width: 28px
      - height: 28px
      - border-radius: 50%
      - background: transparent
      - z-index: 4

    custom_fields:
      glass_reflection:
        - position: absolute
        - inset: 0
        - z-index: 1
        - pointer-events: none

      soft_light:
        - position: absolute
        - inset: 0
        - z-index: 2
        - pointer-events: none

      app_icon:
        - width: 25px
        - height: 25px
        - align-self: center
        - justify-self: start
        - color: var(--card-text-color)
        - z-index: 4

      background_cover:
        - position: absolute
        - right: -8px
        - top: -8px
        - width: 54%
        - height: 120%
        - opacity: 0.42
        - border-bottom-left-radius: 80px
        - background: |
            [[[
              const appId = entity.attributes.app_id;

              if (states['binary_sensor.christmas_time']?.state === 'on' && appId === 'com.google.ios.youtube') {
                return 'center / cover no-repeat url("/local/images/music/youtube_christmas_media.gif")';
              }

              if (appId === 'com.google.ios.youtube') {
                return 'center / cover no-repeat url("/local/images/music/youtube_media.gif")';
              }

              if (!entity.attributes.entity_picture) {
                return 'center / cover no-repeat url("/local/images/music/idle-media.gif")';
              }

              return `center / cover no-repeat url("${entity.attributes.entity_picture}")`;
            ]]]
        - z-index: 3
        - pointer-events: none

  extra_styles: |
    ha-card {
      border-radius: 22px !important;
      overflow: hidden;
      background-color: transparent !important;
      transition:
        background 0.6s ease,
        filter 0.6s ease,
        transform 0.22s cubic-bezier(.2,.8,.2,1);
      perspective: 900px;
    }

    ha-card:hover {
      transform: none !important;
      border-radius: 22px !important;
    }

    ha-card:active {
      transform: scale(0.97);
    }

    .glass-reflection {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background:
        linear-gradient(
          135deg,
          var(--card-glass-reflection-start, rgba(255,255,255,0.28)) 0%,
          var(--card-glass-reflection-mid, rgba(255,255,255,0.08)) 28%,
          transparent 58%
        );
    }

    .soft-light {
      position: absolute;
      inset: -35%;
      border-radius: 999px;
      background:
        radial-gradient(
          circle,
          rgba(var(--dynamic-color), var(--card-soft-light-opacity-strong, 0.22)) 0%,
          rgba(var(--dynamic-color), var(--card-soft-light-opacity-soft, 0.10)) 34%,
          transparent 65%
        );
      opacity: 0;
      transform: translate(-18%, -10%);
      pointer-events: none;
    }

    ha-card:hover .soft-light {
      opacity: 1;
      animation: softLightMove 4.5s ease-in-out infinite alternate;
    }

    @keyframes softLightMove {
      0% {
        transform: translate(-22%, -12%) scale(1);
      }

      100% {
        transform: translate(12%, 10%) scale(1.18);
      }
    }

    marquee {
      max-width: 100%;
    }
