room_input_card_badge_apple:
  show_state: false
  show_icon: false

  variables:
    input_select: input_select.dashboard_auswahl
    option: home
    room_color: "255,209,102"
    card_glass_bg: "var(--card-glass-bg)"

  custom_fields:
    indicator: |
      [[[
        const input = variables.input_select;
        const selected = states[input]?.state === variables.option;
        if (!selected) return "";
        return `<div class="active-indicator"></div>`;
      ]]]

    glass_reflection: |
      [[[ return `<div class="glass-reflection"></div>`; ]]]

    soft_light: |
      [[[
        const entities = variables.entities || [];
        const light = entities.find(e =>
          e.startsWith("light.") &&
          states[e]?.state === "on" &&
          states[e]?.attributes?.rgb_color
        );

        let color = variables.room_color || "255,209,102";
        if (light) {
          color = states[light].attributes.rgb_color.join(",");
        }

        return `<div class="soft-light" style="--dynamic-color:${color};"></div>`;
      ]]]

    light_badge: |
      [[[
        const entities = variables.entities || [];
        const lights = entities.filter(e =>
          e.startsWith("light.") && states[e]?.state === "on"
        );
        if (lights.length === 0) return "";
        return `<div class="badge-dot light"></div>`;
      ]]]

    device_badge: |
      [[[
        const entities = variables.entities || [];
        const devices = entities.filter(e => {
          const s = states[e]?.state;
          return !e.startsWith("light.") &&
            ["on", "playing", "heating", "cooling"].includes(s);
        });
        if (devices.length === 0) return "";
        return `<div class="badge-dot device"></div>`;
      ]]]

  styles:
    grid:
      - grid-template-areas: |
          "n"
      - grid-template-columns: 1fr

    card:
      - padding: 14px
      - height: 60px
      - border-radius: 22px
      - position: relative
      - overflow: visible
      - transform-style: preserve-3d
      - backdrop-filter: blur(28px) saturate(160%)
      - -webkit-backdrop-filter: blur(28px) saturate(160%)
      - border: none
      - --ha-card-border-width: 0
      - transition: background 0.6s ease, box-shadow 0.6s ease, filter 0.6s ease
      - background: >
          [[[
            const entities = variables.entities || [];
            const light = entities.find(e =>
              e.startsWith("light.") &&
              states[e]?.state === "on" &&
              states[e]?.attributes?.rgb_color
            );

            let color = variables.room_color || "255,209,102";
            if (light) color = states[light].attributes.rgb_color.join(",");

            const glass = variables.card_glass_bg || "var(--card-glass-bg)";
            const input = variables.input_select;
            const selected = states[input]?.state === variables.option;

            const glow = `
              linear-gradient(
                0deg,
                rgba(${color},0.45) 0%,
                rgba(${color},0.20) 30%,
                rgba(${color},0.10) 55%,
                transparent 80%
              )
            `;

            return selected
              ? `
                ${glow},
                linear-gradient(
                  145deg,
                  rgba(255,255,255,0.14),
                  rgba(255,255,255,0.03)
                ),
                ${glass}
              `
              : `
                ${glow},
                ${glass}
              `;
          ]]]

      - box-shadow: >
          [[[
            const entities = variables.entities || [];
            const light = entities.find(e =>
              e.startsWith("light.") &&
              states[e]?.state === "on" &&
              states[e]?.attributes?.rgb_color
            );

            let color = variables.room_color || "255,209,102";
            if (light) color = states[light].attributes.rgb_color.join(",");

            const selected = states[variables.input_select]?.state === variables.option;

            return selected
              ? `
                0 0 0 1px rgba(${color},0.35),
                0 8px 8px rgba(${color},0.45),
                0 0 10px rgba(${color},0.28),
                inset 0 1px 0 rgba(255,255,255,0.14)
              `
              : `
                0 3px 8px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.06)
              `;
          ]]]

    name:
      - justify-self: center
      - align-self: center
      - text-align: center
      - color: var(--card-text-color)
      - font-size: var(--card-glass-font-size-primary)
      - font-weight: var(--card-glass-font-weight-primary)
      - text-shadow: 0 1px 8px rgba(0,0,0,0.25)
      - z-index: 4

    custom_fields:
      indicator:
        - position: absolute
        - left: 40%
        - bottom: -6px
        - transform: translateX(-50%)
        - z-index: 30

      glass_reflection:
        - position: absolute
        - inset: 0
        - z-index: 1

      soft_light:
        - position: absolute
        - inset: 0
        - z-index: 2

      light_badge:
        - position: absolute
        - top: 8px
        - right: >
            [[[
              const entities = variables.entities || [];
              const devicesOn = entities.some(e => {
                const s = states[e]?.state;
                return !e.startsWith("light.") &&
                  ["on", "playing", "heating", "cooling"].includes(s);
              });

              return devicesOn ? "20px" : "12px";
            ]]]
        - z-index: 20

      device_badge:
        - position: absolute
        - top: 8px
        - right: 12px
        - z-index: 20

  tap_action:
    action: call-service
    service: input_select.select_option
    service_data:
      entity_id: "[[[ return variables.input_select ]]]"
      option: "[[[ return variables.option ]]]"

  extra_styles: |
    ha-card {
      border-radius: 22px !important;
      overflow: visible !important;
      background-color: transparent !important;
      transition:
        background 0.6s ease,
        filter 0.6s ease,
        transform 0.22s cubic-bezier(.2,.8,.2,1);
      perspective: 900px;
    }

    .button-card-main {
      border-radius: 22px !important;
      overflow: hidden !important;
    }

    ha-card:active {
      transform: scale(0.97);
    }

    .active-indicator {
      width: 18px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 10px rgba(255,255,255,0.55);
    }

    .glass-reflection {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.28) 0%,
          rgba(255,255,255,0.08) 28%,
          transparent 58%
        );
    }

    .soft-light {
      position: absolute;
      inset: -35%;
      border-radius: 999px;
      background:
        radial-gradient(
          circle,
          rgba(var(--dynamic-color),0.22) 0%,
          rgba(var(--dynamic-color),0.10) 34%,
          transparent 65%
        );
      opacity: 0;
      transform: translate(-18%, -10%);
    }

    ha-card:hover .soft-light {
      opacity: 1;
      animation: softLightMove 4.5s ease-in-out infinite alternate;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.35);
    }

    .badge-dot.light {
      background: rgba(255,209,102,0.95);
      box-shadow: 0 0 10px rgba(255,209,102,0.65);
    }

    .badge-dot.device {
      background: rgba(120,180,255,0.95);
      box-shadow: 0 0 10px rgba(120,180,255,0.55);
    }

    @keyframes softLightMove {
      0% {
        transform: translate(-22%, -12%) scale(1);
      }
      100% {
        transform: translate(12%, 10%) scale(1.18);
      }
    }
