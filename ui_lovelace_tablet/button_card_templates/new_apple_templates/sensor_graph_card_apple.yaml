# type: custom:button-card
# template: sensor_graph_card_apple
# entity: sensor.multisensor_wohnzimmer_temperatur
# name: Temperatur
# icon: mdi:thermometer
# variables:
#   label_icon: celsius
#   card_glow_color: "120,180,255"
#   graph_color: "120,180,255"

sensor_graph_card_apple:
  variables:
    show_graph: true
    graph_entity: "[[[ return entity.entity_id ]]]"
    graph_color: "120,180,255"
    card_glow_color: "120,180,255"
    card_glass_bg: "var(--card-glass-bg)"
    label_icon:

  show_label: true
  show_state: false
  show_icon: true

  label: |
    [[[
      const value = states[entity.entity_id]?.state ?? "-";
      if (value === "unknown" || value === "unavailable") return "-";

      if (variables.label_icon === "percent") {
        return value + '<sup style="font-size: 18px;"> %</sup>';
      }
      if (variables.label_icon === "celsius") {
        return value + '<sup style="font-size: 18px;"> °</sup>';
      }
      if (variables.label_icon === "lux") {
        return value + '<sup style="font-size: 16px;"> lx</sup>';
      }
      return value;
    ]]]

  styles:
    grid:
      - grid-template-areas: |
          "l i"
          "n n"
          "graph graph"
      - grid-template-columns: 1fr min-content
      - grid-template-rows: 1fr min-content min-content

    card:
      - height: 110px
      - padding: 16px
      - border-radius: 22px
      - position: relative
      - overflow: hidden
      - transform-style: preserve-3d
      - backdrop-filter: blur(28px) saturate(160%)
      - -webkit-backdrop-filter: blur(28px) saturate(160%)
      - border: none
      - --ha-card-border-width: 0
      - transition: background 0.6s ease, box-shadow 0.6s ease, filter 0.6s ease
      - background: >
          [[[
            const glow = variables.card_glow_color || variables.graph_color || "120,180,255";
            const glass = variables.card_glass_bg || "var(--card-glass-bg)";

            return `
              radial-gradient(
                circle at 8% 8%,
                rgba(${glow},0.55) 0%,
                rgba(${glow},0.26) 22%,
                rgba(${glow},0.10) 42%,
                rgba(${glow},0.04) 58%,
                transparent 74%
              ),
              linear-gradient(
                145deg,
                rgba(255,255,255,0.14),
                rgba(255,255,255,0.03)
              ),
              ${glass}
            `;
          ]]]

    name:
      - justify-self: start
      - align-self: end
      - font-size: var(--card-glass-font-size-primary)
      - font-weight: var(--card-glass-font-weight-primary)
      - color: var(--card-text-color)
      - z-index: 3
      - pointer-events: none

    label:
      - justify-self: start
      - align-self: start
      - font-size: var(--card-glass-font-size-sensor)
      - font-weight: var(--card-glass-font-weight-secondary)
      - color: var(--card-text-color)
      - z-index: 3

    icon:
      - width: 22px
      - color: >
          [[[
            const glow = variables.card_glow_color || variables.graph_color || "120,180,255";
            return `rgba(${glow},1)`;
          ]]]
      - transition: color 0.6s ease
      - z-index: 3

    img_cell:
      - justify-self: end
      - align-self: start
      - width: 28px
      - height: 28px
      - border-radius: 50%
      - background: transparent
      - z-index: 3

    custom_fields:
      glass_reflection:
        - position: absolute
        - inset: 0
        - z-index: 1
        - pointer-events: none

      soft_light:
        - position: absolute
        - inset: 0
        - z-index: 2
        - pointer-events: none

      graph:
        - position: absolute
        - display: >
            [[[
              return variables.show_graph && variables.graph_entity ? "block" : "none";
            ]]]
        - width: 100%
        - left: 0
        - bottom: 0
        - opacity: 0.7
        - z-index: 2
        - pointer-events: none

  custom_fields:
    glass_reflection: |
      [[[
        return `<div class="glass-reflection"></div>`;
      ]]]

    soft_light: |
      [[[
        const glow = variables.card_glow_color || variables.graph_color || "120,180,255";
        return `<div class="soft-light" style="--dynamic-color:${glow};"></div>`;
      ]]]

    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.graph_entity ]]]"
        line_width: 2
        line_color: >
          [[[
            const color = variables.graph_color || variables.card_glow_color || "120,180,255";
            return `rgba(${color},0.95)`;
          ]]]
        height: 50
        show:
          icon: false
          name: false
          state: false
          legend: false
          labels: false
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              --ha-card-border-width: 0;
              border-radius: 0 !important;
            }

  extra_styles: |
    ha-card {
      border-radius: 22px !important;
      overflow: hidden;
      transition:
        background 0.6s ease,
        filter 0.6s ease,
        transform 0.22s cubic-bezier(.2,.8,.2,1);
      perspective: 900px;
      background-color: transparent !important;
    }

    ha-card:hover {
      transform: none !important;
      border-radius: 22px !important;
    }

    ha-card:active {
      transform: scale(0.97);
    }

    .glass-reflection {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background:
        linear-gradient(
          135deg,
          var(--card-glass-reflection-start, rgba(255,255,255,0.28)) 0%,
          var(--card-glass-reflection-mid, rgba(255,255,255,0.08)) 28%,
          transparent 58%
        );
    }

    .soft-light {
      position: absolute;
      inset: -35%;
      border-radius: 999px;
      background:
        radial-gradient(
          circle,
          rgba(var(--dynamic-color), var(--card-soft-light-opacity-strong, 0.22)) 0%,
          rgba(var(--dynamic-color), var(--card-soft-light-opacity-soft, 0.10)) 34%,
          transparent 65%
        );
      opacity: 0;
      transform: translate(-18%, -10%);
      pointer-events: none;
    }

    ha-card:hover .soft-light {
      opacity: 1;
      animation: softLightMove 4.5s ease-in-out infinite alternate;
    }

    @keyframes softLightMove {
      0% {
        transform: translate(-22%, -12%) scale(1);
      }

      100% {
        transform: translate(12%, 10%) scale(1.18);
      }
    }
