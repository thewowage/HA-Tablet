air_quality_modern_wge:
        show_name: false
        show_state: true
        variables:
          state_value:

        state_display:  "[[[ return variables.state_value ]]]"

        styles:
          grid:
            - grid-template-areas: '"i s"'
            - grid-template-columns: min-content min-content
            - column-gap: 8px
            - align-items: center
            - justify-content: center

          card:
            - width: 150px
            - max-width: 200px
            - height: 42px
            - padding: 0 14px
            - border-radius: 999px
            - background: rgba(120,180,255,0.18)

          icon:
            - width: 28px
            - color: rgba(120,180,255,1)

          state:
            - font-size: var(--card-font-size-secondary)
            - font-weight: 700
            - color: var(--primary-text-color)
            - overflow: hidden