waste_collection_modern_wge:
  show_name: false
  show_state: true
  show_icon: true

  icon: mdi:trash-can

  state_display: |
    [[[
      const trash = entity.state;
      return "Heute: " + trash;
    ]]]

  styles:
    grid:
      - grid-template-areas: '"i s"'
      - grid-template-columns: min-content min-content
      - column-gap: 8px
      - align-items: center
      - justify-content: center

    card:
      - width: 160px
      - max-width: 200px
      - height: 42px
      - padding: 0 14px
      - border-radius: var(--ha-card-border-radius) 
      - background: var(--ha-card-background)
      - border: none
      - overflow: hidden

    icon:
      - width: 20px
      - color: var(--secondary-text-color)

    img_cell:
      - width: 20px
      - height: 20px
      - display: flex
      - align-items: center
      - justify-content: center

    state:
      - font-size: var(--card-font-size-secondary)
      - font-weight: 700
      - color: var(--primary-text-color)
      - white-space: nowrap
      - text-overflow: ellipsis
      - overflow: hidden
