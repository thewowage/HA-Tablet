home_card_flora_status_wge:
  show_icon: false
  show_name: false

  variables:
    image: /local/images/plant/monstera_deliciosa_plant_bg.png
    plant_1: sensor.mangobaum
    plant_2: sensor.mangobaum
    plant_3: sensor.mangobaum

  styles:
    card:
      - height: 280px
      - padding: 18px
      - border-radius: 26px
      - position: relative
      - overflow: hidden
      - border: none
      - background: >
          [[[
            return `url('${variables.image}')`;
          ]]]
      - background-size: 80%
      - background-position: center right
      - background-repeat: no-repeat

    grid:
      - grid-template-areas: |
          "title status"
          "plants plants"
      - grid-template-columns: 1fr min-content
      - grid-template-rows: min-content 1fr
      - row-gap: 18px

    custom_fields:
      title:
        - justify-self: start
        - font-size: 22px
        - font-weight: 800
        - color: white
        - z-index: 3

      status:
        - justify-self: end
        - align-self: start
        - z-index: 4

      plants:
        - justify-self: start
        - align-self: start
        - z-index: 3

  custom_fields:
    title: Flora

    status: |
      [[[
        const plants = [
          "sensor.mangobaum",
          "sensor.mangobaum",
          "sensor.mangobaum"
        ];

        let html = `<div class="plant-status-wrap">`;

        plants.forEach((entityId) => {
          const p = states[entityId];
          const code = p?.attributes?.problem_code || "";

          const dry = code.includes("moisture");
          const warning = code && code !== "none" && code !== "nein" && !dry;

          let color = "rgba(88,214,141,1)";
          if (warning) color = "rgba(255,190,70,1)";
          if (dry) color = "rgba(255,95,87,1)";
          if (!p || p.state === "unknown" || p.state === "unavailable") {
            color = "rgba(160,160,160,1)";
          }

          html += `
            <div class="plant-dot" style="background:${color}; box-shadow:0 0 12px ${color};"></div>
          `;
        });

        html += `</div>`;
        return html;
      ]]]

    plants: |
      [[[
        const plants = [
          { name: "MANGO", entity: "sensor.mangobaum" },
          { name: "STRELITZIE", entity: "sensor.mangobaum" },
          { name: "MONSTERA", entity: "sensor.mangobaum" }
        ];

        let html = `<div class="plants-list">`;

        plants.forEach((plant) => {
          const p = states[plant.entity];
          if (!p) return;

          const moisture = p.attributes.feuchtigkeit ?? "-";
          const temp = p.attributes.temperatur ?? "-";
          const light = p.attributes.licht ?? "-";
          const conductivity = p.attributes.leitfaehigkeit ?? "-";
          const code = p.attributes.problem_code || "";

          const dry = code.includes("moisture");
          const warning = code && code !== "none" && code !== "nein" && !dry;

          html += `
            <div class="plant-row">
              <div class="plant-label">${plant.name}</div>
              <div class="plant-values">
                <div class="homekit-pill ${dry ? "dry" : ""}">
                  <ha-icon icon="mdi:water-percent"></ha-icon>
                  <span>${moisture}%</span>
                </div>
                <div class="homekit-pill">
                  <ha-icon icon="mdi:thermometer"></ha-icon>
                  <span>${temp}°</span>
                </div>
                <div class="homekit-pill ${warning ? "warn" : ""}">
                  <ha-icon icon="mdi:white-balance-sunny"></ha-icon>
                  <span>${light}</span>
                </div>
                <div class="homekit-pill">
                  <ha-icon icon="mdi:flash"></ha-icon>
                  <span>${conductivity}<small> µS</small></span>
                </div>
              </div>
            </div>
          `;
        });

        html += `</div>`;
        return html;
      ]]]

  tap_action:
    action: call-service
    service: script.dashboard_state_switch_card_durchwechseln

  extra_styles: |
    ha-card {
      border-radius: 26px !important;
      overflow: hidden;
      text-align: left !important;
      transition: transform 0.18s ease, box-shadow 0.25s ease;
    }

    ha-card:active {
      transform: scale(0.97);
    }

    .plant-status-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .plant-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: plantPulse 2s ease-in-out infinite;
    }

    .plants-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .plant-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .plant-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.62);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .plant-warning {
      width: 14px;
      height: 14px;
      color: rgb(255,95,87);
      animation: leafShake 1.2s ease-in-out infinite;
    }

    .plant-warning.amber {
      color: rgb(255,190,70);
    }

    .plant-values {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .homekit-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 58px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: white;
      font-size: 13px;
      font-weight: 800;
      overflow: hidden;
    }

    .homekit-pill ha-icon {
      width: 16px;
      height: 16px;
      color: rgba(88,214,141,1);
    }

    .homekit-pill small {
      font-size: 10px;
      opacity: 0.75;
    }

    .homekit-pill.dry {
      background: rgba(255,95,87,0.92);
      animation: dryPulse 1.8s ease-in-out infinite;
    }

    .homekit-pill.warn {
      background: rgba(255,190,70,0.86);
    }

    .homekit-pill.dry ha-icon,
    .homekit-pill.warn ha-icon {
      color: white;
    }

    @keyframes plantPulse {
      0%,100% {
        transform: scale(1);
        opacity: .82;
      }
      50% {
        transform: scale(1.18);
        opacity: 1;
      }
    }

    @keyframes dryPulse {
      0%, 100% { box-shadow: 0 0 0 rgba(255,95,87,0); }
      50% { box-shadow: 0 0 14px rgba(255,95,87,0.7); }
    }

    @keyframes leafShake {
      0%, 100% { transform: translateY(-2px) rotate(0deg); }
      25% { transform: translateY(-2px) rotate(-8deg); }
      75% { transform: translateY(-2px) rotate(8deg); }
    }