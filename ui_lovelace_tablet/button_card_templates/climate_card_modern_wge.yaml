climate_card_modern_wge:
  template:
    - responsive_card_base

  variables:
    show_graph: true
    graph_entity: sensor.multisensor_wohnzimmer_temperatur
    graph_color:
    current_temp_label: "Momentane Temperatur: "
    cold_temp: 18
    hot_temp: 25

  show_label: true
  show_state: true
  show_icon: false

  label: >
    [[[
      const t = entity.attributes.current_temperature ?? "-";
      return t + '<sup style="font-size:18px;">°</sup>';
    ]]]

  state_display: >
    [[[
      const hvac = entity.state;
      const current = Number(entity.attributes.current_temperature);
      const target = entity.attributes.temperature;

      if (entity.state === "unavailable") return "Unknown";
      if (entity.state === "off") return "Aus";
      if (current <= 16) return "❄️ Frostschutz";
      if (hvac === "heat") return "🔥 Heizt auf " + target + "°";
      if (hvac === "auto") return "Automatisch · Ziel " + target + "°";
      return "Ziel " + target + "°";
    ]]]

  styles:
    grid:
      - grid-template-areas: |
          "l buttons"
          "n buttons"
          "s buttons"
          "graph graph"
      - grid-template-columns: 1fr min-content
      - grid-template-rows: min-content min-content min-content min-content

    card:
      - background: >
          [[[
            const t = Number(entity.attributes.current_temperature || 20);
            const cold = variables.cold_temp || 18;
            const hot = variables.hot_temp || 25;
            const ratio = Math.min(1, Math.max(0, (t - cold) / (hot - cold)));

            const r = Math.round(80 + ratio * 175);
            const g = Math.round(170 - ratio * 70);
            const b = Math.round(255 - ratio * 180);

            return `
              linear-gradient(
                145deg,
                rgba(${r},${g},${b},0.28),
                rgba(${r},${g},${b},0.08)
              ),
              var(--ha-card-background)
            `;
          ]]]

      - box-shadow: >
          [[[
            const action = entity.attributes.hvac_action;
            const t = Number(entity.attributes.current_temperature || 20);
            const cold = variables.cold_temp || 18;
            const hot = variables.hot_temp || 25;
            const ratio = Math.min(1, Math.max(0, (t - cold) / (hot - cold)));

            const r = Math.round(80 + ratio * 175);
            const g = Math.round(170 - ratio * 70);
            const b = Math.round(255 - ratio * 180);

            return action === "heating"
              ? `0 6px 18px rgba(${r},${g},${b},0.28)`
              : "var(--card-shadow)";
          ]]]

    name:
      - justify-self: start
      - align-self: end
      - pointer-events: none
      - z-index: 2

    label:
      - justify-self: start
      - align-self: start
      - font-size: var(--card-font-size-sensor)
      - font-weight: 800
      - color: var(--primary-text-color)
      - z-index: 2

    state:
      - justify-self: start
      - font-size: 12px
      - font-weight: 700
      - color: >
          [[[
            if (entity.attributes.current_temperature <= 16) return "rgba(120,180,255,0.95)";
            if (entity.attributes.hvac_action === "heating") return "rgba(255,170,90,0.95)";
            return "var(--secondary-text-color)";
          ]]]
      - z-index: 2

    custom_fields:
      buttons:
        - z-index: 3

      graph:
        - position: absolute
        - display: >
            [[[
              return variables.show_graph && variables.graph_entity ? "block" : "none";
            ]]]
        - width: 100%
        - left: 0
        - bottom: 0
        - height: 42px
        - opacity: 0.55
        - z-index: 1
        - pointer-events: none

  custom_fields:
    buttons:
      card:
        type: custom:button-card
        entity: "[[[ return entity.entity_id ]]]"
        show_icon: false
        show_name: false
        show_state: false
        styles:
          grid:
            - grid-template-areas: "'up value down'"
            - grid-template-columns: 34px min-content 34px
            - align-items: center
            - justify-content: center
            - column-gap: 4px
          card:
            - width: 120px
            - height: 54px
            - padding: 4px
            - border-radius: 17px
            - background: rgba(0,0,0,0.08)
            - box-shadow: none
            - border: none
          custom_fields:
            value:
              - color: var(--primary-text-color)
              - font-size: 13px
              - font-weight: 800
              - align-self: center
              - justify-self: center

        custom_fields:
          up:
            card:
              type: custom:button-card
              entity: "[[[ return entity.entity_id ]]]"
              icon: mdi:chevron-up
              show_name: false
              show_state: false
              styles:
                card:
                  - width: 34px
                  - height: 34px
                  - padding: 0
                  - background: transparent
                  - box-shadow: none
                  - border: none
                icon:
                  - width: 28px
                  - color: var(--primary-text-color)
              tap_action:
                action: call-service
                service: climate.set_temperature
                data:
                  temperature: >
                    [[[ return entity.attributes.temperature + 0.5 ]]]
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"

          value: >
            [[[
              if (
                entity.state === "off" ||
                entity.state === "unavailable"
              ) {
                return "--";
              }

              return `${entity.attributes.temperature}°`;
            ]]]

          down:
            card:
              type: custom:button-card
              entity: "[[[ return entity.entity_id ]]]"
              icon: mdi:chevron-down
              show_name: false
              show_state: false
              styles:
                card:
                  - width: 34px
                  - height: 34px
                  - padding: 0
                  - background: transparent
                  - box-shadow: none
                  - border: none
                icon:
                  - width: 28px
                  - color: var(--primary-text-color)
              tap_action:
                action: call-service
                service: climate.set_temperature
                data:
                  temperature: >
                    [[[ return entity.attributes.temperature - 0.5 ]]]
                target:
                  entity_id: "[[[ return entity.entity_id ]]]"

    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.graph_entity ]]]"
        line_width: 2
        line_color: >
          [[[
            if (variables.graph_color) return variables.graph_color;

            const t = Number(entity.attributes.current_temperature || 20);
            const cold = variables.cold_temp || 18;
            const hot = variables.hot_temp || 25;
            const ratio = Math.min(1, Math.max(0, (t - cold) / (hot - cold)));

            const r = Math.round(80 + ratio * 175);
            const g = Math.round(170 - ratio * 70);
            const b = Math.round(255 - ratio * 180);

            return `rgba(${r},${g},${b},0.95)`;
          ]]]
        height: 42
        show:
          icon: false
          name: false
          state: false
          legend: false
          labels: false
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              --ha-card-border-width: 0;
              border-radius: 0 !important;
            }

  state:
    - value: unavailable
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none
        name:
          - text-decoration: line-through

  extra_styles: |
    [[[ 
      if (entity.attributes.hvac_action === "heating") {
        return `
          ha-card {
            animation: heatPulse 1.8s ease-in-out infinite;
          }

          @keyframes heatPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.08); }
          }
        `;
      }
      return "";
    ]]]
