button_template_modern_wge:
  template:
    - responsive_card_base

  variables:
    sensor_type:
    card_color: "120,180,255"

  show_label: true
  show_icon: true

  tap_action:
    action: more-info
    haptic: success

  hold_action:
    action: more-info

  icon: |
    [[[
      const type = variables.sensor_type;
      const s = entity.state;

      if (s === "unavailable") return "mdi:alert-box-outline";
      if (type === "window") return s === "on" ? "mdi:window-open" : "mdi:window-closed";
      if (type === "door") return s === "on" ? "mdi:door-open" : "mdi:door-closed";
      if (type === "motion") return s === "on" ? "mdi:motion-sensor" : "mdi:motion-sensor-off";
      if (type === "lock") return s === "locked" ? "mdi:lock-outline" : "mdi:lock-open-outline";

      return entity.attributes.icon || "mdi:circle";
    ]]]

  label: |
    [[[
      const type = variables.sensor_type;
      const s = entity.state;

      if (s === "unavailable") return "Unknown";
      if (type === "window") return s === "on" ? "offen" : "zu";
      if (type === "door") return s === "on" ? "offen" : "zu";
      if (type === "motion") return s === "on" ? "Bewegung" : "ruhig";
      if (type === "lock") return s === "locked" ? "verschlossen" : "aufgeschlossen";

      return s;
    ]]]

  styles:
    grid:
      - grid-template-areas: |
          ". i"
          "n n"
          "l l"
      - grid-template-columns: 1fr min-content
      - grid-template-rows: min-content min-content 1fr

    card:
      - background: >
          [[[
            const type = variables.sensor_type;
            const s = entity.state;
            const color = variables.card_color || "120,180,255";

            const active =
              (type === "window" && s === "on") ||
              (type === "door" && s === "on") ||
              (type === "motion" && s === "on") ||
              (type === "lock" && s === "locked");

            return active
              ? `
                linear-gradient(
                  145deg,
                  rgba(${color},0.32),
                  rgba(${color},0.10)
                ),
                var(--ha-card-background)
              `
              : "var(--ha-card-background)";
          ]]]
      - box-shadow: >
          [[[
            const type = variables.sensor_type;
            const s = entity.state;
            const color = variables.card_color || "120,180,255";

            const active =
              (type === "window" && s === "on") ||
              (type === "door" && s === "on") ||
              (type === "motion" && s === "on") ||
              (type === "lock" && s === "locked");

            return active
              ? `0 6px 18px rgba(${color},0.22)`
              : "var(--card-shadow)";
          ]]]

    name:
      - justify-self: start
      - align-self: end
      - text-align: left
      - z-index: 2

    label:
      - justify-self: start
      - align-self: center
      - text-align: left
      - z-index: 2

    icon:
      - color: >
          [[[
            const type = variables.sensor_type;
            const s = entity.state;
            const color = variables.card_color || "120,180,255";

            const active =
              (type === "window" && s === "on") ||
              (type === "door" && s === "on") ||
              (type === "motion" && s === "on") ||
              (type === "lock" && s === "locked");

            return active
              ? `rgba(${color},1)`
              : "var(--secondary-text-color)";
          ]]]
      - z-index: 2

    img_cell:
      - justify-self: end
      - align-self: start
      - background: >
          [[[
            const type = variables.sensor_type;
            const s = entity.state;

            const active =
              (type === "window" && s === "on") ||
              (type === "door" && s === "on") ||
              (type === "motion" && s === "on") ||
              (type === "lock" && s === "locked");

            return active
              ? "rgba(255,255,255,0.14)"
              : "rgba(0,0,0,0.08)";
          ]]]
      - z-index: 2

  state:
    - value: "unavailable"
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none
        name:
          - text-decoration: line-through
        icon:
          - color: var(--secondary-text-color)
