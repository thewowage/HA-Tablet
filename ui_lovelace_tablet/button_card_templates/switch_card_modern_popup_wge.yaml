switch_card_modern_group_wge:
  template:
    - responsive_card_base

  variables:
    power_entity:
    power_unit: W
    graph_color: "120,180,255"
    show_graph: false
    show_graph_line: true
    show_graph_fill: false
    card_color: "120,180,255"

  show_state: true

  styles:
    grid:
      - grid-template-areas: |
          ". i"
          "n n"
          "s s"
          "graph graph"
      - grid-template-columns: 1fr min-content
      - grid-template-rows: min-content min-content 1fr

    card:
      - background: >
          [[[
            const color = variables.card_color || "120,180,255";

            return entity.state === "on"
              ? `
                linear-gradient(
                  145deg,
                  rgba(${color},0.32),
                  rgba(${color},0.10)
                ),
                var(--ha-card-background)
              `
              : "var(--ha-card-background)";
          ]]]

    name:
      - justify-self: start
      - align-self: end
      - text-align: left
      - z-index: 2

    state:
      - justify-self: start
      - align-self: center
      - text-align: left
      - z-index: 2

    icon:
      - color: >
          [[[
            const color = variables.card_color || "120,180,255";
            return entity.state === "on"
              ? `rgba(${color},1)`
              : "var(--secondary-text-color)";
          ]]]

    img_cell:
      - justify-self: end
      - align-self: start
      - background: >
          [[[
            return entity.state === "on"
              ? "rgba(255,255,255,0.14)"
              : "rgba(0,0,0,0.08)";
          ]]]
      - z-index: 2

    custom_fields:
      graph:
        - display: >
            [[[
              return variables.show_graph && variables.power_entity
                ? "block"
                : "none";
            ]]]
        - position: absolute
        - left: 0
        - bottom: -1px
        - width: 100%
        - height: 52px
        - z-index: 1
        - pointer-events: none
        - opacity: 0.85

  state:
    - value: "on"
      state_display: |
        [[[
          if (variables.power_entity && states[variables.power_entity]) {
            return "An · " + states[variables.power_entity].state + variables.power_unit;
          }
          return "An";
        ]]]

    - value: "off"
      state_display: "Aus"

    - value: "unavailable"
      state_display: "Unknown"
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none
        name:
          - text-decoration: line-through
        icon:
          - color: var(--secondary-text-color)

  custom_fields:
    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.power_entity ]]]"
            show_fill: "[[[ return variables.show_graph_fill ]]]"
            show_line: "[[[ return variables.show_graph_line ]]]"
        animate: true
        show:
          name: false
          icon: false
          state: false
        line_width: 2
        line_color: |
          [[[
            const color = variables.graph_color || variables.card_color || "120,180,255";
            return `rgba(${color},0.95)`;
          ]]]
        hours_to_show: 24
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              --ha-card-border-width: 0;
              border-radius: 0 !important;
            }

  hold_action:
    action: toggle

  tap_action:
    action: fire-dom-event
    browser_mod:
      service: browser_mod.popup
      data:
        title: Beleuchtung
        content:
          type: grid
          columns: 1
          square: false
          cards:
            - type: "custom:button-card"
              entity: switch.steckdosenleiste_kinderzimmer_stecker1
              template: switch_card_modern_wge
              name: Tisch 1
              icon: fapro:plug

            - type: "custom:button-card"
              entity: switch.steckdosenleiste_kinderzimmer_stecker2
              template: switch_card_modern_wge
              name: Tisch 2
              icon: fapro:plug

            - type: "custom:button-card"
              entity: switch.steckdosenleiste_kinderzimmer_stecker3
              template: switch_card_modern_wge
              name: Tisch 3
              icon: fapro:plug
