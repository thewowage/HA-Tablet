responsive_card_base:
  styles:
    card:
      - height: var(--card-height)
      - padding: var(--card-padding)
      - border-radius: var(--card-radius)
      - position: relative
      - overflow: hidden
      - border: none
      - box-shadow: var(--card-shadow)
      - transition: var(--card-transition)

    grid:
      - row-gap: var(--card-row-gap)

    name:
      - font-size: var(--card-font-size-primary)
      - font-weight: var(--card-font-weight-primary)
      - color: var(--primary-text-color)

    label:
      - font-size: var(--card-font-size-secondary)
      - font-weight: var(--card-font-weight-secondary)
      - color: var(--secondary-text-color)

    state:
      - font-size: var(--card-font-size-secondary)
      - font-weight: var(--card-font-weight-secondary)
      - color: var(--secondary-text-color)

    icon:
      - width: var(--card-icon-size)

    img_cell:
      - width: var(--card-icon-cell-size)
      - height: var(--card-icon-cell-size)
      - border-radius: var(--card-icon-radius)

  extra_styles: |
    ha-card {
      --card-height: var(--card-height-medium);
      --card-padding: var(--card-padding-medium);
      --card-radius: 22px;

      --card-row-gap: 2px;

      --card-font-size-primary: 16px;
      --card-font-size-secondary: 13px;
      --card-font-size-sensor: 24px;

      --card-font-weight-primary: 700;
      --card-font-weight-secondary: 600;

      --card-icon-size: 22px;
      --card-icon-cell-size: 34px;
      --card-icon-radius: 14px;

      --card-slider-height: 30px;

      --card-shadow: 0 3px 10px rgba(0,0,0,0.16);
      --card-shadow-active: 0 6px 18px rgba(120,180,255,0.22);

      --card-transition:
        transform 0.18s ease,
        box-shadow 0.25s ease,
        background 0.35s ease;
    }

    ha-card:active {
      transform: scale(0.97);
    }

    @media (max-width: 900px) {
      ha-card {
        --card-height: var(--card-height-small, 88px);
        --card-padding: var(--card-padding-small, 12px 14px);

        --card-font-size-primary: 14px;
        --card-font-size-secondary: 12px;
        --card-font-size-sensor: 20px;

        --card-icon-size: 18px;
        --card-icon-cell-size: 30px;
        --card-slider-height: 26px;
      }
    }

    @media (min-width: 901px) and (max-width: 1399px) {
      ha-card {
        --card-height: var(--card-height-medium, 100px);
        --card-padding: var(--card-padding-medium, 14px 16px);

        --card-font-size-primary: 16px;
        --card-font-size-secondary: 13px;
        --card-font-size-sensor: 24px;

        --card-icon-size: 22px;
        --card-icon-cell-size: 34px;
        --card-slider-height: 30px;
      }
    }

    @media (min-width: 1400px) {
      ha-card {
        --card-height: var(--card-height-large, 116px);
        --card-padding: var(--card-padding-large, 18px);

        --card-font-size-primary: 18px;
        --card-font-size-secondary: 14px;
        --card-font-size-sensor: 28px;

        --card-icon-size: 24px;
        --card-icon-cell-size: 38px;
        --card-slider-height: 32px;
      }
    }
