light_card_modern_wge:
  template:
    - responsive_card_base

  icon: mdi:lightbulb-outline
  show_label: true

  variables:
    enable_slider: false

  label: |
    [[[
      const briRaw = entity?.attributes?.brightness;
      const bri = briRaw ? Math.round(briRaw / 2.55) : 0;

      if (entity.state === "on" && variables.enable_slider) return bri + "%";
      if (entity.state === "on") return "An";
      if (entity.state === "unavailable") return "Unknown";
      return "Aus";
    ]]]

  styles:
    grid:
      - grid-template-areas: |
          [[[
            if (variables.enable_slider && entity?.attributes?.brightness) {
              return '"n i" "l i" "slider slider"';
            }
            return '". i" "n n" "l l"';
          ]]]
      - grid-template-columns: 1fr min-content
      - grid-template-rows: min-content min-content 1fr

    card:
      - background: >
          [[[
            let r = 255, g = 209, b = 102;

            if (entity.attributes.rgb_color) {
              [r, g, b] = entity.attributes.rgb_color;
            } else if (entity.attributes.color_temp) {
              const kelvin = 1000000 / entity.attributes.color_temp;
              kelvin < 4000
                ? (r = 255, g = 170, b = 90)
                : (r = 180, g = 220, b = 255);
            }

            return entity.state === "on"
              ? `
                linear-gradient(
                  145deg,
                  rgba(${r},${g},${b},0.32),
                  rgba(${r},${g},${b},0.10)
                ),
                var(--ha-card-background)
              `
              : "var(--ha-card-background)";
          ]]]

    name:
      - justify-self: start
      - align-self: end
      - z-index: 2

    label:
      - justify-self: start
      - align-self: center
      - z-index: 2
      - padding-bottom: >
          [[[
            return variables.enable_slider && entity?.attributes?.brightness ? "10px" : "0";
          ]]]

    icon:
      - color: >
          [[[
            let r = 255, g = 209, b = 102;

            if (entity.attributes.rgb_color) {
              [r, g, b] = entity.attributes.rgb_color;
            } else if (entity.attributes.color_temp) {
              const kelvin = 1000000 / entity.attributes.color_temp;
              kelvin < 4000
                ? (r = 255, g = 170, b = 90)
                : (r = 180, g = 220, b = 255);
            }

            return entity.state === "on"
              ? `rgba(${r},${g},${b},1)`
              : "var(--secondary-text-color)";
          ]]]

    img_cell:
      - justify-self: end
      - align-self: start
      - background: >
          [[[
            return entity.state === "on"
              ? "rgba(255,255,255,0.14)"
              : "rgba(0,0,0,0.08)";
          ]]]

    custom_fields:
      slider:
        - display: >
            [[[
              return variables.enable_slider && entity?.attributes?.brightness
                ? "block"
                : "none";
            ]]]
        - align-self: end
        - z-index: 2

  custom_fields:
    slider:
      card:
        type: custom:my-slider-v2
        entity: "[[[ return entity.entity_id ]]]"
        mode: brightness
        styles:
          card:
            - height: 18px
            - padding: 0
            - background: rgba(0,0,0,0.12)
            - border-radius: 10px
            - touch-action: pan-y
            - box-shadow: >
                [[[
                  let r = 255, g = 209, b = 102;

                  if (entity.attributes.rgb_color) {
                    [r, g, b] = entity.attributes.rgb_color;
                  }

                  return entity.state === "on"
                    ? `
                      0 0 14px rgba(${r},${g},${b},0.30),
                      0 0 28px rgba(${r},${g},${b},0.12)
                    `
                    : "none";
                ]]]

          progress:
            - height: 100%
            - border-radius: 10px
            - touch-action: pan-y
            - background: >
                [[[
                  let r = 255, g = 209, b = 102;

                  if (entity.attributes.rgb_color) {
                    [r, g, b] = entity.attributes.rgb_color;
                  }

                  return entity.state === "on"
                    ? `linear-gradient(
                        135deg,
                        rgba(${r},${g},${b},1) 0%,
                        rgba(${r},${g},${b},0.82) 45%,
                        rgba(${r},${g},${b},0.55) 100%
                      )`
                    : "transparent";
                ]]]

          track:
            - background: rgba(0,0,0,0.12)
            - border-radius: 10px
            - touch-action: pan-y

          thumb:
            - height: 18px
            - width: 3px
            - position: absolute
            - right: 7px
            - top: 0
            - touch-action: pan-y
            - background: transparent

  state:
    - value: "on"
      icon: mdi:lightbulb-on

    - value: "off"
      icon: mdi:lightbulb-outline

    - value: "unavailable"
      icon: mdi:lightbulb-question
      label: Unknown
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none
        name:
          - text-decoration: line-through
        icon:
          - color: var(--secondary-text-color)

  tap_action:
    action: toggle

  #hold_action:
  #  action: more-info

hold_action:
  action: fire-dom-event
  browser_mod:
    service: browser_mod.popup
    data:
      title: Beleuchtung
      content:
        type: custom:button-card
        entity: "[[[ return entity.entity_id ]]]"
        show_icon: false
        show_name: false
        show_state: false

        custom_fields:
          percent: |
            [[[
              const b = entity.attributes.brightness
                ? Math.round(entity.attributes.brightness / 2.55)
                : 0;
              return `${b}%`;
            ]]]

          slider:
            card:
              type: custom:my-slider-v2
              entity: "[[[ return entity.entity_id ]]]"
              mode: brightness
              styles:
                card:
                  - height: 92px
                  - width: 250px
                  - box-shadow: none
                  - padding: 0
                  - background: rgba(255,255,255,0.10)
                  - border-radius: 18px
                  - transform: rotate(-90deg)
                  - transform-origin: center
                progress:
                  - height: 100%
                  - border-radius: 18px
                  - background: >
                      [[[
                        let r = 255, g = 209, b = 102;
                        if (entity.attributes.rgb_color) [r,g,b] = entity.attributes.rgb_color;

                        return entity.state === "on"
                          ? `linear-gradient(
                              90deg,
                              rgba(${r},${g},${b},0.70),
                              rgba(${r},${g},${b},1)
                            )`
                          : "transparent";
                      ]]]
                track:
                  - border-radius: 18px
                  - background: rgba(255,255,255,0.10)
                thumb:
                  - width: 28px
                  - height: 4px
                  - border-radius: 999px
                  - background: rgba(255,255,255,0.45)

          colors: |
            [[[
              const id = entity.entity_id;

              return `
                <div class="color-grid">
                  <div class="color-dot cold" onclick="hass.callService('light','turn_on',{entity_id:'${id}',rgb_color:[225,226,236]})"></div>
                  <div class="color-dot warm" onclick="hass.callService('light','turn_on',{entity_id:'${id}',rgb_color:[229,188,148]})"></div>
                  <div class="color-dot amber" onclick="hass.callService('light','turn_on',{entity_id:'${id}',rgb_color:[224,157,65]})"></div>
                  <div class="color-dot rainbow" onclick="hass.callService('light','turn_on',{entity_id:'${id}',rgb_color:[255,0,180]})"></div>
                </div>
              `;
            ]]]

        styles:
          card:
            - width: 278px
            - height: 430px
            - padding: 18px
            - border-radius: 0
            - background: transparent
            - box-shadow: none

          custom_fields:
            percent:
              - justify-self: center
              - font-size: 15px
              - font-weight: 600
              - color: var(--primary-text-color)
              - margin-bottom: 22px

            slider:
              - justify-self: center
              - height: 250px
              - width: 92px
              - display: flex
              - align-items: center
              - justify-content: center

            colors:
              - justify-self: center
              - margin-top: 12px

        extra_styles: |
          .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 52px);
            gap: 10px;
            justify-content: center;
          }

          .color-dot {
            width: 48px;
            height: 48px;
            border-radius: 999px;
            cursor: pointer;
          }

          .cold {
            background: rgb(225,226,236);
          }

          .warm {
            background: rgb(229,188,148);
          }

          .amber {
            background: rgb(224,157,65);
          }

          .rainbow {
            background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.75);
          }

      card_mod:
        style:
          ha-dialog$: |
            .mdc-dialog__surface {
              width: 278px !important;
              border-radius: 8px !important;
              background: rgba(24,30,31,0.94) !important;
              backdrop-filter: blur(28px) saturate(160%);
              -webkit-backdrop-filter: blur(28px) saturate(160%);
              overflow: hidden !important;
            }
          .: |
            ha-dialog {
              --mdc-dialog-min-width: 278px;
              --mdc-dialog-max-width: 278px;
            }