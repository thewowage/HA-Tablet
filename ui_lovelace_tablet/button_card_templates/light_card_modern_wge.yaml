light_card_modern_wge:
  template:
    - responsive_card_base

  icon: mdi:lightbulb-outline
  show_label: true

  variables:
    enable_slider: false

  label: |
    [[[
      const briRaw = entity?.attributes?.brightness;
      const bri = briRaw ? Math.round(briRaw / 2.55) : 0;

      if (entity.state === "on" && variables.enable_slider) return bri + "%";
      if (entity.state === "on") return "An";
      if (entity.state === "unavailable") return "Unknown";
      return "Aus";
    ]]]

  styles:
    grid:
      - grid-template-areas: |
          [[[
            if (variables.enable_slider && entity?.attributes?.brightness) {
              return '"n i" "l i" "slider slider"';
            }
            return '". i" "n n" "l l"';
          ]]]
      - grid-template-columns: 1fr min-content
      - grid-template-rows: min-content min-content 1fr

    card:
      - background: >
          [[[
            let r = 255, g = 209, b = 102;

            if (entity.attributes.rgb_color) {
              [r, g, b] = entity.attributes.rgb_color;
            } else if (entity.attributes.color_temp) {
              const kelvin = 1000000 / entity.attributes.color_temp;
              kelvin < 4000
                ? (r = 255, g = 170, b = 90)
                : (r = 180, g = 220, b = 255);
            }

            return entity.state === "on"
              ? `
                linear-gradient(
                  145deg,
                  rgba(${r},${g},${b},0.32),
                  rgba(${r},${g},${b},0.10)
                ),
                var(--ha-card-background)
              `
              : "var(--ha-card-background)";
          ]]]

    name:
      - justify-self: start
      - align-self: end
      - z-index: 2

    label:
      - justify-self: start
      - align-self: center
      - z-index: 2
      - padding-bottom: >
          [[[
            return variables.enable_slider && entity?.attributes?.brightness ? "10px" : "0";
          ]]]

    icon:
      - color: >
          [[[
            let r = 255, g = 209, b = 102;

            if (entity.attributes.rgb_color) {
              [r, g, b] = entity.attributes.rgb_color;
            } else if (entity.attributes.color_temp) {
              const kelvin = 1000000 / entity.attributes.color_temp;
              kelvin < 4000
                ? (r = 255, g = 170, b = 90)
                : (r = 180, g = 220, b = 255);
            }

            return entity.state === "on"
              ? `rgba(${r},${g},${b},1)`
              : "var(--secondary-text-color)";
          ]]]

    img_cell:
      - justify-self: end
      - align-self: start
      - background: >
          [[[
            return entity.state === "on"
              ? "rgba(255,255,255,0.14)"
              : "rgba(0,0,0,0.08)";
          ]]]

    custom_fields:
      slider:
        - display: >
            [[[
              return variables.enable_slider && entity?.attributes?.brightness
                ? "block"
                : "none";
            ]]]
        - align-self: end
        - z-index: 2

  custom_fields:
    slider:
      card:
        type: custom:my-slider-v2
        entity: "[[[ return entity.entity_id ]]]"
        mode: brightness
        styles:
          card:
            - height: 18px
            - padding: 0
            - background: rgba(0,0,0,0.12)
            - border-radius: 10px
            - touch-action: pan-y
            - box-shadow: >
                [[[
                  let r = 255, g = 209, b = 102;

                  if (entity.attributes.rgb_color) {
                    [r, g, b] = entity.attributes.rgb_color;
                  }

                  return entity.state === "on"
                    ? `
                      0 0 14px rgba(${r},${g},${b},0.30),
                      0 0 28px rgba(${r},${g},${b},0.12)
                    `
                    : "none";
                ]]]

          progress:
            - height: 100%
            - border-radius: 10px
            - touch-action: pan-y
            - background: >
                [[[
                  let r = 255, g = 209, b = 102;

                  if (entity.attributes.rgb_color) {
                    [r, g, b] = entity.attributes.rgb_color;
                  }

                  return entity.state === "on"
                    ? `linear-gradient(
                        135deg,
                        rgba(${r},${g},${b},1) 0%,
                        rgba(${r},${g},${b},0.82) 45%,
                        rgba(${r},${g},${b},0.55) 100%
                      )`
                    : "transparent";
                ]]]

          track:
            - background: rgba(0,0,0,0.12)
            - border-radius: 10px
            - touch-action: pan-y

          thumb:
            - height: 18px
            - width: 3px
            - position: absolute
            - right: 7px
            - top: 0
            - touch-action: pan-y
            - background: transparent

  state:
    - value: "on"
      icon: mdi:lightbulb-on

    - value: "off"
      icon: mdi:lightbulb-outline

    - value: "unavailable"
      icon: mdi:lightbulb-question
      label: Unknown
      styles:
        card:
          - opacity: 0.55
          - pointer-events: none
        name:
          - text-decoration: line-through
        icon:
          - color: var(--secondary-text-color)

  tap_action:
    action: toggle

  hold_action:
    action: fire-dom-event
    browser_mod:
      service: browser_mod.popup
      data:
        title: "[[[ return entity.attributes.friendly_name || entity.entity_id; ]]]"
        content:
          type: vertical-stack
          cards:
            - type: custom:mushroom-light-card
              entity: "[[[ return entity.entity_id ]]]"
              show_brightness_control: true
              show_color_temp_control: true
              show_color_control: true
              use_light_color: true
              collapsible_controls: false
              tap_action:
                action: toggle

            - type: custom:my-slider-v2
              entity: "[[[ return entity.entity_id ]]]"
              mode: brightness
              styles:
                card:
                  - height: 34px
                  - border-radius: 999px
                  - background: rgba(255,255,255,0.08)
                  - box-shadow: none
                progress:
                  - border-radius: 999px
                  - background: >
                      [[[
                        let r = 255, g = 209, b = 102;
                        if (entity.attributes.rgb_color) [r, g, b] = entity.attributes.rgb_color;

                        return entity.state === "on"
                          ? `linear-gradient(
                              90deg,
                              rgba(${r},${g},${b},0.75),
                              rgba(${r},${g},${b},1)
                            )`
                          : "transparent";
                      ]]]
                track:
                  - border-radius: 999px
                  - background: rgba(255,255,255,0.08)
                thumb:
                  - width: 4px
                  - height: 40%
                  - top: 10px
                  - background: var(--primary-text-color)

        card_mod:
          style:
            ha-dialog$: |
              .mdc-dialog__surface {
                border-radius: 28px !important;
                background:
                  linear-gradient(
                    145deg,
                    rgba(255,255,255,0.12),
                    rgba(255,255,255,0.03)
                  ),
                  var(--ha-card-background) !important;
                backdrop-filter: blur(28px) saturate(160%);
                -webkit-backdrop-filter: blur(28px) saturate(160%);
                box-shadow: 0 20px 60px rgba(0,0,0,0.35) !important;
              }
