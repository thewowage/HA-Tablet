sensor_graph_card_modern_wge:
  template:
    - responsive_card_base

  variables:
    show_graph: true
    graph_entity: "[[[ return entity.entity_id ]]]"
    graph_color: "120,180,255"
    card_color: "120,180,255"
    label_icon:

  show_label: true
  show_state: false
  show_icon: true

  label: |
    [[[
      const value = states[entity.entity_id]?.state ?? "-";
      if (value === "unknown" || value === "unavailable") return "-";

      if (variables.label_icon === "percent") return value + '<sup style="font-size: 18px;"> %</sup>';
      if (variables.label_icon === "celsius") return value + '<sup style="font-size: 18px;"> °</sup>';
      if (variables.label_icon === "lux") return value + '<sup style="font-size: 16px;"> lx</sup>';
      if (variables.label_icon === "on_off") {
        if (value === "on") return "AN";
        if (value === "off") return "AUS";
        return value;
      }

      return value;
    ]]]

  styles:
    grid:
      - grid-template-areas: >
          [[[
            return variables.label_icon === "on_off"
              ? `"l i"
                "n n"`
              : `"l i"
                "n n"
                "graph graph"`;
          ]]]
      - grid-template-columns: 1fr min-content
      - grid-template-rows: >
          [[[
            return variables.label_icon === "on_off"
              ? "1fr min-content"
              : "1fr min-content min-content";
          ]]]

    card:
      - background: >
          [[[
            const color = variables.card_color || variables.graph_color || "120,180,255";

            return `
              linear-gradient(
                145deg,
                rgba(${color},0.24),
                rgba(${color},0.08)
              ),
              var(--ha-card-background)
            `;
          ]]]

    name:
      - justify-self: start
      - align-self: end
      - z-index: 2
      - pointer-events: none

    label:
      - justify-self: start
      - align-self: start
      - font-size: var(--card-font-size-sensor)
      - color: var(--primary-text-color)
      - z-index: 2

    icon:
      - color: >
          [[[
            const color = variables.card_color || variables.graph_color || "120,180,255";
            return `rgba(${color},1)`;
          ]]]
      - z-index: 2

    img_cell:
      - justify-self: end
      - align-self: start
      - background: rgba(0,0,0,0.08)
      - z-index: 2

    custom_fields:
      graph:
        - position: absolute
        - display: >
            [[[
              return variables.show_graph && variables.graph_entity ? "block" : "none";
            ]]]
        - width: 100%
        - left: 0
        - bottom: 0
        - opacity: 0.75
        - z-index: 1
        - pointer-events: none

  custom_fields:
    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.graph_entity ]]]"
        line_width: 2
        line_color: >
          [[[
            const color = variables.graph_color || variables.card_color || "120,180,255";
            return `rgba(${color},0.95)`;
          ]]]
        height: 45
        show:
          icon: false
          name: false
          state: false
          legend: false
          labels: false
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              --ha-card-border-width: 0;
              border-radius: 0 !important;
            }
