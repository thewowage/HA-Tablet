---
custom-minimalist-desktop:
  # Journal
  state-icon-color: "rgb(var(--color-theme))"
  border-radius: "20px"
  ha-card-border-radius: "var(--border-radius)"
  error-color: "var(--google-red)"
  warning-color: "var(--google-yellow)"
  success-color: "var(--google-green)"
  info-color: "var(--google-blue)"
  divider-color: "rgba(var(--color-theme),.12)"
  accent-color: "var(--google-yellow)"
  ha-dialog-border-radius: "10px"
  # fix added border-lines in 2022.11
  ha-card-border-width: "0px"

  card-mod-theme: "custom-minimalist-desktop"
  card-mod-view-yaml: |
    "*:first-child$": |
      #columns .column > * {
        padding-left: 5px;
        padding-right: 5px;
        padding-bottom: 5px;
      }

  modes:
    light:
      # text
      primary-text-color: "#212121"
      # main interface colors
      primary-color: "#434343"
      google-red: "#F54436"
      google-green: "#01C852"
      google-yellow: "#FF9101"
      google-blue: "#3D5AFE"
      google-violet: "#661FFF"
      google-grey: "#BBBBBB"
      color-red: "245, 68, 54"
      color-green: "1, 200, 82"
      color-yellow: "255, 145, 1"
      color-blue: "61, 90, 254"
      color-purple: "102, 31, 255"
      color-grey: "187, 187, 187"
      color-pink: "233, 30, 99"
      color-theme: "51,51,51"
      color-background-yellow: "250, 250, 250"
      color-background-blue: "250, 250, 250"
      color-background-green: "250, 250, 250"
      color-background-red: "250, 250, 250"
      color-background-pink: "250, 250, 250"
      color-background-purple: "250, 250, 250"
      color-yellow-text: "var(--primary-text-color)"
      color-blue-text: "var(--primary-text-color)"
      color-green-text: "var(--primary-text-color)"
      color-red-text: "var(--primary-text-color)"
      color-pink-text: "var(--primary-text-color)"
      color-purple-text: "var(--primary-text-color)"
      opacity-bg: "1"
      # background and sidebar
      card-background-color: "#FAFAFA"
      primary-background-color: "#EFEFEF"
      secondary-background-color: "#EFEFEF"
      # header
      app-header-text-color: "var(--primary-text-color)"
      app-header-background-color: "var(--primary-background-color)"
      # paper-tabs-selection-bar-color: "var(--primary-text-color)"
      # slider
      slider-color: "rgb(var(--color-blue))"
      slider-bar-color: "rgba(var(--color-blue),0.38)"
      # cards
      box-shadow: "0px 2px 4px 0px rgba(0,0,0,0.16)"
      ha-card-box-shadow: "var(--box-shadow)"
      # sidebar
      sidebar-selected-text-color: "var(--google-red)"
      sidebar-selected-icon-color: "var(--google-red)"
      sidebar-text-color: "#80868b"
      # switch
      switch-checked-color: "var(--google-blue)"
      # media player
      mini-media-player-accent-color: "var(--google-blue)"

      # Background
      #background: rgba(105,104,98,0.9)

      ##################################################################################
      ## Background
      background: left top / contain no-repeat fixed url('/local/floorplan/background.png')

      # Custom Variable
      custom-ha-card-background: rgba(255, 255, 255, 0.7)
      custom-ha-card-background-revert: rgba(0,0,0,0.15)
      custom-ha-card-backdrop-filter: blur(30px) saturate(180%)
      custom-ha-card-box-shadow: 0px 0px 10px rgba(0,0,0,0.3)

      custom-map-card-control-background-on: rgb(255, 255, 250)
      custom-map-card-control-background-off: rgb(220, 220, 220)
      custom-map-card-control-text: rgb(105, 105, 107)

      custom-ha-card-text-color-primary: rgb(0,0,0) #rgb(20,20,20)
      custom-ha-card-text-color-secondary: rgba(0,122,255,0.9) #rgba(60,60,60,0.9)
      custom-ha-card-text-color-third: rgba(60,60,60,0.9) #grey
      custom-ha-card-icon-color: rgba(0,0,0,1)

      custom-topbar-background: rgba(190,190,190,0.3)
      custom-topbar-icon-color-primary: rgba(0,0,0,0.7)
      custom-topbar-icon-color-secondary: rgba(0,0,0,0.4)

      custom-switch-bg-color: rgba(60, 60, 60, 0.9)

      # new Custom Colors:
      state-cover-open-color: "#4CAF50" # Green
      state-cover-opening-color: "#4CAF50"
      state-cover-closed-color: "#2196F3" # Blue
      state-cover-closing-color: "#2196F3"

      state-automation-active-color: "#4CAF50" # Green
      state-automation-inactive-color: "#F44336" # Red

      state-lock-jammed-color: "#F44336" # Red
      state-lock-locked-color: "#4CAF50" # Green
      state-lock-pending-color: "#FF9800" # Orange
      state-lock-unlocked-color: "#F44336" # Red

      state-sensor-battery-high-color: "#4CAF50" # Green
      state-sensor-battery-low-color: "#F44336" # Red
      state-sensor-battery-medium-color: "#FF9800" # Orange
      state-sensor-battery-unknown-color: "#8A8A8A" # Off (Mid-Grey)

      state-switch-on-color: "#4CAF50" # Green
      state-switch-off-color: "#F44336" # Red

      state-climate-auto-color: "#4CAF50" # Green
      state-climate-cool-color: "#2196F3" # Blue
      state-climate-dry-color: "#FF9800" # Orange
      state-climate-fan-only-color: "#00BCD4" # Cyan
      state-climate-heat-color: "#FF5722" # Deep Orange
      state-climate-heat-cool-color: "#FFC107" # Amber
      state-climate-idle-color: "#8A8A8A" # Off (Mid-Grey)

      state-person-home-color: "#4CAF50" # Green
      state-person-not-home-color: "#9E9E9E" # Grey
      state-person-zone-color: "#2196F3" # Blue

      state-siren-on-color: "#F44336" # Red
      state-siren-off-color: "#4CAF50" # Green

      state-binary_sensor-window-off-color: "#4CAF50" # Green
      state-binary_sensor-window-on-color: "#F44336" # Red

      state-binary_sensor-door-off-color: "#4CAF50" # Green
      state-binary_sensor-door-on-color: "#F44336" # Red

      state-binary_sensor-lock-off-color: "#4CAF50" # Green
      state-binary_sensor-lock-on-color: "#F44336" # Red

    dark:
      # text
      primary-text-color: "#DDDDDD"
      # main interface colors
      primary-color: "#89B3F8"
      google-red: "#F18B82"
      google-green: "#80C994"
      google-yellow: "#FCD663"
      google-blue: "#89B3F8"
      google-violet: "#BB86FC"
      google-grey: "#BBBBBB"
      color-red: "241, 139, 130"
      color-green: "128, 201, 148"
      color-yellow: "252, 214, 99"
      color-blue: "137, 179, 248"
      color-theme: "221,221,221"
      color-purple: "102, 31, 255"
      color-grey: "187, 187, 187"
      color-pink: "233, 30, 99"
      color-background-yellow: "var(--color-yellow)"
      color-background-blue: "var(--color-blue)"
      color-background-green: "var(--color-green)"
      color-background-red: "var(--color-red)"
      color-background-pink: "var(--color-pink)"
      color-background-purple: "var(--color-purple)"
      color-yellow-text: "var(--color-yellow)"
      color-blue-text: "var(--color-blue)"
      color-green-text: "var(--color-green)"
      color-red-text: "var(--color-red)"
      color-pink-text: "var(--color-pink)"
      color-purple-text: "var(--color-purple)"
      opacity-bg: "0.1"
      # floating button text color
      mdc-theme-on-secondary: "var(--card-background-color)"
      # background and sidebar
      card-background-color: "#1D1D1D"
      primary-background-color: "#121212"
      secondary-background-color: "#121212"
      # header
      app-header-text-color: "var(--primary-text-color)"
      app-header-background-color: "var(--primary-background-color)"
      paper-tabs-selection-bar-color: "var(--primary-text-color)"
      # Sidebar
      sidebar-selected-text-color: "rgb(var(--color-blue))"
      sidebar-selected-icon-color: "rgb(var(--color-blue))"
      # Slider
      slider-color: "rgb(var(--color-blue))"
      slider-bar-color: "rgba(var(--color-blue),0.38)"
      # card
      box-shadow: "none"
      # media player
      mini-media-player-accent-color: "var(--google-blue)"
      # Journal
      state-icon-color: "rgb(var(--color-theme))"
