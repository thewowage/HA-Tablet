###############################################################################
#  GLASSMORPHISM THEME — Smart Home Dashboard
#
#  Installation:
#  1. Copy this file to /config/themes/glassmorphism.yaml
#  2. Add to configuration.yaml:
#        frontend:
#          themes: !include_dir_merge_named themes
#     OR if you use a single themes file:
#        frontend:
#          themes: !include themes.yaml
#     then paste the contents into themes.yaml
#  3. Restart Home Assistant
#  4. Select the theme: Profile → Theme → Glassmorphism
#
#  Optional background:
#  Place a dark photo at /config/www/backgrounds/living-room.jpg
#  and set the background in your dashboard YAML or via the
#  lovelace-wallpanel integration (HACS).
###############################################################################

glassmorphism:

  # ═══════════════════════════════════════════════════════════════════════════
  #  BASE COLORS
  # ═══════════════════════════════════════════════════════════════════════════
  primary-color: "rgb(100,180,255)"
  accent-color: "rgb(100,180,255)"
  light-primary-color: "rgba(100,180,255,0.3)"
  dark-primary-color: "rgb(60,130,220)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  TEXT
  # ═══════════════════════════════════════════════════════════════════════════
  primary-text-color: "rgba(255,255,255,0.95)"
  secondary-text-color: "rgba(255,255,255,0.50)"
  text-primary-color: "white"
  disabled-text-color: "rgba(255,255,255,0.25)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  BACKGROUNDS
  # ═══════════════════════════════════════════════════════════════════════════
  lovelace-background: "var(--glassmorphism-wallpaper, linear-gradient(135deg, rgb(15,15,25) 0%, rgb(25,30,45) 50%, rgb(15,20,30) 100%))"
  background-color: "rgb(15,15,25)"
  primary-background-color: "rgba(20,20,35,0.95)"
  secondary-background-color: "rgba(30,30,50,0.90)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  CARDS — the core glassmorphism effect
  # ═══════════════════════════════════════════════════════════════════════════
  ha-card-background: "rgba(255,255,255,0.06)"
  ha-card-border-radius: "24px"
  ha-card-border-color: "rgba(255,255,255,0.10)"
  ha-card-border-width: "1px"
  ha-card-box-shadow: "0 8px 32px rgba(0,0,0,0.25)"
  ha-card-header-color: "white"
  ha-card-header-font-size: "18px"

  # ═══════════════════════════════════════════════════════════════════════════
  #  HEADER / TOOLBAR
  # ═══════════════════════════════════════════════════════════════════════════
  app-header-background-color: "rgba(15,15,25,0.75)"
  app-header-text-color: "white"
  app-header-edit-background-color: "rgba(30,30,50,0.85)"
  app-header-edit-text-color: "white"

  # ═══════════════════════════════════════════════════════════════════════════
  #  SIDEBAR
  # ═══════════════════════════════════════════════════════════════════════════
  sidebar-background-color: "rgba(15,15,25,0.92)"
  sidebar-text-color: "rgba(255,255,255,0.75)"
  sidebar-icon-color: "rgba(255,255,255,0.45)"
  sidebar-selected-background-color: "rgba(100,180,255,0.12)"
  sidebar-selected-icon-color: "rgb(100,180,255)"
  sidebar-selected-text-color: "white"

  # ═══════════════════════════════════════════════════════════════════════════
  #  DIALOGS / POPUPS
  # ═══════════════════════════════════════════════════════════════════════════
  dialog-backdrop-filter: "blur(24px)"
  mdc-dialog-scrim-color: "rgba(0,0,0,0.5)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  TOGGLES / SWITCHES
  # ═══════════════════════════════════════════════════════════════════════════
  switch-checked-color: "rgb(100,180,255)"
  switch-checked-button-color: "white"
  switch-checked-track-color: "rgba(100,180,255,0.5)"
  switch-unchecked-color: "rgba(255,255,255,0.25)"
  switch-unchecked-button-color: "rgba(255,255,255,0.6)"
  switch-unchecked-track-color: "rgba(255,255,255,0.12)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  SLIDERS
  # ═══════════════════════════════════════════════════════════════════════════
  paper-slider-knob-color: "rgb(100,180,255)"
  paper-slider-active-color: "rgb(100,180,255)"
  paper-slider-container-color: "rgba(255,255,255,0.12)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  BUTTONS
  # ═══════════════════════════════════════════════════════════════════════════
  mdc-button-outline-color: "rgba(255,255,255,0.15)"
  mdc-theme-primary: "rgb(100,180,255)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  INPUT FIELDS
  # ═══════════════════════════════════════════════════════════════════════════
  input-fill-color: "rgba(255,255,255,0.06)"
  input-ink-color: "white"
  input-label-ink-color: "rgba(255,255,255,0.45)"
  input-idle-line-color: "rgba(255,255,255,0.12)"
  input-hover-line-color: "rgba(100,180,255,0.5)"
  input-disabled-fill-color: "rgba(255,255,255,0.03)"
  input-disabled-ink-color: "rgba(255,255,255,0.2)"
  input-dropdown-icon-color: "rgba(255,255,255,0.45)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  TABLES / DATA
  # ═══════════════════════════════════════════════════════════════════════════
  table-row-background-color: "rgba(255,255,255,0.03)"
  table-row-alternative-background-color: "rgba(255,255,255,0.06)"
  data-table-background-color: "transparent"
  markdown-code-background-color: "rgba(255,255,255,0.08)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  ENTITY STATES
  # ═══════════════════════════════════════════════════════════════════════════
  state-icon-active-color: "rgb(100,180,255)"
  state-icon-color: "rgba(255,255,255,0.40)"
  state-on-color: "rgb(100,180,255)"
  state-off-color: "rgba(255,255,255,0.30)"

  state-light-on-color: "rgb(255,210,100)"
  state-light-off-color: "rgba(255,255,255,0.30)"

  state-climate-heat-color: "rgb(255,140,60)"
  state-climate-cool-color: "rgb(100,180,255)"
  state-climate-auto-color: "rgb(100,200,130)"
  state-climate-idle-color: "rgba(255,255,255,0.30)"

  state-alarm-armed-color: "rgb(100,200,130)"
  state-alarm-disarmed-color: "rgba(255,255,255,0.30)"
  state-alarm-pending-color: "rgb(255,180,60)"
  state-alarm-triggered-color: "rgb(255,80,80)"

  state-lock-locked-color: "rgb(100,200,130)"
  state-lock-unlocked-color: "rgb(255,100,100)"

  state-binary_sensor-active-color: "rgb(255,180,60)"
  state-binary_sensor-inactive-color: "rgba(255,255,255,0.30)"

  state-sensor-battery-high-color: "rgb(100,200,130)"
  state-sensor-battery-low-color: "rgb(255,80,80)"

  state-media_player-active-color: "rgb(100,180,255)"
  state-media_player-inactive-color: "rgba(255,255,255,0.30)"

  state-vacuum-active-color: "rgb(100,180,255)"
  state-vacuum-inactive-color: "rgba(255,255,255,0.30)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  BADGES
  # ═══════════════════════════════════════════════════════════════════════════
  label-badge-background-color: "rgba(255,255,255,0.08)"
  label-badge-text-color: "white"
  label-badge-red: "rgb(255,80,80)"
  label-badge-green: "rgb(100,200,130)"
  label-badge-blue: "rgb(100,180,255)"
  label-badge-yellow: "rgb(255,200,60)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  DIVIDERS / BORDERS
  # ═══════════════════════════════════════════════════════════════════════════
  divider-color: "rgba(255,255,255,0.08)"
  scrollbar-thumb-color: "rgba(255,255,255,0.15)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  CHIPS / LABELS
  # ═══════════════════════════════════════════════════════════════════════════
  chip-background-color: "rgba(255,255,255,0.08)"
  chip-text-color: "rgba(255,255,255,0.75)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  ENERGY DASHBOARD COLORS
  # ═══════════════════════════════════════════════════════════════════════════
  energy-grid-consumption-color: "rgb(100,180,255)"
  energy-grid-return-color: "rgb(100,200,130)"
  energy-solar-color: "rgb(255,200,60)"
  energy-battery-in-color: "rgb(180,130,255)"
  energy-battery-out-color: "rgb(255,140,60)"
  energy-gas-color: "rgb(255,120,100)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  HISTORY / LOGBOOK
  # ═══════════════════════════════════════════════════════════════════════════
  trace-line-color: "rgb(100,180,255)"
  history-filling-color: "rgba(100,180,255,0.15)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  CODE EDITOR
  # ═══════════════════════════════════════════════════════════════════════════
  codemirror-keyword: "rgb(180,130,255)"
  codemirror-number: "rgb(100,200,130)"
  codemirror-string: "rgb(255,200,100)"
  codemirror-comment: "rgba(255,255,255,0.30)"
  codemirror-atom: "rgb(100,180,255)"
  codemirror-property: "rgb(255,140,100)"

  # ═══════════════════════════════════════════════════════════════════════════
  #  CARD-MOD: Glassmorphism backdrop-filter for ALL ha-cards
  #  Requires: card-mod (HACS)
  # ═══════════════════════════════════════════════════════════════════════════
  card-mod-theme: glassmorphism

  card-mod-card: |
    ha-card {
      backdrop-filter: blur(24px) saturate(140%) !important;
      -webkit-backdrop-filter: blur(24px) saturate(140%) !important;
      border: 1px solid rgba(255,255,255,0.10) !important;
      transition: transform 0.2s ease, box-shadow 0.2s ease !important;
    }
    ha-card:hover {
      box-shadow: 0 12px 40px rgba(0,0,0,0.35) !important;
    }

  card-mod-root: |
    ha-toolbar {
      background: rgba(15,15,25,0.75) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    }
    .header {
      background: rgba(15,15,25,0.75) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    }

  card-mod-more-info: |
    ha-dialog {
      --ha-dialog-border-radius: 24px;
    }
    .content {
      backdrop-filter: blur(30px) saturate(150%) !important;
      -webkit-backdrop-filter: blur(30px) saturate(150%) !important;
      background: rgba(25,25,40,0.92) !important;
      border-radius: 24px !important;
    }

  card-mod-row: |
    :host {
      border-bottom: 1px solid rgba(255,255,255,0.04) !important;
    }

  card-mod-view: |
    ha-panel-lovelace {
      --lovelace-background: var(--glassmorphism-wallpaper,
        linear-gradient(135deg,
          rgb(15,15,25) 0%,
          rgb(25,30,45) 50%,
          rgb(15,20,30) 100%
        )) !important;
    }
