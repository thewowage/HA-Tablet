# +----------------------------------------------------------------------------+
# | Description:                                                               |
# | This file define the theme variables that are independent of the selection |
# | of the mode ( light or dark)                                               |
# +----------------------------------------------------------------------------+
# | Author: Sebastien Logeais                                                  |
# +----------------------------------------------------------------------------+
# | Date: 16 Oct 2023                                                          |
# +----------------------------------------------------------------------------+
homeos:
  # +----------------------------------------------------------------------------+
  # | Layout variable                                                            |
  # +----------------------------------------------------------------------------+
  homeos-screen-height: 800px #FireHD height
  homeos-topbar-height: 3.5vw
  homeos-appsbar-width: 6vw
  homeos-card-grid-gap: 0.6vw
  homeos-card-grid-square: calc( (var(--homeos-screen-height) - var(--homeos-topbar-height) - (6 * (var(--homeos-card-grid-gap))))/5 )

  # +----------------------------------------------------------------------------+
  # | General card Custom variable                                               |
  # +----------------------------------------------------------------------------+
  homeos-card-border-radius: 2.5vw
  homeos-card-box-shadow: 0px 0px 0.5vw 0vw rgba(0,0,0,0.6)
  homeos-card-border-style: solid
  homeos-card-border-width: 1px

  # +----------------------------------------------------------------------------+
  # | Apple Fonts                                                                |
  # +----------------------------------------------------------------------------+
  #primary-font-family: SF Pro Text, Roboto, system-ui
  #paper-font-common-base_-_font-family: var(--primary-font-family)
  #paper-font-common-code_-_font-family: var(--primary-font-family)
  #paper-font-body1_-_font-family: var(--primary-font-family)
  #paper-font-subhead_-_font-family: var(--primary-font-family)
  #paper-font-headline_-_font-family: var(--primary-font-family)
  #paper-font-caption_-_font-family: var(--primary-font-family)
  #paper-font-title_-_font-family: var(--primary-font-family)
  #ha-card-header-font-family: var(--primary-font-family)
  #mdc-typography-body1-font-family: var(--primary-font-family)
  #mdc-typography-font-family: var(--primary-font-family)

  # +----------------------------------------------------------------------------+
  # | Apple color                                                                |
  # +----------------------------------------------------------------------------+
  homeos-apple-color-orange-red: rgba(235, 85, 69, 1.0)
  homeos-apple-color-orange: rgba(246, 166, 59, 1.0)
  homeos-apple-color-gold: rgba(252, 204, 17, 1.0)
  homeos-apple-color-green: rgba(103, 206, 103, 1.0)
  homeos-apple-color-aqua: rgba(135, 227, 225, 1.0)
  homeos-apple-color-light-blue: rgba(129, 207, 250, 1.0)
  homeos-apple-color-turquoise: rgba(106, 197, 221, 1.0)
  homeos-apple-color-blue: rgba(58, 130, 247, 1.0)
  homeos-apple-color-purple: rgba(93, 92, 222, 1.0)
  homeos-apple-color-lavender: rgba(178, 95, 234, 1.0)
  homeos-apple-color-pinkish-red: rgba(235, 75, 98, 1.0)
  homeos-apple-color-light-taupe: rgba(167, 143, 109, 1.0)

  # +----------------------------------------------------------------------------+
  # | Definition of the light and dark mode                                      |
  # +----------------------------------------------------------------------------+
  modes:
    light:
      # general_theme_light.yaml
      background: left top / contain no-repeat fixed url('/local/homeos/background/day-variant-3.jpg')
      # +----------------------------------------------------------------------------+
      # | General card Custom variable                                               |
      # +----------------------------------------------------------------------------+
      homeos-card-background: rgba(255,255,255,0.7) # rgba(0, 0, 0, 0.8)
      homeos-card-background-revert: rgba(0,0,0,0.20)
      homeos-card-backdrop-filter: blur(150px) saturate(140%)
      homeos-card-border-color: rgba(255,255,255,0.5)

      # +----------------------------------------------------------------------------+
      # | General text Custom variable                                               |
      # +----------------------------------------------------------------------------+
      homeos-card-text-color-primary: rgb(0,0,0,0.7)
      homeos-card-text-color-secondary: rgba(0,122,255,0.8)
      homeos-card-text-color-tertiary: rgba(60,60,60,0.9)
      homeos-card-text-color-revert: rgba(255,255,255,1)

      # +----------------------------------------------------------------------------+
      # | General icon Custom variable                                               |
      # +----------------------------------------------------------------------------+
      homeos-icon-color-primary: rgba(10,10,10,0.7)
      homeos-icon-color-secondary: rgba(10,10,10,0.4)
      homeos-icon-color-primary-revert: rgba(255,255,255,0.8)
      homeos-icon-color-secondary-revert: rgba(255,255,255,0.5)

      homeos-map-pagination-background-on: rgb(255, 255, 255)
      homeos-map-pagination-background-off: rgb(208, 207, 213)
      homeos-map-pagination-text-color: rgb(105, 105, 105)
      homeos-map-pagination-shadow: 0px 0px 0.4vw 0 rgba(0,0,0,0.4)
      homeos-map-pagination-icon-primary-off: rgba(0,0,0,0.6)
      homeos-map-pagination-icon-secondary-off: rgba(0,0,0,0.4)

      # map_theme_dark.yaml
      homeos-map-icon-light-on-primary: rgb(255,255,255,1)
      homeos-map-icon-light-on-secondary: rgb(255,255,255,0.4)
      homeos-map-icon-light-off-primary: rgba(240, 240, 240, 1.0) #rgba(252, 204, 17, 1.0)
      homeos-map-icon-light-off-secondary: rgba(240, 240, 240, 0.4) #rgba(252, 204, 17, 0.4)
      homeos-map-icon-light-unavailable-primary: rgba(255,255,255,1)
      homeos-map-icon-background-on: rgba(252, 204, 17, 1.0)
      homeos-map-icon-background-off: rgba(100,100,100,1)

      # weather_theme_light.yaml
      homeos-weather-box-shadow: var(--homeos-card-box-shadow)
      homeos-weather-border-radius: var(--homeos-card-border-radius)

      # +----------------------------------------------------------------------------+
      # | IOS Weather Icon                                                           |
      # +----------------------------------------------------------------------------+
      weather-icon-snowy: url('/local/homeos/weather_media/Icons=snowflake.svg')
      weather-icon-cloudy: url('/local/homeos/weather_media/Icons=cloud.fill.svg')
      weather-icon-clear-night: url('/local/homeos/weather_media/Icons=moon.stars.fill.svg')
      weather-icon-fog: url('/local/homeos/weather_media/Icons=sun.haze.fill.svg')
      weather-icon-lightning: url('/local/homeos/weather_media/Icons=cloud.sun.bolt.fill.svg')
      weather-icon-lightning-rainy: url('/local/homeos/weather_media/Icons=cloud.bolt.rain.fill.svg')
      weather-icon-partlycloudy: url('/local/homeos/weather_media/Icons=cloud.sun.fill.svg')
      weather-icon-pouring: url('/local/homeos/weather_media/Icons=cloud.heavyrain.fill.svg')
      weather-icon-rainy: url('/local/homeos/weather_media/Icons=cloud.sun.rain.fill.svg')
      weather-icon-hail: url('/local/homeos/weather_media/Icons=cloud.hail.fill.svg')
      weather-icon-snowy-rainy: url('/local/homeos/weather_media/Icons=cloud.sleet.fill.svg')
      weather-icon-sunny: url('/local/homeos/weather_media/Icons=sun.max.fill.svg')
      weather-icon-windy: url('/local/homeos/weather_media/Icons=wind.svg')
      weather-icon-windy-variant: url('/local/homeos/weather_media/Icons=wind.snow.svg')
      weather-icon-exceptional: url('/local/homeos/weather_media/Icons=exclamationmark.triangle.svg')

    dark:
      # general_theme_dark
      background: left top / contain no-repeat fixed url('/local/homeos/background/blue-night.jpg')

      # +----------------------------------------------------------------------------+
      # | General card Custom variable                                               |
      # +----------------------------------------------------------------------------+
      homeos-card-background: rgba(5, 5, 5, 0.7) # rgba(0, 0, 0, 0.8)
      homeos-card-background-revert: rgba(255,255,255,0.15)
      homeos-card-backdrop-filter: blur(150px) saturate(120%)
      homeos-card-border-color: rgba(255,255,255,0.07)

      # +----------------------------------------------------------------------------+
      # | General text Custom variable                                               |
      # +----------------------------------------------------------------------------+
      homeos-card-text-color-primary: rgba(255,255,255,1) #white
      homeos-card-text-color-secondary: rgba(187,32,62,1) #red
      homeos-card-text-color-tertiary: rgba(194,194,194,0.8) #light grey
      homeos-card-text-color-revert: rgba(255,255,255,1)

      # +----------------------------------------------------------------------------+
      # | General icon Custom variable                                               |
      # +----------------------------------------------------------------------------+
      homeos-icon-color-primary: rgba(255,255,255,1)
      homeos-icon-color-secondary: rgba(255,255,255,0.4)
      homeos-icon-color-primary-revert: rgba(255,255,255,1)
      homeos-icon-color-secondary-revert: rgba(255,255,255,0.4)

      # map_theme_dark.yaml
      homeos-map-pagination-background-on: rgb(255, 255, 255)
      homeos-map-pagination-background-off: rgb(44, 44, 46)
      homeos-map-pagination-text-color: rgb(171, 172, 176)
      homeos-map-pagination-shadow: 0px 0px 0.4vw 0 rgba(0,0,0,0.4)
      homeos-map-pagination-icon-primary-off: rgba(255,255,255,0.8)
      homeos-map-pagination-icon-secondary-off: rgba(255,255,255,0.4)

      homeos-map-icon-light-on-primary: rgb(255,255,255,1)
      homeos-map-icon-light-on-secondary: rgb(255,255,255,0.4)
      homeos-map-icon-light-off-primary: rgba(252, 204, 17, 1.0)
      homeos-map-icon-light-off-secondary: rgba(252, 204, 17, 0.4)
      homeos-map-icon-light-unavailable-primary: rgba(255,255,255,1)
      homeos-map-icon-background-on: rgba(252, 204, 17, 1.0)
      homeos-map-icon-background-off: rgba(25,25,25,1)

      # weather_theme_dark.yaml
      weather-icon-snowy: url('/local/homeos/weather_media/Icons=snowflake.svg')
      weather-icon-cloudy: url('/local/homeos/weather_media/Icons=cloud.fill.svg')
      weather-icon-clear-night: url('/local/homeos/weather_media/Icons=moon.stars.fill.svg')
      weather-icon-fog: url('/local/homeos/weather_media/Icons=moon.haze.fill.svg')
      weather-icon-lightning: url('/local/homeos/weather_media/Icons=cloud.moon.bolt.fill.svg')
      weather-icon-lightning-rainy: url('/local/homeos/weather_media/Icons=cloud.bolt.rain.fill.svg')
      weather-icon-partlycloudy: url('/local/homeos/weather_media/Icons=cloud.moon.fill.svg')
      weather-icon-pouring: url('/local/homeos/weather_media/Icons=cloud.heavyrain.fill.svg')
      weather-icon-rainy: url('/local/homeos/weather_media/Icons=cloud.rain.fill.svg')
      weather-icon-hail: url('/local/homeos/weather_media/Icons=cloud.moon.rain.fill.svg')
      weather-icon-snowy-rainy: url('/local/homeos/weather_media/Icons=cloud.sleet.fill.svg')
      weather-icon-sunny: url('/local/homeos/weather_media/Icons=sun.max.fill.svg')
      weather-icon-windy: url('/local/homeos/weather_media/Icons=wind.svg')
      weather-icon-windy-variant: url('/local/homeos/weather_media/Icons=wind.snow.svg')
      weather-icon-exceptional: url('/local/homeos/weather_media/Icons=exclamationmark.triangle.svg')
