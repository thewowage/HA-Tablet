neon_glass_pixel:
  modes:
    light: {}
    dark: {}
  ha-card-background: "rgba(17,19,33,0.64)"
  card-background-color: "rgba(17,19,33,0.64)"
  primary-background-color: "#090b16"
  secondary-background-color: "#0e1020"
  lovelace-background: "radial-gradient(circle at 12% 12%, rgba(31,33,59,0.55), transparent 26%), radial-gradient(circle at 82% 16%, rgba(24,34,80,0.32), transparent 18%), radial-gradient(circle at 78% 84%, rgba(95,32,80,0.18), transparent 20%), #090b16"
  primary-text-color: "#f5f7ff"
  secondary-text-color: "rgba(245,247,255,0.72)"
  disabled-text-color: "rgba(245,247,255,0.38)"
  divider-color: "rgba(255,255,255,0.08)"
  state-icon-color: "#c9d4ff"
  accent-color: "#8d5cff"
  success-color: "#3dfb6b"
  warning-color: "#ffb74d"
  error-color: "#ff6377"
  info-color: "#57d8ff"

  card-mod-theme: neon_glass_pixel
  card-mod-root-yaml: |
    .: |
      ha-app-layout {
        background: radial-gradient(circle at 12% 12%, rgba(31,33,59,0.55), transparent 26%), radial-gradient(circle at 82% 16%, rgba(24,34,80,0.32), transparent 18%), radial-gradient(circle at 78% 84%, rgba(95,32,80,0.18), transparent 20%), #090b16 !important;
      }
      body {
        background: #090b16 !important;
      }
      app-header, ha-tabs {
        display: none !important;
      }
      :host {
        --ha-card-border-radius: 24px;
        --ha-card-box-shadow: 0 10px 30px rgba(0,0,0,.35);
      }
